<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolarBalls Planet Creator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --space: #04060f;
    --deep: #080d1e;
    --panel: #0c1230;
    --panel2: #0e1535;
    --border: #1a2a6c;
    --accent: #3d6fff;
    --glow: #5a8fff;
    --star: #c8d8ff;
    --dim: #4a5a8a;
    --text: #b0c4ff;
    --bright: #e8f0ff;
    --gold: #ffd060;
    --danger: #ff4060;
    --section-eyes: #2a1a4a;
    --section-mouth: #1a2a1a;
    --section-planets: #1a1a3a;
    --section-moons: #2a2a1a;
    --section-stars: #2a1a1a;
    --section-rings: #1a2a2a;
    --section-misc: #2a2a2a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--space);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    display: flex;
    height: 100vh;
    overflow: hidden;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(30,40,120,.15) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(60,20,100,.1) 0%, transparent 50%);
  }

  /* ── SIDEBARS (both left assets + right layers) ── */
  .panel {
    background: var(--panel);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    z-index: 10;
    transition: width .22s cubic-bezier(.4,0,.2,1);
    flex-shrink: 0;
  }
  
  .panel.left  { border-right: 1px solid var(--border); width: 240px; }
  .panel.right { border-left:  1px solid var(--border); width: 200px; }
  
  /* Only apply min-width when NOT collapsed so they can shrink */
  .panel:not(.collapsed).left { min-width: 240px; }
  .panel:not(.collapsed).right { min-width: 200px; }
  
  .panel.collapsed { 
    width: 0 !important; 
    min-width: 0 !important; 
    border-left: none !important;
    border-right: none !important;
  }

  /* panel toggle buttons — live in the toolbar */
  .panel-toggle {
    font-family: 'Orbitron', sans-serif;
    font-size: 8px;
    letter-spacing: 1px;
    padding: 5px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    cursor: pointer;
    transition: all .15s;
    text-transform: uppercase;
    white-space: nowrap;
    user-select: none;
  }
  .panel-toggle:hover { border-color: var(--accent); color: var(--bright); }
  .panel-toggle.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .panel-inner {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex: 1;
    min-width: 0;
  }

  .panel-header {
    padding: 12px 14px 9px;
    border-bottom: 1px solid var(--border);
    background: var(--deep);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
  }

  .panel-header p {
    font-size: 8px;
    color: var(--dim);
    margin-top: 2px;
    letter-spacing: 1px;
  }

  /* ── RIGHT LAYERS PANEL ── */
  #layers-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  #layers-list::-webkit-scrollbar { width: 4px; }
  #layers-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .layer-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background .12s, border-color .12s;
    flex-shrink: 0;
  }
  .layer-row:hover { background: var(--panel2); border-color: var(--border); }
  .layer-row.active { background: rgba(61,111,255,.18); border-color: var(--accent); }

  .layer-row .lr-thumb {
    width: 32px; height: 32px;
    flex-shrink: 0;
    background: var(--deep);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .layer-row .lr-thumb img {
    max-width: 28px; max-height: 28px;
    object-fit: contain;
    pointer-events: none;
  }
  .layer-row .lr-name {
    flex: 1;
    font-size: 9px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .layer-row .lr-z {
    font-size: 8px;
    color: var(--dim);
    font-family: 'Orbitron', sans-serif;
  }
  .layer-row .lr-del {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-size: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background .12s, color .12s;
  }
  .layer-row .lr-del:hover { background: var(--danger); border-color: var(--danger); color: #fff; }

  .layers-empty {
    font-size: 9px;
    color: var(--dim);
    text-align: center;
    padding: 20px 10px;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 1px;
  }

  /* sidebar header legacy alias */
  #sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--deep);
  }
  #sidebar-header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
  }
  #sidebar-header p {
    font-size: 9px;
    color: var(--dim);
    margin-top: 2px;
    letter-spacing: 1px;
  }

  /* category tabs */
  #cat-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    padding: 8px;
    border-bottom: 1px solid var(--border);
    background: var(--deep);
  }

  .cat-tab {
    font-family: 'Orbitron', sans-serif;
    font-size: 7px;
    letter-spacing: 1px;
    padding: 4px 7px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--dim);
    cursor: pointer;
    transition: all .15s;
    text-transform: uppercase;
  }
  .cat-tab:hover { color: var(--text); border-color: var(--accent); }
  .cat-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* single-column scrollable list — each asset gets full width */
  #asset-grid {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #asset-grid::-webkit-scrollbar { width: 4px; }
  #asset-grid::-webkit-scrollbar-track { background: transparent; }
  #asset-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .asset-item {
    width: 100%;
    height: 80px;
    flex-shrink: 0;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    cursor: grab;
    transition: border-color .15s, box-shadow .15s;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 0;
  }
  .asset-item:hover {
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(61,111,255,.3);
  }
  .asset-item:active { cursor: grabbing; opacity: .8; }

  /* square image zone on the left */
  .asset-item .thumb {
    width: 80px;
    height: 80px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    background: var(--deep);
    border-right: 1px solid var(--border);
  }

  .asset-item .thumb img {
    max-width: 64px;
    max-height: 64px;
    width: auto;
    height: auto;
    object-fit: contain;
    pointer-events: none;
    user-select: none;
    display: block;
  }

  /* label to the right of the image */
  .asset-item span {
    flex: 1;
    padding: 0 10px;
    font-size: 10px;
    color: var(--text);
    white-space: normal;
    line-height: 1.3;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .cat-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
    width: 100%;
    padding: 6px 2px 2px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
    flex-shrink: 0;
  }
  .cat-label:first-child { border-top: none; margin-top: 0; }

  /* ── MAIN AREA ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #toolbar {
    background: var(--deep);
    border-bottom: 1px solid var(--border);
    padding: 6px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: nowrap;
    overflow-x: auto;
    overflow-y: hidden;
    flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #toolbar::-webkit-scrollbar { display: none; }

  .tool-group {
    display: flex;
    align-items: center;
    gap: 5px;
    padding-right: 8px;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tool-group:last-child { border-right: none; }

  .tool-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 7px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
  }

  .btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 8px;
    letter-spacing: 1px;
    padding: 5px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    cursor: pointer;
    transition: all .15s;
    text-transform: uppercase;
  }
  .btn:hover { border-color: var(--accent); color: var(--bright); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--glow); }
  .btn.danger { border-color: var(--danger); color: var(--danger); }
  .btn.danger:hover { background: var(--danger); color: #fff; }

  input[type="range"] {
    -webkit-appearance: none;
    width: 80px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .scale-val {
    font-size: 9px;
    color: var(--dim);
    min-width: 30px;
  }

  /* ── CANVAS WRAP ── */
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--space);
    cursor: default;
  }

  /* infinite star field – fixed behind world */
  #starfield {
    position: absolute;
    inset: -200px;
    pointer-events: none;
    z-index: 0;
  }

  /* the infinite world that gets panned + zoomed */
  #world {
    position: absolute;
    top: 0; left: 0;
    width: 0; height: 0;
    transform-origin: 0 0;
    z-index: 1;
  }

  /* drop zone hint — centred in viewport, not world */
  #drop-hint {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    z-index: 2;
    opacity: .22;
    transition: opacity .3s;
  }
  #drop-hint .big {
    font-family: 'Orbitron', sans-serif;
    font-size: 40px;
    color: var(--accent);
    line-height: 1;
  }
  #drop-hint p {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--dim);
    margin-top: 8px;
    text-transform: uppercase;
  }

  /* placed items on canvas */
  .canvas-item {
    position: absolute;
    cursor: grab;
    user-select: none;
    transform-origin: center center;
  }
  .canvas-item:active { cursor: grabbing; }
  .canvas-item.selected {
    outline: 2px dashed var(--accent);
    outline-offset: 3px;
  }
  .canvas-item img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
    display: block;
  }
  .clip-planet { border-radius: 50%; overflow: hidden; }
  .clip-planet img { object-fit: cover; }

  /* resize handle — scale-compensated in JS */
  .resize-handle {
    position: absolute;
    bottom: -6px; right: -6px;
    width: 14px; height: 14px;
    background: var(--accent);
    border: 2px solid #fff;
    border-radius: 50%;
    cursor: se-resize;
    display: none;
    z-index: 10;
  }
  .canvas-item.selected .resize-handle { display: block; }

  /* delete handle */
  .delete-handle {
    position: absolute;
    top: -8px; right: -8px;
    width: 18px; height: 18px;
    background: var(--danger);
    border-radius: 50%;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #fff;
    z-index: 10;
  }
  .canvas-item.selected .delete-handle { display: flex; }

  /* zoom controls */
  #zoom-controls {
    position: absolute;
    bottom: 14px; right: 14px;
    z-index: 40;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .zoom-btn {
    width: 32px; height: 32px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .12s, color .12s;
    font-family: 'Orbitron', sans-serif;
    user-select: none;
  }
  .zoom-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  #zoom-level {
    font-family: 'Orbitron', sans-serif;
    font-size: 7px;
    letter-spacing: 1px;
    color: var(--dim);
    text-align: center;
  }

  /* ── INFO BAR ── */
  #info-bar {
    background: var(--deep);
    border-top: 1px solid var(--border);
    padding: 5px 14px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  #info-bar span { font-family: 'Orbitron', sans-serif; }

  /* ── MOBILE LANDSCAPE: smaller assets in sidebar ── */
  @media (max-height: 500px) and (orientation: landscape) {
    .panel.left  { width: 180px; }
    .panel:not(.collapsed).left { min-width: 180px; }

    .asset-item {
      height: 48px;
    }
    .asset-item .thumb {
      width: 48px;
      height: 48px;
      padding: 5px;
    }
    .asset-item .thumb img {
      max-width: 38px;
      max-height: 38px;
    }
    .asset-item span {
      font-size: 9px;
      padding: 0 6px;
    }
    #cat-tabs {
      padding: 5px 6px;
      gap: 2px;
    }
    .cat-tab {
      font-size: 6px;
      padding: 3px 5px;
    }
    .panel-header {
      padding: 7px 10px 6px;
    }
    .panel-header h1 {
      font-size: 10px;
    }
  }

  /* drag ghost */
  #drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    opacity: .75;
    transform: translate(-50%, -50%) scale(.85);
    display: none;
  }
  #drag-ghost img { width: 80px; height: 80px; object-fit: contain; }
</style>
</head>
<body>

<!-- LEFT PANEL: Assets -->
<aside class="panel left" id="panel-left">
  <div class="panel-inner">
    <div class="panel-header">
      <div>
        <h1>☄ Assets</h1>
        <p>Drag to canvas</p>
      </div>
    </div>
    <div id="cat-tabs">
      <div class="cat-tab active" data-cat="all">All</div>
      <div class="cat-tab" data-cat="planets">Planets</div>
      <div class="cat-tab" data-cat="moons">Moons</div>
      <div class="cat-tab" data-cat="stars">Stars</div>
      <div class="cat-tab" data-cat="eyes">Eyes</div>
      <div class="cat-tab" data-cat="mouths">Mouths</div>
      <div class="cat-tab" data-cat="rings">Rings</div>
      <div class="cat-tab" data-cat="outlines">Outlines</div>
      <div class="cat-tab" data-cat="misc">Misc</div>
    </div>
    <div id="asset-grid"></div>
  </div>
</aside>

<!-- MAIN -->
<div id="main">
  <div id="toolbar">
    <div class="tool-group">
      <div class="panel-toggle" id="toggle-left">☰ Assets</div>
      <div class="panel-toggle" id="toggle-right">Layers ☰</div>
    </div>
    <div class="tool-group">
      <span class="tool-label">Layer</span>
      <button class="btn" id="btn-up" title="Bring Forward">↑ Fwd</button>
      <button class="btn" id="btn-down" title="Send Back">↓ Back</button>
    </div>
    <div class="tool-group">
      <span class="tool-label">Scale</span>
      <input type="range" id="scale-slider" min="20" max="400" value="100">
      <span class="scale-val" id="scale-val">100%</span>
    </div>
    <div class="tool-group">
      <span class="tool-label">Clip</span>
      <button class="btn" id="btn-clip">⬤ Circle Clip</button>
    </div>
    <div class="tool-group">
      <span class="tool-label">Flip</span>
      <button class="btn" id="btn-flip-h">↔ H</button>
      <button class="btn" id="btn-flip-v">↕ V</button>
    </div>
    <div class="tool-group">
      <span class="tool-label">Actions</span>
      <button class="btn" id="btn-dupe">⧉ Dupe</button>
      <button class="btn danger" id="btn-del">✕ Del</button>
    </div>
    <div class="tool-group">
      <button class="btn" id="btn-clear">Clear All</button>
      <button class="btn primary" id="btn-export">⬇ Save PNG</button>
    </div>
  </div>

  <div id="canvas-wrap">
    <!-- star field (fixed) -->
    <canvas id="starfield"></canvas>

    <!-- infinite world -->
    <div id="world"></div>

    <!-- drop hint overlaid on viewport -->
    <div id="drop-hint">
      <div class="big">☄</div>
      <p>Drag assets · scroll to zoom · drag space to pan</p>
    </div>

    <!-- zoom controls -->
    <div id="zoom-controls">
      <div class="zoom-btn" id="btn-zoom-in" title="Zoom in">+</div>
      <div class="zoom-level" id="zoom-level">100%</div>
      <div class="zoom-btn" id="btn-zoom-out" title="Zoom out">−</div>
      <div class="zoom-btn" id="btn-zoom-reset" title="Reset view" style="font-size:10px">⌂</div>
    </div>
  </div>

  <div id="info-bar">
    <span id="info-count">0 items</span>
    <span id="info-sel">· Nothing selected</span>
    <span id="info-pos"></span>
  </div>
</div>

<!-- RIGHT PANEL: Layers -->
<aside class="panel right" id="panel-right">
  <div class="panel-inner">
    <div class="panel-header">
      <div>
        <h1>Layers</h1>
        <p>Top = front</p>
      </div>
    </div>
    <div id="layers-list">
      <div class="layers-empty">No layers yet</div>
    </div>
  </div>
</aside>

<!-- drag ghost -->
<div id="drag-ghost"><img id="ghost-img" src="" alt=""></div>

<script>
// ═══════════════════════════════════════════════════════════
// ASSET DATA
// ═══════════════════════════════════════════════════════════
const BASE = 'https://static.wikia.nocookie.net/solarballs/images/';
const SZ = '/revision/latest/scale-to-width-down/250?cb=';

function img(path, cb) {
  return BASE + path + SZ + cb;
}

const ASSETS = [
  // ─── MAJOR PLANETS ───
  { cat: 'planets', name: 'Mercury', url: img('4/41/MERCURY_NEW_ASSET.jpeg','20251103193423') },
  { cat: 'planets', name: 'Venus', url: img('7/73/VENUS_NEW_ASSET.jpeg','20251103193441') },
  { cat: 'planets', name: 'Earth', url: img('1/19/EARTH_NEW_ASSET.jpeg','20251103193500') },
  { cat: 'planets', name: 'Mars', url: img('8/8c/PROTOMARS.jpeg','20251103195433') },
  { cat: 'planets', name: 'Jupiter', url: img('7/75/JUPITER_NEW_ASSET.jpeg','20251103193542') },
  { cat: 'planets', name: 'Saturn', url: img('b/ba/SATURN_NEW_ASSET.jpeg','20251103193559') },
  { cat: 'planets', name: 'Uranus', url: img('2/2f/URANUS_NEW_ASSET.jpeg','20251103193617') },
  { cat: 'planets', name: 'Neptune', url: img('6/61/NEPTUNE_NEW_ASSET.jpeg','20251103193653') },
  { cat: 'planets', name: 'Pluto', url: img('5/57/Pluto_asset_solarballs.jpeg','20251222221542') },
  { cat: 'planets', name: 'Eris', url: img('3/3e/Eris_solarballs_asset.jpeg','20240513145416') },
  { cat: 'planets', name: 'Haumea', url: img('1/1d/Solarballs_haumea_asset.jpeg','20240513145136') },
  { cat: 'planets', name: 'Makemake', url: img('c/c1/Solarballs_makemake_asset.jpeg','20251222221742') },

// STATE
// ═══════════════════════════════════════════════════════════
let selectedEl = null;
let items = [];
let zCounter = 100;
let currentCat = 'all';

// ── Viewport transform ──
let panX = 0, panY = 0, zoom = 1;
const ZOOM_MIN = 0.08, ZOOM_MAX = 8;

// ── Drag from sidebar ──
let dragSrc = null;
let dragActive = false;
let ghostX = 0, ghostY = 0;

// ── Pan state ──
let panning = false;
let panStartX = 0, panStartY = 0, panStartPX = 0, panStartPY = 0;

// ── Item move state ──
let movingEl = null;
let moveStartCX = 0, moveStartCY = 0; // cursor in world space at drag start
let moveStartWX = 0, moveStartWY = 0; // item world pos at drag start

// ── Resize state ──
let resizing = false;
let resizeEl = null;
let resizeStartCX = 0, resizeStartCY = 0;
let resizeStartW = 0;

// ── Pinch state ──
let pinching = false;
let pinchDist0 = 0, pinchZoom0 = 1;
let pinchMidX = 0, pinchMidY = 0;

// ═══════════════════════════════════════════════════════════
// STARFIELD
// ═══════════════════════════════════════════════════════════
function initStarfield() {
  const cvs = document.getElementById('starfield');
  const wrap = document.getElementById('canvas-wrap');
  cvs.width  = wrap.offsetWidth  + 400;
  cvs.height = wrap.offsetHeight + 400;
  cvs.style.left = '-200px'; cvs.style.top = '-200px';
  const ctx = cvs.getContext('2d');
  ctx.clearRect(0, 0, cvs.width, cvs.height);
  const count = 260;
  for (let i = 0; i < count; i++) {
    const x = Math.random() * cvs.width;
    const y = Math.random() * cvs.height;
    const r = Math.random() < 0.05 ? 1.5 : Math.random() < 0.2 ? 1 : 0.5;
    const a = 0.2 + Math.random() * 0.7;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,216,255,${a})`;
    ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════════
// VIEWPORT TRANSFORM
// ═══════════════════════════════════════════════════════════
const world = document.getElementById('world');

function applyViewport() {
  world.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
}

function screenToWorld(sx, sy) {
  const wrap = document.getElementById('canvas-wrap').getBoundingClientRect();
  return {
    x: (sx - wrap.left - panX) / zoom,
    y: (sy - wrap.top  - panY) / zoom
  };
}

function clampZoom(z) { return Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, z)); }

function zoomAt(newZoom, pivotSX, pivotSY) {
  const wrap = document.getElementById('canvas-wrap').getBoundingClientRect();
  const wx = pivotSX - wrap.left;
  const wy = pivotSY - wrap.top;
  // keep world point under pivot fixed
  panX = wx - (wx - panX) * (newZoom / zoom);
  panY = wy - (wy - panY) * (newZoom / zoom);
  zoom = newZoom;
  applyViewport();
}

// ── Scroll wheel zoom ──
document.getElementById('canvas-wrap').addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  cancelFocusAnim(); zoomAt(clampZoom(zoom * factor), e.clientX, e.clientY);
}, { passive: false });

// ── Zoom buttons ──
document.getElementById('btn-zoom-in').addEventListener('click', () => {
  const wrap = document.getElementById('canvas-wrap').getBoundingClientRect();
  cancelFocusAnim(); zoomAt(clampZoom(zoom * 1.25), wrap.left + wrap.width/2, wrap.top + wrap.height/2);
});
document.getElementById('btn-zoom-out').addEventListener('click', () => {
  const wrap = document.getElementById('canvas-wrap').getBoundingClientRect();
  cancelFocusAnim(); zoomAt(clampZoom(zoom / 1.25), wrap.left + wrap.width/2, wrap.top + wrap.height/2);
});
document.getElementById('btn-zoom-reset').addEventListener('click', () => {
  cancelFocusAnim(); panX = 0; panY = 0; zoom = 1; applyViewport();
});

// ═══════════════════════════════════════════════════════════
// PAN (drag empty canvas)
// ═══════════════════════════════════════════════════════════
const canvasWrap = document.getElementById('canvas-wrap');

canvasWrap.addEventListener('mousedown', e => {
  // Pan on background — not on canvas items or zoom controls
  if (e.target.closest && (e.target.closest('.canvas-item') || e.target.closest('#zoom-controls'))) return;
  if (movingEl || resizing) return;
  cancelFocusAnim();
  panning = true;
  panStartX = e.clientX; panStartY = e.clientY;
  panStartPX = panX; panStartPY = panY;
  canvasWrap.style.cursor = 'grabbing';
});

document.addEventListener('mousemove', e => {
  if (panning) {
    panX = panStartPX + (e.clientX - panStartX);
    panY = panStartPY + (e.clientY - panStartY);
    applyViewport();
  }
});

document.addEventListener('mouseup', () => {
  if (panning) { panning = false; canvasWrap.style.cursor = ''; }
});

// deselect on world click
world.addEventListener('mousedown', e => {
  if (e.target === world) {
    if (selectedEl) { selectedEl.el.classList.remove('selected'); selectedEl = null; updateInfoBar(); refreshLayers(); }
  }
});

// ═══════════════════════════════════════════════════════════
// RENDER SIDEBAR
// ═══════════════════════════════════════════════════════════
const grid = document.getElementById('asset-grid');

function renderGrid() {
  grid.innerHTML = '';
  const filtered = currentCat === 'all' ? ASSETS : ASSETS.filter(a => a.cat === currentCat);
  if (currentCat === 'all') {
    const cats = ['planets','moons','stars','eyes','mouths','rings','outlines','misc'];
    const catLabels = {
      planets:'⬤ Planets', moons:'◎ Moons', stars:'★ Stars',
      eyes:'◉ Eyes', mouths:'⌒ Mouths', rings:'◌ Rings',
      outlines:'□ Outlines & Shades', misc:'✦ Characters & Misc'
    };
    cats.forEach(cat => {
      const group = filtered.filter(a => a.cat === cat);
      if (!group.length) return;
      const lbl = document.createElement('div');
      lbl.className = 'cat-label';
      lbl.textContent = catLabels[cat];
      grid.appendChild(lbl);
      group.forEach(a => grid.appendChild(makeThumb(a)));
    });
  } else {
    filtered.forEach(a => grid.appendChild(makeThumb(a)));
  }
}

function makeThumb(asset) {
  const div = document.createElement('div');
  div.className = 'asset-item';
  div.title = asset.name;

  const thumbDiv = document.createElement('div');
  thumbDiv.className = 'thumb';

  const imgEl = document.createElement('img');
  imgEl.src = asset.url;
  imgEl.alt = asset.name;
  imgEl.loading = 'lazy';
  imgEl.crossOrigin = 'anonymous';

  thumbDiv.appendChild(imgEl);

  const lbl = document.createElement('span');
  lbl.textContent = asset.name;

  div.appendChild(thumbDiv);
  div.appendChild(lbl);

  div.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    dragSrc = asset;
    dragActive = false;
    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('mouseup', onDragUp);
  });
  div.addEventListener('touchstart', e => {
    dragSrc = asset;
    dragActive = false;
  }, { passive: true });

  return div;
}

// ═══════════════════════════════════════════════════════════
// DRAG FROM SIDEBAR
// ═══════════════════════════════════════════════════════════
const ghost = document.getElementById('drag-ghost');
const ghostImg = document.getElementById('ghost-img');

function showGhost(x, y, url) {
  ghost.style.display = 'block';
  ghost.style.left = x + 'px';
  ghost.style.top = y + 'px';
  ghostImg.src = url;
}
function hideGhost() { ghost.style.display = 'none'; }

function onDragMove(e) {
  if (!dragSrc) return;
  dragActive = true;
  showGhost(e.clientX, e.clientY, dragSrc.url);
}

function onDragUp(e) {
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragUp);
  hideGhost();
  if (dragSrc && dragActive) {
    const cw = document.getElementById('canvas-wrap');
    const rect = cw.getBoundingClientRect();
    if (e.clientX >= rect.left && e.clientX <= rect.right &&
        e.clientY >= rect.top  && e.clientY <= rect.bottom) {
      const wp = screenToWorld(e.clientX, e.clientY);
      placeItem(dragSrc, wp.x, wp.y);
    }
  }
  dragSrc = null; dragActive = false;
}

// ═══════════════════════════════════════════════════════════
// PLACE ITEM  (x,y in world-space)
// ═══════════════════════════════════════════════════════════
function placeItem(asset, wx, wy, size = 140, opts = {}) {
  document.getElementById('drop-hint').style.opacity = '0';

  const el = document.createElement('div');
  el.className = 'canvas-item';
  el.style.width  = size + 'px';
  el.style.height = size + 'px';
  el.style.left   = (wx - size/2) + 'px';
  el.style.top    = (wy - size/2) + 'px';
  el.style.zIndex = ++zCounter;

  const imgEl = document.createElement('img');
  imgEl.src = asset.url;
  imgEl.alt = asset.name;
  imgEl.crossOrigin = 'anonymous';
  imgEl.draggable = false;
  el.appendChild(imgEl);

  const rh = document.createElement('div');
  rh.className = 'resize-handle';
  el.appendChild(rh);

  const dh = document.createElement('div');
  dh.className = 'delete-handle';
  dh.textContent = '×';
  el.appendChild(dh);

  world.appendChild(el);

  const data = {
    el, asset,
    wx: wx - size/2, wy: wy - size/2,
    w: size, h: size,
    z: zCounter,
    scaleX: opts.scaleX || 1,
    scaleY: opts.scaleY || 1,
    clipped: opts.clipped || false,
    id: opts.id || (Date.now() + Math.random())
  };
  items.push(data);

  if (data.clipped) el.classList.add('clip-planet');
  if (data.scaleX !== 1 || data.scaleY !== 1) {
    imgEl.style.transform = `scale(${data.scaleX},${data.scaleY})`;
  }

  // ── mouse events ──
  el.addEventListener('mousedown', e => {
    if (e.target === rh || e.target === dh) return;
    e.stopPropagation();
    selectItem(data);
    startMoveItem(e, data);
  });
  rh.addEventListener('mousedown', e => {
    e.stopPropagation();
    startResizeItem(e, data);
  });
  dh.addEventListener('click', e => { e.stopPropagation(); removeItem(data); });

  // ── touch events ──
  el.addEventListener('touchstart', e => {
    if (e.target === rh || e.target === dh) return;
    e.stopPropagation();
    selectItem(data);
    const t = e.touches[0];
    startMoveItemTouch(t, data);
  }, { passive: true });
  rh.addEventListener('touchstart', e => {
    e.stopPropagation(); e.preventDefault();
    startResizeItemTouch(e.touches[0], data);
  }, { passive: false });
  dh.addEventListener('touchend', e => { e.stopPropagation(); removeItem(data); });

  selectItem(data);
  updateInfoBar();
  refreshLayers();
  saveScene();
  return data;
}

// ═══════════════════════════════════════════════════════════
// SELECT
// ═══════════════════════════════════════════════════════════
function selectItem(data) {
  if (selectedEl) selectedEl.el.classList.remove('selected');
  selectedEl = data;
  if (data) {
    data.el.classList.add('selected');
    // Do NOT change zIndex — preserve existing layer order
    syncSlider(data);
  }
  updateInfoBar();
  refreshLayers();
}

function syncSlider(data) {
  const pct = Math.round((data.w / 140) * 100);
  document.getElementById('scale-slider').value = pct;
  document.getElementById('scale-val').textContent = pct + '%';
}

// ═══════════════════════════════════════════════════════════
// MOVE ITEM
// ═══════════════════════════════════════════════════════════
function startMoveItem(e, data) {
  cancelFocusAnim();
  movingEl = data;
  const wp = screenToWorld(e.clientX, e.clientY);
  moveStartCX = wp.x; moveStartCY = wp.y;
  moveStartWX = data.wx; moveStartWY = data.wy;
  document.addEventListener('mousemove', onMoveItem);
  document.addEventListener('mouseup', onMoveItemUp);
}
function onMoveItem(e) {
  if (!movingEl) return;
  const wp = screenToWorld(e.clientX, e.clientY);
  movingEl.wx = moveStartWX + (wp.x - moveStartCX);
  movingEl.wy = moveStartWY + (wp.y - moveStartCY);
  movingEl.el.style.left = movingEl.wx + 'px';
  movingEl.el.style.top  = movingEl.wy + 'px';
}
function onMoveItemUp() {
  if (movingEl) { saveScene(); movingEl = null; }
  document.removeEventListener('mousemove', onMoveItem);
  document.removeEventListener('mouseup', onMoveItemUp);
}

function startMoveItemTouch(t, data) {
  movingEl = data;
  const wp = screenToWorld(t.clientX, t.clientY);
  moveStartCX = wp.x; moveStartCY = wp.y;
  moveStartWX = data.wx; moveStartWY = data.wy;
}

// ═══════════════════════════════════════════════════════════
// RESIZE ITEM
// ═══════════════════════════════════════════════════════════
function startResizeItem(e, data) {
  resizing = true; resizeEl = data;
  const wp = screenToWorld(e.clientX, e.clientY);
  resizeStartCX = wp.x; resizeStartCY = wp.y;
  resizeStartW = data.w;
  document.addEventListener('mousemove', onResizeItem);
  document.addEventListener('mouseup', onResizeItemUp);
}
function onResizeItem(e) {
  if (!resizing) return;
  const wp = screenToWorld(e.clientX, e.clientY);
  const delta = (wp.x - resizeStartCX) + (wp.y - resizeStartCY);
  const newW = Math.max(20, resizeStartW + delta);
  resizeEl.w = resizeEl.h = newW;
  resizeEl.el.style.width  = newW + 'px';
  resizeEl.el.style.height = newW + 'px';
  syncSlider(resizeEl);
}
function onResizeItemUp() {
  if (resizing) { saveScene(); resizing = false; resizeEl = null; }
  document.removeEventListener('mousemove', onResizeItem);
  document.removeEventListener('mouseup', onResizeItemUp);
}

function startResizeItemTouch(t, data) {
  resizing = true; resizeEl = data;
  const wp = screenToWorld(t.clientX, t.clientY);
  resizeStartCX = wp.x; resizeStartCY = wp.y;
  resizeStartW = data.w;
}

// ═══════════════════════════════════════════════════════════
// GLOBAL TOUCH HANDLER
// ═══════════════════════════════════════════════════════════
let touchIds = [];

canvasWrap.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    // begin pinch
    pinching = true; panning = false; movingEl = null; resizing = false;
    const a = e.touches[0], b = e.touches[1];
    pinchDist0 = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    pinchZoom0 = zoom;
    pinchMidX = (a.clientX + b.clientX) / 2;
    pinchMidY = (a.clientY + b.clientY) / 2;
    return;
  }
  // single touch on empty canvas → pan
  if (e.target === canvasWrap || e.target === world) {
    if (movingEl || resizing) return;
    panning = true;
    panStartX = e.touches[0].clientX; panStartY = e.touches[0].clientY;
    panStartPX = panX; panStartPY = panY;
  }
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (pinching && e.touches.length === 2) {
    e.preventDefault();
    const a = e.touches[0], b = e.touches[1];
    const dist = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    const midX = (a.clientX + b.clientX) / 2;
    const midY = (a.clientY + b.clientY) / 2;
    zoomAt(clampZoom(pinchZoom0 * dist / pinchDist0), midX, midY);
    return;
  }
  if (dragSrc) {
    // sidebar drag ghost
    dragActive = true;
    const t = e.touches[0];
    showGhost(t.clientX, t.clientY, dragSrc.url);
    return;
  }
  if (movingEl) {
    e.preventDefault();
    const t = e.touches[0];
    const wp = screenToWorld(t.clientX, t.clientY);
    movingEl.wx = moveStartWX + (wp.x - moveStartCX);
    movingEl.wy = moveStartWY + (wp.y - moveStartCY);
    movingEl.el.style.left = movingEl.wx + 'px';
    movingEl.el.style.top  = movingEl.wy + 'px';
    return;
  }
  if (resizing) {
    e.preventDefault();
    const t = e.touches[0];
    const wp = screenToWorld(t.clientX, t.clientY);
    const delta = (wp.x - resizeStartCX) + (wp.y - resizeStartCY);
    const newW = Math.max(20, resizeStartW + delta);
    resizeEl.w = resizeEl.h = newW;
    resizeEl.el.style.width  = newW + 'px';
    resizeEl.el.style.height = newW + 'px';
    syncSlider(resizeEl);
    return;
  }
  if (panning) {
    e.preventDefault();
    const t = e.touches[0];
    panX = panStartPX + (t.clientX - panStartX);
    panY = panStartPY + (t.clientY - panStartY);
    applyViewport();
  }
}, { passive: false });

document.addEventListener('touchend', e => {
  if (pinching && e.touches.length < 2) { pinching = false; saveScene(); return; }
  if (dragSrc && dragActive) {
    hideGhost();
    const t = e.changedTouches[0];
    const cwr = document.getElementById('canvas-wrap').getBoundingClientRect();
    if (t.clientX >= cwr.left && t.clientX <= cwr.right &&
        t.clientY >= cwr.top  && t.clientY <= cwr.bottom) {
      const wp = screenToWorld(t.clientX, t.clientY);
      placeItem(dragSrc, wp.x, wp.y);
    }
    dragSrc = null; dragActive = false;
    return;
  }
  if (dragSrc) { dragSrc = null; dragActive = false; hideGhost(); return; }
  if (movingEl) { saveScene(); movingEl = null; }
  if (resizing) { saveScene(); resizing = false; resizeEl = null; }
  panning = false;
});

// ═══════════════════════════════════════════════════════════
// REMOVE
// ═══════════════════════════════════════════════════════════
function removeItem(data) {
  data.el.remove();
  items = items.filter(i => i !== data);
  if (selectedEl === data) selectedEl = null;
  if (!items.length) document.getElementById('drop-hint').style.opacity = '.22';
  updateInfoBar();
  refreshLayers();
  saveScene();
}

// ═══════════════════════════════════════════════════════════
// TOOLBAR
// ═══════════════════════════════════════════════════════════
document.getElementById('btn-up').addEventListener('click', () => {
  if (!selectedEl) return;
  selectedEl.el.style.zIndex = ++zCounter;
  selectedEl.z = zCounter;

});
document.getElementById('btn-down').addEventListener('click', () => {

}
document.getElementById('btn-dupe').addEventListener('click', () => {

document.getElementById('btn-del').addEventListener('click', () => { if (selectedEl) removeItem(selectedEl); });

// ═══════════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (document.activeElement !== document.body) return;
  if (selectedEl && (e.key === 'Delete' || e.key === 'Backspace')) removeItem(selectedEl);
  if (!selectedEl) return;
  const STEP = (e.shiftKey ? 20 : 4) / zoom;
  if (e.key === 'ArrowLeft')  { selectedEl.wx -= STEP; selectedEl.el.style.left = selectedEl.wx + 'px'; }
  if (e.key === 'ArrowRight') { selectedEl.wx += STEP; selectedEl.el.style.left = selectedEl.wx + 'px'; }
  if (e.key === 'ArrowUp')    { selectedEl.wy -= STEP; selectedEl.el.style.top  = selectedEl.wy + 'px'; }
  if (e.key === 'ArrowDown')  { selectedEl.wy += STEP; selectedEl.el.style.top  = selectedEl.wy + 'px'; }
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) { e.preventDefault(); saveScene(); }
});

// ═══════════════════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════════════════
document.getElementById('btn-export').addEventListener('click', async () => {
  const btn = document.getElementById('btn-export');
  btn.textContent = '⏳ Rendering...';
  btn.disabled = true;

  // render at screen size
  const cw = document.getElementById('canvas-wrap');
  const W = cw.offsetWidth, H = cw.offsetHeight;
  const cvs = document.createElement('canvas');
  cvs.width = W; cvs.height = H;
  const ctx = cvs.getContext('2d');

  ctx.fillStyle = '#04060f';
  ctx.fillRect(0, 0, W, H);

  // draw stars from starfield canvas
  const sf = document.getElementById('starfield');
  ctx.drawImage(sf, 200, 200, W, H, 0, 0, W, H);

  // apply viewport transform then draw each item
  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(zoom, zoom);

  const sorted = [...items].sort((a,b) => a.z - b.z);
  for (const item of sorted) {
    const x = item.wx, y = item.wy, w = item.w, h = item.h;
    try {
      const image = await loadImage(item.asset.url);
      ctx.save();
      if (item.clipped) {
        ctx.beginPath();
        ctx.arc(x + w/2, y + h/2, Math.min(w,h)/2, 0, Math.PI*2);
        ctx.clip();
        ctx.translate(x + w/2, y + h/2);
        ctx.scale(item.scaleX, item.scaleY);
        const iw = image.naturalWidth, ih = image.naturalHeight;
        const sc = Math.max(w/iw, h/ih);
        ctx.drawImage(image, -iw*sc/2, -ih*sc/2, iw*sc, ih*sc);
      } else {
        ctx.translate(x + w/2, y + h/2);
        ctx.scale(item.scaleX, item.scaleY);
        const iw = image.naturalWidth, ih = image.naturalHeight;
        const sc = Math.min(w/iw, h/ih);
        ctx.drawImage(image, -iw*sc/2, -ih*sc/2, iw*sc, ih*sc);
      }
      ctx.restore();
    } catch(err) { console.warn('draw failed', item.asset.name, err); }
  }
  ctx.restore();

  const link = document.createElement('a');
  link.download = 'solarballs-planet.png';
  link.href = cvs.toDataURL('image/png');
  link.click();
  btn.textContent = '⬇ Save PNG';
  btn.disabled = false;
});

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const i = new Image();
    i.crossOrigin = 'anonymous';
    i.onload = () => resolve(i);
    i.onerror = reject;
    i.src = url;
  });
}

// ═══════════════════════════════════════════════════════════
// LOCAL STORAGE PERSISTENCE
// ═══════════════════════════════════════════════════════════
const LS_KEY = 'solarballs_scene_v2';

function saveScene() {
  try {
    const data = {
      panX, panY, zoom,
      items: items.map(it => ({
        url: it.asset.url,
        wx: it.wx, wy: it.wy,
        w: it.w, h: it.h,
        z: it.z,
        scaleX: it.scaleX, scaleY: it.scaleY,
        clipped: it.clipped,
        id: it.id
      }))
    };
    localStorage.setItem(LS_KEY, JSON.stringify(data));
  } catch(e) { console.warn('save failed', e); }
}

function loadScene() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    panX = data.panX || 0;
    panY = data.panY || 0;
    zoom = data.zoom || 1;
    applyViewport();

    // sort by z so stacking order is restored
    const sorted = (data.items || []).slice().sort((a,b) => a.z - b.z);
    sorted.forEach(it => {
      const asset = ASSETS.find(a => a.url === it.url);
      if (!asset) return;
      const placed = placeItem(asset, it.wx + it.w/2, it.wy + it.h/2, it.w, {
        clipped: it.clipped,
        scaleX: it.scaleX,
        scaleY: it.scaleY,
        id: it.id
      });
      // restore exact z
      placed.z = it.z;
      placed.el.style.zIndex = it.z;
      if (it.z > zCounter) zCounter = it.z;
      applyFlip(placed);
    });

    // deselect after load
    if (selectedEl) { selectedEl.el.classList.remove('selected'); selectedEl = null; }
    updateInfoBar(); refreshLayers();
    if (items.length) document.getElementById('drop-hint').style.opacity = '0';
  } catch(e) { console.warn('load failed', e); }
}

// ═══════════════════════════════════════════════════════════
// FOCUS / ZOOM TO ITEM
// ═══════════════════════════════════════════════════════════
let focusAnimId = null; // cancellation token for running focus animation

function cancelFocusAnim() {
  if (focusAnimId !== null) { cancelAnimationFrame(focusAnimId); focusAnimId = null; }
}

function focusOnItem(item) {
  cancelFocusAnim();
  const wrap = document.getElementById('canvas-wrap');
  const vw = wrap.offsetWidth;
  const vh = wrap.offsetHeight;

  // Centre of the item in world space
  const itemCX = item.wx + item.w / 2;
  const itemCY = item.wy + item.h / 2;

  // Target zoom: fit item at ~40% of the smaller viewport dimension
  const TARGET_FILL = 0.4;
  const targetZoom = clampZoom(Math.min(vw, vh) * TARGET_FILL / Math.max(item.w, item.h, 1));
  const finalZoom = clampZoom(Math.max(targetZoom, 0.5));

  // Target pan so item centre lands at viewport centre
  const targetPanX = vw / 2 - itemCX * finalZoom;
  const targetPanY = vh / 2 - itemCY * finalZoom;

  // Animate with requestAnimationFrame
  const startPanX = panX, startPanY = panY, startZoom = zoom;
  const DURATION = 320; // ms
  const start = performance.now();

  function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

  function step(now) {
    const t = Math.min((now - start) / DURATION, 1);
    const e = easeInOut(t);
    zoom = startZoom + (finalZoom - startZoom) * e;
    panX = startPanX + (targetPanX - startPanX) * e;
    panY = startPanY + (targetPanY - startPanY) * e;
    applyViewport();
    if (t < 1) { focusAnimId = requestAnimationFrame(step); }
    else { focusAnimId = null; }
  }
  focusAnimId = requestAnimationFrame(step);
}

// ═══════════════════════════════════════════════════════════
// LAYERS PANEL
// ═══════════════════════════════════════════════════════════
function refreshLayers() {
  const list = document.getElementById('layers-list');
  list.innerHTML = '';
  const sorted = [...items].sort((a, b) => b.z - a.z);
  if (!sorted.length) {
    list.innerHTML = '<div class="layers-empty">No layers yet</div>';
    return;
  }
  sorted.forEach(item => {
    const row = document.createElement('div');
    row.className = 'layer-row' + (item === selectedEl ? ' active' : '');

    const thumb = document.createElement('div');
    thumb.className = 'lr-thumb';
    const timg = document.createElement('img');
    timg.src = item.asset.url;
    thumb.appendChild(timg);

    const name = document.createElement('div');
    name.className = 'lr-name';
    name.textContent = item.asset.name;

    const del = document.createElement('div');
    del.className = 'lr-del';
    del.textContent = '×';

    row.appendChild(thumb);
    row.appendChild(name);
    row.appendChild(del);
    list.appendChild(row);

    row.addEventListener('click', e => {
      if (e.target === del) return;
      selectItem(item);
      focusOnItem(item);
    });
    del.addEventListener('click', e => { e.stopPropagation(); removeItem(item); });
  });
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
initStarfield();
renderGrid();
applyViewport();
loadScene();
updateInfoBar();
refreshLayers();
</script>
