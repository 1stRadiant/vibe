<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolarBalls Planet Creator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --space: #04060f;
    --deep: #080d1e;
    --panel: #0c1230;
    --panel2: #0e1535;
    --border: #1a2a6c;
    --accent: #3d6fff;
    --glow: #5a8fff;
    --star: #c8d8ff;
    --dim: #4a5a8a;
    --text: #b0c4ff;
    --bright: #e8f0ff;
    --gold: #ffd060;
    --danger: #ff4060;
    --section-eyes: #2a1a4a;
    --section-mouth: #1a2a1a;
    --section-planets: #1a1a3a;
    --section-moons: #2a2a1a;
    --section-stars: #2a1a1a;
    --section-rings: #1a2a2a;
    --section-misc: #2a2a2a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--space);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    display: flex;
    height: 100vh;
    overflow: hidden;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(30,40,120,.15) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(60,20,100,.1) 0%, transparent 50%);
  }

  /* ── SIDEBARS (both left assets + right layers) ── */
  .panel {
    background: var(--panel);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    z-index: 10;
    transition: width .22s cubic-bezier(.4,0,.2,1);
    flex-shrink: 0;
  }
  .panel.left  { border-right: 1px solid var(--border); width: 270px; }
  .panel.right { border-left:  1px solid var(--border); width: 220px; }
  .panel.collapsed { width: 0 !important; }

  /* toggle tabs sit on the canvas edge */
  .panel-toggle {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 50;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    padding: 10px 5px;
    border-radius: 4px;
    font-size: 11px;
    writing-mode: vertical-rl;
    letter-spacing: 2px;
    font-family: 'Orbitron', sans-serif;
    font-size: 7px;
    transition: background .15s, color .15s;
    white-space: nowrap;
    user-select: none;
  }
  .panel-toggle:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  #toggle-left  { left: 0; border-left: none; border-radius: 0 4px 4px 0; }
  #toggle-right { right: 0; border-right: none; border-radius: 4px 0 0 4px; }

  .panel-inner {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex: 1;
    min-width: 0;
  }

  .panel-header {
    padding: 12px 14px 9px;
    border-bottom: 1px solid var(--border);
    background: var(--deep);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
  }

  .panel-header p {
    font-size: 8px;
    color: var(--dim);
    margin-top: 2px;
    letter-spacing: 1px;
  }

  /* ── RIGHT LAYERS PANEL ── */
  #layers-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  #layers-list::-webkit-scrollbar { width: 4px; }
  #layers-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .layer-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background .12s, border-color .12s;
    flex-shrink: 0;
  }
  .layer-row:hover { background: var(--panel2); border-color: var(--border); }
  .layer-row.active { background: rgba(61,111,255,.18); border-color: var(--accent); }

  .layer-row .lr-thumb {
    width: 32px; height: 32px;
    flex-shrink: 0;
    background: var(--deep);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .layer-row .lr-thumb img {
    max-width: 28px; max-height: 28px;
    object-fit: contain;
    pointer-events: none;
  }
  .layer-row .lr-name {
    flex: 1;
    font-size: 9px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .layer-row .lr-z {
    font-size: 8px;
    color: var(--dim);
    font-family: 'Orbitron', sans-serif;
  }
  .layer-row .lr-del {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-size: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background .12s, color .12s;
  }
  .layer-row .lr-del:hover { background: var(--danger); border-color: var(--danger); color: #fff; }

  .layers-empty {
    font-size: 9px;
    color: var(--dim);
    text-align: center;
    padding: 20px 10px;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 1px;
  }

  /* sidebar header legacy alias */
  #sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--deep);
  }
  #sidebar-header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
  }
  #sidebar-header p {
    font-size: 9px;
    color: var(--dim);
    margin-top: 2px;
    letter-spacing: 1px;
  }

  /* category tabs */
  #cat-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    padding: 8px;
    border-bottom: 1px solid var(--border);
    background: var(--deep);
  }

  .cat-tab {
    font-family: 'Orbitron', sans-serif;
    font-size: 7px;
    letter-spacing: 1px;
    padding: 4px 7px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--dim);
    cursor: pointer;
    transition: all .15s;
    text-transform: uppercase;
  }
  .cat-tab:hover { color: var(--text); border-color: var(--accent); }
  .cat-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* single-column scrollable list — each asset gets full width */
  #asset-grid {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #asset-grid::-webkit-scrollbar { width: 4px; }
  #asset-grid::-webkit-scrollbar-track { background: transparent; }
  #asset-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .asset-item {
    width: 100%;
    height: 80px;
    flex-shrink: 0;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    cursor: grab;
    transition: border-color .15s, box-shadow .15s;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 0;
  }
  .asset-item:hover {
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(61,111,255,.3);
  }
  .asset-item:active { cursor: grabbing; opacity: .8; }

  /* square image zone on the left */
  .asset-item .thumb {
    width: 80px;
    height: 80px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    background: var(--deep);
    border-right: 1px solid var(--border);
  }

  .asset-item .thumb img {
    max-width: 64px;
    max-height: 64px;
    width: auto;
    height: auto;
    object-fit: contain;
    pointer-events: none;
    user-select: none;
    display: block;
  }

  /* label to the right of the image */
  .asset-item span {
    flex: 1;
    padding: 0 10px;
    font-size: 10px;
    color: var(--text);
    white-space: normal;
    line-height: 1.3;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .cat-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
    width: 100%;
    padding: 6px 2px 2px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
    flex-shrink: 0;
  }
  .cat-label:first-child { border-top: none; margin-top: 0; }

  /* ── MAIN AREA ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #toolbar {
    background: var(--deep);
    border-bottom: 1px solid var(--border);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .tool-group {
    display: flex;
    align-items: center;
    gap: 6px;
    padding-right: 10px;
    border-right: 1px solid var(--border);
  }
  .tool-group:last-child { border-right: none; }

  .tool-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 7px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
  }

  .btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 8px;
    letter-spacing: 1px;
    padding: 5px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    cursor: pointer;
    transition: all .15s;
    text-transform: uppercase;
  }
  .btn:hover { border-color: var(--accent); color: var(--bright); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--glow); }
  .btn.danger { border-color: var(--danger); color: var(--danger); }
  .btn.danger:hover { background: var(--danger); color: #fff; }

  input[type="range"] {
    -webkit-appearance: none;
    width: 80px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .scale-val {
    font-size: 9px;
    color: var(--dim);
    min-width: 30px;
  }

  /* ── CANVAS WRAP ── */
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 30% 40%, rgba(30,50,160,.08) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 80%, rgba(80,20,120,.06) 0%, transparent 50%),
      var(--space);
  }

  /* stars bg */
  #canvas-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(200,216,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(200,216,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 10%, rgba(200,216,255,.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 60%, rgba(200,216,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 25%, rgba(200,216,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 75%, rgba(200,216,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 45%, rgba(200,216,255,.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 10%, rgba(200,216,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 80%, rgba(200,216,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 55%, rgba(200,216,255,.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 48% 88%, rgba(200,216,255,.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 92% 35%, rgba(200,216,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 33% 70%, rgba(200,216,255,.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 50%, rgba(200,216,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 25%, rgba(200,216,255,.5) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  #canvas {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  /* drop zone hint */
  #drop-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    z-index: 0;
    opacity: .25;
  }

  #drop-hint .big {
    font-family: 'Orbitron', sans-serif;
    font-size: 40px;
    color: var(--accent);
    line-height: 1;
  }

  #drop-hint p {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--dim);
    margin-top: 8px;
    text-transform: uppercase;
  }

  /* placed items on canvas */
  .canvas-item {
    position: absolute;
    cursor: grab;
    user-select: none;
    transform-origin: center center;
    z-index: 5;
    /* circle clip applied via JS per item */
  }
  .canvas-item:active { cursor: grabbing; }
  .canvas-item.selected {
    outline: 2px dashed var(--accent);
    outline-offset: 3px;
    z-index: 20;
  }
  .canvas-item img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
    display: block;
  }

  /* when circle-clipped, fill the circle fully */
  .clip-planet img {
    object-fit: cover;
  }

  /* resize handle */
  .resize-handle {
    position: absolute;
    bottom: -5px;
    right: -5px;
    width: 12px;
    height: 12px;
    background: var(--accent);
    border-radius: 50%;
    cursor: se-resize;
    z-index: 30;
    display: none;
  }
  .canvas-item.selected .resize-handle { display: block; }

  /* delete handle */
  .delete-handle {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 16px;
    height: 16px;
    background: var(--danger);
    border-radius: 50%;
    cursor: pointer;
    z-index: 30;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #fff;
    line-height: 1;
  }
  .canvas-item.selected .delete-handle { display: flex; }

  /* ── INFO BAR ── */
  #info-bar {
    background: var(--deep);
    border-top: 1px solid var(--border);
    padding: 5px 14px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 1px;
  }

  #info-bar span { font-family: 'Orbitron', sans-serif; }

  /* drag ghost */
  #drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    opacity: .75;
    transform: translate(-50%, -50%) scale(.85);
    display: none;
  }
  #drag-ghost img { width: 80px; height: 80px; object-fit: contain; }

  /* planet clip toggle */
  .clip-planet { border-radius: 50%; overflow: hidden; }

  /* layer order indicator */
  .layer-badge {
    position: absolute;
    bottom: -5px;
    left: -5px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 7px;
    color: var(--dim);
    padding: 1px 3px;
    display: none;
  }
  .canvas-item.selected .layer-badge { display: block; }
</style>
</head>
<body>

<!-- LEFT PANEL: Assets -->
<aside class="panel left" id="panel-left">
  <div class="panel-inner">
    <div class="panel-header">
      <div>
        <h1>☄ Assets</h1>
        <p>Drag to canvas</p>
      </div>
    </div>
    <div id="cat-tabs">
      <div class="cat-tab active" data-cat="all">All</div>
      <div class="cat-tab" data-cat="planets">Planets</div>
      <div class="cat-tab" data-cat="moons">Moons</div>
      <div class="cat-tab" data-cat="stars">Stars</div>
      <div class="cat-tab" data-cat="eyes">Eyes</div>
      <div class="cat-tab" data-cat="mouths">Mouths</div>
      <div class="cat-tab" data-cat="rings">Rings</div>
      <div class="cat-tab" data-cat="outlines">Outlines</div>
      <div class="cat-tab" data-cat="misc">Misc</div>
    </div>
    <div id="asset-grid"></div>
  </div>
</aside>

<!-- MAIN -->
<div id="main">
  <div id="toolbar">
    <div class="tool-group">
      <span class="tool-label">Layer</span>
      <button class="btn" id="btn-up" title="Bring Forward">↑ Fwd</button>
      <button class="btn" id="btn-down" title="Send Back">↓ Back</button>
    </div>
    <div class="tool-group">
      <span class="tool-label">Scale</span>
      <input type="range" id="scale-slider" min="20" max="400" value="100">
      <span class="scale-val" id="scale-val">100%</span>
    </div>
    <div class="tool-group">
      <span class="tool-label">Clip</span>
      <button class="btn" id="btn-clip">⬤ Circle Clip</button>
    </div>
    <div class="tool-group">
      <span class="tool-label">Flip</span>
      <button class="btn" id="btn-flip-h">↔ H</button>
      <button class="btn" id="btn-flip-v">↕ V</button>
    </div>
    <div class="tool-group">
      <span class="tool-label">Actions</span>
      <button class="btn" id="btn-dupe">⧉ Dupe</button>
      <button class="btn danger" id="btn-del">✕ Del</button>
    </div>
    <div class="tool-group">
      <button class="btn" id="btn-clear">Clear All</button>
      <button class="btn primary" id="btn-export">⬇ Save PNG</button>
    </div>
  </div>

  <div id="canvas-wrap">
    <!-- panel toggle tabs float on canvas edges -->
    <div class="panel-toggle" id="toggle-left">◀ Assets</div>
    <div class="panel-toggle" id="toggle-right">Layers ▶</div>

    <div id="drop-hint">
      <div class="big">☄</div>
      <p>Drag assets here to build your planet</p>
    </div>
    <div id="canvas"></div>
  </div>

  <div id="info-bar">
    <span id="info-count">0 items</span>
    <span id="info-sel">· Nothing selected</span>
    <span id="info-pos"></span>
  </div>
</div>

<!-- RIGHT PANEL: Layers -->
<aside class="panel right" id="panel-right">
  <div class="panel-inner">
    <div class="panel-header">
      <div>
        <h1>Layers</h1>
        <p>Top = front</p>
      </div>
    </div>
    <div id="layers-list">
      <div class="layers-empty">No layers yet</div>
    </div>
  </div>
</aside>

<!-- drag ghost -->
<div id="drag-ghost"><img id="ghost-img" src="" alt=""></div>

<script>
// ═══════════════════════════════════════════════════════════
// ASSET DATA
// ═══════════════════════════════════════════════════════════

const SZ = '/revision/latest/scale-to-width-down/250?cb=';

function img(path, cb) {
  return BASE + path + SZ + cb;
}

const ASSETS = [
  // ─── MAJOR PLANETS ───
  { cat: 'planets', name: 'Mercury', url: img('4/41/MERCURY_NEW_ASSET.jpeg','20251103193423') },

  { cat: 'planets', name: 'Gliese 667Cc', url: img('4/45/Gliese_667_cc_asset_not_official.png','20240612150435') },
  { cat: 'planets', name: 'Planet 9', url: img('4/45/Planet_9_Texture_Map.png','20240613154402') },
  { cat: 'planets', name: 'IRIS', url: img('5/5f/IRIS_new_texture.png','20240726222630') },
  { cat: 'planets', name: 'Vulcan', url: img('3/3d/VULCAN.jpeg','20251103195653') },

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let selectedEl = null;
let items = [];
let zCounter = 100;
let currentCat = 'all';

// drag state
let dragSrc = null; // {url, name}
let dragActive = false;
let ghostX = 0, ghostY = 0;

// canvas-item drag state
let movingEl = null;
let moveOffX = 0, moveOffY = 0;

// resize state
let resizing = false;
let resizeEl = null;
let resizeStartX = 0, resizeStartY = 0;
let resizeStartW = 0, resizeStartH = 0;

// ═══════════════════════════════════════════════════════════
// RENDER SIDEBAR
// ═══════════════════════════════════════════════════════════
const grid = document.getElementById('asset-grid');

function renderGrid() {
  grid.innerHTML = '';
  const filtered = currentCat === 'all' ? ASSETS : ASSETS.filter(a => a.cat === currentCat);

  // group by cat when showing all
  if (currentCat === 'all') {
    const cats = ['planets','moons','stars','eyes','mouths','rings','outlines','misc'];
    const catLabels = {
      planets:'⬤ Planets', moons:'◎ Moons', stars:'★ Stars',
      eyes:'◉ Eyes', mouths:'⌒ Mouths', rings:'◌ Rings',
      outlines:'□ Outlines & Shades', misc:'✦ Characters & Misc'
    };
    cats.forEach(cat => {
      const group = filtered.filter(a => a.cat === cat);
      if (!group.length) return;
      const lbl = document.createElement('div');
      lbl.className = 'cat-label';
      lbl.textContent = catLabels[cat];
      grid.appendChild(lbl);
      group.forEach(a => grid.appendChild(makeThumb(a)));
    });
  } else {
    filtered.forEach(a => grid.appendChild(makeThumb(a)));
  }
}

function makeThumb(asset) {
  const div = document.createElement('div');
  div.className = 'asset-item';
  div.title = asset.name;

  const thumbDiv = document.createElement('div');
  thumbDiv.className = 'thumb';

  const imgEl = document.createElement('img');
  imgEl.src = asset.url;
  imgEl.alt = asset.name;
  imgEl.loading = 'lazy';
  imgEl.crossOrigin = 'anonymous';

  thumbDiv.appendChild(imgEl);

  const lbl = document.createElement('span');
  lbl.textContent = asset.name;

  div.appendChild(thumbDiv);
  div.appendChild(lbl);

  // pointer drag
  div.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    dragSrc = asset;
    dragActive = false;
    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('mouseup', onDragUp);
  });
  div.addEventListener('touchstart', e => {
    const t = e.touches[0];
    dragSrc = asset;
    dragActive = false;
    ghostX = t.clientX; ghostY = t.clientY;
  }, { passive: true });

  return div;
}

// ═══════════════════════════════════════════════════════════
// DRAG FROM SIDEBAR
// ═══════════════════════════════════════════════════════════
const ghost = document.getElementById('drag-ghost');
const ghostImg = document.getElementById('ghost-img');

function showGhost(x, y, url) {
  ghost.style.display = 'block';
  ghost.style.left = x + 'px';
  ghost.style.top = y + 'px';
  ghostImg.src = url;
}
function hideGhost() { ghost.style.display = 'none'; }

function onDragMove(e) {
  if (!dragSrc) return;
  dragActive = true;
  ghostX = e.clientX; ghostY = e.clientY;
  showGhost(ghostX, ghostY, dragSrc.url);
}

function onDragUp(e) {
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragUp);
  hideGhost();
  if (dragSrc && dragActive) {
    // check if dropped on canvas
    const cw = document.getElementById('canvas-wrap');
    const rect = cw.getBoundingClientRect();
    if (e.clientX >= rect.left && e.clientX <= rect.right &&
        e.clientY >= rect.top && e.clientY <= rect.bottom) {
      placeItem(dragSrc, e.clientX - rect.left, e.clientY - rect.top);
    }
  }
  dragSrc = null; dragActive = false;
}

// ═══════════════════════════════════════════════════════════
// PLACE ITEM ON CANVAS
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');

function placeItem(asset, x, y, size = 140) {
  document.getElementById('drop-hint').style.opacity = '0';

  const el = document.createElement('div');
  el.className = 'canvas-item';
  el.style.width = size + 'px';
  el.style.height = size + 'px';
  el.style.left = (x - size/2) + 'px';
  el.style.top = (y - size/2) + 'px';
  el.style.zIndex = ++zCounter;

  const img = document.createElement('img');
  img.src = asset.url;
  img.alt = asset.name;
  img.crossOrigin = 'anonymous';
  img.draggable = false;
  el.appendChild(img);

  // resize handle
  const rh = document.createElement('div');
  rh.className = 'resize-handle';
  rh.title = 'Drag to resize';
  el.appendChild(rh);

  // delete handle
  const dh = document.createElement('div');
  dh.className = 'delete-handle';
  dh.textContent = '×';
  dh.title = 'Delete';
  el.appendChild(dh);

  // layer badge
  const lb = document.createElement('div');
  lb.className = 'layer-badge';
  lb.textContent = 'z' + zCounter;
  el.appendChild(lb);

  canvas.appendChild(el);

  const data = {
    el, asset,
    x: x - size/2, y: y - size/2,
    w: size, h: size,
    z: zCounter,
    scaleX: 1, scaleY: 1,
    clipped: false
  };
  items.push(data);

  // events - mouse
  el.addEventListener('mousedown', e => {
    if (e.target === rh || e.target === dh) return;
    e.stopPropagation();
    selectItem(data);
    startMove(e, data);
  });

  rh.addEventListener('mousedown', e => {
    e.stopPropagation();
    startResize(e, data);
  });

  dh.addEventListener('click', e => {
    e.stopPropagation();
    removeItem(data);
  });

  // events - touch (move canvas item)
  el.addEventListener('touchstart', e => {
    if (e.target === rh || e.target === dh) return;
    e.stopPropagation();
    const t = e.touches[0];
    selectItem(data);
    startMoveTouch(t, data);
  }, { passive: true });

  // touch resize handle
  rh.addEventListener('touchstart', e => {
    e.stopPropagation();
    e.preventDefault();
    const t = e.touches[0];
    startResizeTouch(t, data);
  }, { passive: false });

  // touch delete
  dh.addEventListener('touchend', e => {
    e.stopPropagation();
    removeItem(data);
  });

  selectItem(data);
  updateInfoBar();
  if (typeof refreshLayers === 'function') refreshLayers();
  return data;
}

// ═══════════════════════════════════════════════════════════
// SELECT
// ═══════════════════════════════════════════════════════════
function selectItem(data) {
  if (selectedEl) selectedEl.el.classList.remove('selected');
  selectedEl = data;
  if (data) {
    data.el.classList.add('selected');
    data.el.style.zIndex = ++zCounter;
    data.z = zCounter;
    syncSlider(data);
  }
  updateInfoBar();
  if (typeof refreshLayers === 'function') refreshLayers();
}

function syncSlider(data) {
  const pct = Math.round((data.w / 140) * 100);
  document.getElementById('scale-slider').value = pct;
  document.getElementById('scale-val').textContent = pct + '%';
}

canvas.addEventListener('mousedown', e => {
  if (e.target === canvas) {
    if (selectedEl) selectedEl.el.classList.remove('selected');
    selectedEl = null;
    updateInfoBar();
  }
});

// ═══════════════════════════════════════════════════════════
// MOVE
// ═══════════════════════════════════════════════════════════
function startMove(e, data) {
  movingEl = data;
  const rect = data.el.getBoundingClientRect();
  moveOffX = e.clientX - rect.left;
  moveOffY = e.clientY - rect.top;
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onMoveUp);
}

function onMove(e) {
  if (!movingEl) return;
  const cwr = document.getElementById('canvas-wrap').getBoundingClientRect();
  let nx = e.clientX - cwr.left - moveOffX;
  let ny = e.clientY - cwr.top - moveOffY;
  movingEl.el.style.left = nx + 'px';
  movingEl.el.style.top = ny + 'px';
  movingEl.x = nx; movingEl.y = ny;
  updateInfoPos(nx, ny);
}

function onMoveUp() {
  movingEl = null;
  document.removeEventListener('mousemove', onMove);
  document.removeEventListener('mouseup', onMoveUp);
}

// ─── Touch Move ───
function startMoveTouch(t, data) {
  movingEl = data;
  const rect = data.el.getBoundingClientRect();
  moveOffX = t.clientX - rect.left;
  moveOffY = t.clientY - rect.top;
}

function onTouchMoveItem(e) {
  if (!movingEl) return;
  // prevent page scroll while moving
  e.preventDefault();
  const t = e.touches[0];
  const cwr = document.getElementById('canvas-wrap').getBoundingClientRect();
  let nx = t.clientX - cwr.left - moveOffX;
  let ny = t.clientY - cwr.top - moveOffY;
  movingEl.el.style.left = nx + 'px';
  movingEl.el.style.top = ny + 'px';
  movingEl.x = nx; movingEl.y = ny;
  updateInfoPos(nx, ny);
}

function onTouchMoveEnd() {
  movingEl = null;
}

// ═══════════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════════
function startResize(e, data) {
  resizing = true; resizeEl = data;
  resizeStartX = e.clientX; resizeStartY = e.clientY;
  resizeStartW = data.w; resizeStartH = data.h;
  document.addEventListener('mousemove', onResize);
  document.addEventListener('mouseup', onResizeUp);
}

function onResize(e) {
  if (!resizing) return;
  const dx = e.clientX - resizeStartX;
  const dy = e.clientY - resizeStartY;
  const delta = Math.max(dx, dy);
  const newW = Math.max(30, resizeStartW + delta);
  resizeEl.w = newW; resizeEl.h = newW;
  resizeEl.el.style.width = newW + 'px';
  resizeEl.el.style.height = newW + 'px';
  syncSlider(resizeEl);
}

function onResizeUp() {
  resizing = false; resizeEl = null;
  document.removeEventListener('mousemove', onResize);
  document.removeEventListener('mouseup', onResizeUp);
}

// ─── Touch Resize ───
function startResizeTouch(t, data) {
  resizing = true; resizeEl = data;
  resizeStartX = t.clientX; resizeStartY = t.clientY;
  resizeStartW = data.w; resizeStartH = data.h;
}

function onTouchResize(e) {
  if (!resizing) return;
  e.preventDefault();
  const t = e.touches[0];
  const dx = t.clientX - resizeStartX;
  const dy = t.clientY - resizeStartY;
  const delta = Math.max(dx, dy);
  const newW = Math.max(30, resizeStartW + delta);
  resizeEl.w = newW; resizeEl.h = newW;
  resizeEl.el.style.width = newW + 'px';
  resizeEl.el.style.height = newW + 'px';
  syncSlider(resizeEl);
}

function onTouchResizeEnd() {
  resizing = false; resizeEl = null;
}

// ═══════════════════════════════════════════════════════════
// REMOVE
// ═══════════════════════════════════════════════════════════
function removeItem(data) {
  data.el.remove();
  items = items.filter(i => i !== data);
  if (selectedEl === data) selectedEl = null;
  if (!items.length) document.getElementById('drop-hint').style.opacity = '.25';
  updateInfoBar();
  if (typeof refreshLayers === 'function') refreshLayers();
}

// ═══════════════════════════════════════════════════════════
// TOOLBAR ACTIONS
// ═══════════════════════════════════════════════════════════
document.getElementById('btn-up').addEventListener('click', () => {
  if (!selectedEl) return;
  selectedEl.el.style.zIndex = ++zCounter;
  selectedEl.z = zCounter;
});

document.getElementById('btn-down').addEventListener('click', () => {
  if (!selectedEl) return;
  const z = Math.max(1, selectedEl.z - 10);
  selectedEl.el.style.zIndex = z;
  selectedEl.z = z;
});

document.getElementById('scale-slider').addEventListener('input', function() {
  if (!selectedEl) return;
  const pct = parseInt(this.value);
  document.getElementById('scale-val').textContent = pct + '%';
  const size = Math.round(140 * pct / 100);
  selectedEl.w = size; selectedEl.h = size;
  selectedEl.el.style.width = size + 'px';
  selectedEl.el.style.height = size + 'px';
});

document.getElementById('btn-clip').addEventListener('click', () => {
  if (!selectedEl) return;
  selectedEl.clipped = !selectedEl.clipped;
  selectedEl.el.classList.toggle('clip-planet', selectedEl.clipped);
  document.getElementById('btn-clip').textContent = selectedEl.clipped ? '□ Remove Clip' : '⬤ Circle Clip';
});

document.getElementById('btn-flip-h').addEventListener('click', () => {
  if (!selectedEl) return;
  selectedEl.scaleX *= -1;
  applyTransform(selectedEl);
});

document.getElementById('btn-flip-v').addEventListener('click', () => {
  if (!selectedEl) return;
  selectedEl.scaleY *= -1;
  applyTransform(selectedEl);
});

function applyTransform(data) {
  data.el.querySelector('img').style.transform = `scale(${data.scaleX}, ${data.scaleY})`;
}

document.getElementById('btn-dupe').addEventListener('click', () => {
  if (!selectedEl) return;
  const d = selectedEl;
  const newData = placeItem(d.asset, d.x + d.w/2 + 20, d.y + d.h/2 + 20, d.w);
  if (d.clipped) {
    newData.clipped = true;
    newData.el.classList.add('clip-planet');
  }
  newData.scaleX = d.scaleX; newData.scaleY = d.scaleY;
  applyTransform(newData);
});

document.getElementById('btn-del').addEventListener('click', () => {
  if (selectedEl) removeItem(selectedEl);
});

document.getElementById('btn-clear').addEventListener('click', () => {
  if (!confirm('Clear all items?')) return;
  items.forEach(i => i.el.remove());
  items = []; selectedEl = null;
  document.getElementById('drop-hint').style.opacity = '.25';
  updateInfoBar();
});

// ═══════════════════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════════════════
document.getElementById('btn-export').addEventListener('click', async () => {
  const btn = document.getElementById('btn-export');
  btn.textContent = '⏳ Exporting...';
  btn.disabled = true;

  const cw = document.getElementById('canvas-wrap');
  const W = cw.offsetWidth, H = cw.offsetHeight;

  const cvs = document.createElement('canvas');
  cvs.width = W; cvs.height = H;
  const ctx = cvs.getContext('2d');

  // dark bg
  ctx.fillStyle = '#04060f';
  ctx.fillRect(0,0,W,H);

  // draw stars
  ctx.fillStyle = 'rgba(200,216,255,0.4)';
  const starPositions = [
    [.1,.15],[.25,.4],[.4,.1],[.55,.6],[.65,.25],
    [.75,.75],[.85,.45],[.9,.1],[.15,.8],[.05,.55],
    [.48,.88],[.92,.35],[.33,.7],[.78,.5],[.2,.25]
  ];
  starPositions.forEach(([px,py]) => {
    ctx.beginPath();
    ctx.arc(px*W, py*H, 1.2, 0, Math.PI*2);
    ctx.fill();
  });

  // sort items by z
  const sorted = [...items].sort((a,b) => a.z - b.z);

  for (const item of sorted) {
    const x = parseFloat(item.el.style.left);
    const y = parseFloat(item.el.style.top);
    const w = item.w, h = item.h;

    try {
      const image = await loadImage(item.asset.url);
      ctx.save();

      if (item.clipped) {
        // clipped = circle, fill it (cover)
        ctx.beginPath();
        ctx.arc(x + w/2, y + h/2, Math.min(w,h)/2, 0, Math.PI*2);
        ctx.clip();
        ctx.translate(x + w/2, y + h/2);
        ctx.scale(item.scaleX, item.scaleY);
        // cover: scale so image fills the circle
        const r = Math.min(w,h)/2;
        const iw = image.naturalWidth, ih = image.naturalHeight;
        const scale = Math.max((r*2)/iw, (r*2)/ih);
        const dw = iw * scale, dh = ih * scale;
        ctx.drawImage(image, -dw/2, -dh/2, dw, dh);
      } else {
        // unclipped = contain: preserve natural aspect ratio inside the square
        ctx.translate(x + w/2, y + h/2);
        ctx.scale(item.scaleX, item.scaleY);
        const iw = image.naturalWidth, ih = image.naturalHeight;
        const scale = Math.min(w/iw, h/ih);
        const dw = iw * scale, dh = ih * scale;
        ctx.drawImage(image, -dw/2, -dh/2, dw, dh);
      }

      ctx.restore();
    } catch(e) {
      console.warn('Could not draw', item.asset.name, e);
    }
  }

  const link = document.createElement('a');
  link.download = 'solarballs-planet.png';
  link.href = cvs.toDataURL('image/png');
  link.click();

  btn.textContent = '⬇ Save PNG';
  btn.disabled = false;
});

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const i = new Image();
    i.crossOrigin = 'anonymous';
    i.onload = () => resolve(i);
    i.onerror = reject;
    i.src = url;
  });
}

// ═══════════════════════════════════════════════════════════
// CATEGORY TABS
// ═══════════════════════════════════════════════════════════
document.getElementById('cat-tabs').addEventListener('click', e => {
  const tab = e.target.closest('.cat-tab');
  if (!tab) return;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentCat = tab.dataset.cat;
  renderGrid();
});

// ═══════════════════════════════════════════════════════════
// INFO BAR
// ═══════════════════════════════════════════════════════════
function updateInfoBar() {
  document.getElementById('info-count').textContent = items.length + ' item' + (items.length !== 1 ? 's' : '');
  document.getElementById('info-sel').textContent = selectedEl
    ? '· ' + selectedEl.asset.name + ' (' + selectedEl.asset.cat + ')'
    : '· Nothing selected';
}

function updateInfoPos(x, y) {
  document.getElementById('info-pos').textContent = `x:${Math.round(x)} y:${Math.round(y)}`;
}

// ═══════════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (!selectedEl) return;
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (document.activeElement === document.body) removeItem(selectedEl);
  }
  const STEP = e.shiftKey ? 10 : 1;
  if (e.key === 'ArrowLeft') { selectedEl.x -= STEP; selectedEl.el.style.left = selectedEl.x + 'px'; }
  if (e.key === 'ArrowRight') { selectedEl.x += STEP; selectedEl.el.style.left = selectedEl.x + 'px'; }
  if (e.key === 'ArrowUp') { selectedEl.y -= STEP; selectedEl.el.style.top = selectedEl.y + 'px'; }
  if (e.key === 'ArrowDown') { selectedEl.y += STEP; selectedEl.el.style.top = selectedEl.y + 'px'; }
});

// (touch handling consolidated above)

// ═══════════════════════════════════════════════════════════
// GLOBAL TOUCH LISTENERS FOR CANVAS ITEMS
// ═══════════════════════════════════════════════════════════
document.addEventListener('touchmove', e => {
  // sidebar drag ghost
  if (dragSrc) {
    dragActive = true;
    const t = e.touches[0];
    ghostX = t.clientX; ghostY = t.clientY;
    showGhost(ghostX, ghostY, dragSrc.url);
    return;
  }
  // canvas item move
  if (movingEl) { onTouchMoveItem(e); return; }
  // canvas item resize
  if (resizing) { onTouchResize(e); return; }
}, { passive: false });

document.addEventListener('touchend', e => {
  // sidebar drag drop
  if (dragSrc && dragActive) {
    hideGhost();
    const t = e.changedTouches[0];
    const cwr = document.getElementById('canvas-wrap').getBoundingClientRect();
    if (t.clientX >= cwr.left && t.clientX <= cwr.right &&
        t.clientY >= cwr.top && t.clientY <= cwr.bottom) {
      placeItem(dragSrc, t.clientX - cwr.left, t.clientY - cwr.top);
    }
    dragSrc = null; dragActive = false;
    return;
  }
  if (dragSrc) { dragSrc = null; dragActive = false; hideGhost(); return; }
  // end move / resize
  onTouchMoveEnd();
  onTouchResizeEnd();
});

// ═══════════════════════════════════════════════════════════
// PANEL COLLAPSE TOGGLES
// ═══════════════════════════════════════════════════════════
const panelLeft  = document.getElementById('panel-left');
const panelRight = document.getElementById('panel-right');
const toggleLeft  = document.getElementById('toggle-left');
const toggleRight = document.getElementById('toggle-right');

function setPanels(showLeft, showRight) {
  panelLeft.classList.toggle('collapsed', !showLeft);
  panelRight.classList.toggle('collapsed', !showRight);
  toggleLeft.textContent  = showLeft  ? '◀ Assets'  : 'Assets ▶';
  toggleRight.textContent = showRight ? 'Layers ▶' : '◀ Layers';
}

toggleLeft.addEventListener('click', () => {
  const wasOpen = !panelLeft.classList.contains('collapsed');
  if (wasOpen) {
    setPanels(false, false);
  } else {
    setPanels(true, false);
  }
});

toggleRight.addEventListener('click', () => {
  const wasOpen = !panelRight.classList.contains('collapsed');
  if (wasOpen) {
    setPanels(false, false);
  } else {
    setPanels(false, true);
  }
});

// ═══════════════════════════════════════════════════════════
// LAYERS PANEL
// ═══════════════════════════════════════════════════════════
function refreshLayers() {
  const list = document.getElementById('layers-list');
  list.innerHTML = '';

  // show top-of-stack first
  const sorted = [...items].sort((a, b) => b.z - a.z);

  if (!sorted.length) {
    list.innerHTML = '<div class="layers-empty">No layers yet</div>';
    return;
  }

  sorted.forEach(item => {
    const row = document.createElement('div');
    row.className = 'layer-row' + (item === selectedEl ? ' active' : '');
    row.dataset.id = item.z;

    const thumb = document.createElement('div');
    thumb.className = 'lr-thumb';
    const timg = document.createElement('img');
    timg.src = item.asset.url;
    timg.crossOrigin = 'anonymous';
    thumb.appendChild(timg);

    const name = document.createElement('div');
    name.className = 'lr-name';
    name.textContent = item.asset.name;

    const zLabel = document.createElement('div');
    zLabel.className = 'lr-z';
    zLabel.textContent = '#' + item.z;

    const del = document.createElement('div');
    del.className = 'lr-del';
    del.textContent = '×';
    del.title = 'Delete';

    row.appendChild(thumb);
    row.appendChild(name);
    row.appendChild(zLabel);
    row.appendChild(del);
    list.appendChild(row);

    row.addEventListener('click', e => {
      if (e.target === del) return;
      selectItem(item);
      refreshLayers();
    });
    del.addEventListener('click', e => {
      e.stopPropagation();
      removeItem(item);
      refreshLayers();
    });
  });
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
renderGrid();
updateInfoBar();
refreshLayers();
</script>
