<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>APUI Node Editor</title>
<style>
:root {
  --bg:        #1a1d22;
  --bg2:       #20242b;
  --bg3:       #272c35;
  --bg4:       #2e3440;
  --border:    #343b47;
  --border2:   #424b5a;
  --text:      #c9d1d9;
  --text2:     #7d8590;
  --text3:     #4a5162;
  --accent:    #58a6ff;
  --accent-bg: rgba(88,166,255,.12);
  --green:     #3fb950;
  --green-bg:  rgba(63,185,80,.12);
  --red:       #f85149;
  --red-bg:    rgba(248,81,73,.12);
  --amber:     #d29922;
  --amber-bg:  rgba(210,153,34,.12);
  --r:  8px;
  --rs: 6px;
  --safe-b: env(safe-area-inset-bottom, 0px);
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent }
html { height:100%; height:-webkit-fill-available }
body { height:100%; height:-webkit-fill-available; font-family:'SF Mono','Fira Mono','Roboto Mono',monospace; font-size:14px; color:var(--text); background:var(--bg); overflow:hidden; overscroll-behavior:none }
::-webkit-scrollbar { width:3px }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px }

/* ══ ROOT SHELL ══ */
#shell { display:flex; height:100%; height:-webkit-fill-available; overflow:hidden; position:relative }

/* ══ DRAWER (sessions sidebar) ══ */
#drawer {
  position:fixed; inset:0; z-index:100;
  display:flex; pointer-events:none;
}
#drawer.open { pointer-events:all }
#drawer-scrim {
  position:absolute; inset:0;
  background:rgba(0,0,0,.55);
  opacity:0; transition:opacity .22s ease;
}
#drawer.open #drawer-scrim { opacity:1 }
#drawer-panel {
  position:relative; z-index:1;
  width:min(280px, 82vw);
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  transform:translateX(-100%);
  transition:transform .22s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
#drawer.open #drawer-panel { transform:translateX(0) }
.dr-head { display:flex; align-items:center; justify-content:space-between; padding:16px 15px 12px; border-bottom:1px solid var(--border); flex-shrink:0 }
.dr-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--text3) }
.sess-list { flex:1; overflow-y:auto; padding:8px 8px }
.sess-item { padding:11px 10px; border-radius:var(--rs); cursor:pointer; margin-bottom:4px; border:1px solid transparent; transition:all .12s; -webkit-user-select:none }
.sess-item:active { background:var(--bg4) }
.sess-item.active { background:var(--bg3); border-color:var(--accent) }
.sess-name { font-size:13px; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-bottom:3px }
.sess-meta { font-size:11px; color:var(--text3); display:flex; gap:6px; align-items:center }
.dot { width:6px; height:6px; border-radius:50%; flex-shrink:0 }
.dot-on { background:var(--green) }
.dot-off { background:var(--text3) }
.dr-foot { padding:10px 8px; border-top:1px solid var(--border); flex-shrink:0 }

/* ══ MAIN ══ */
#main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0 }

/* ── Topbar ── */
#topbar {
  display:flex; align-items:center; gap:8px;
  padding:0 12px;
  height:52px;
  border-bottom:1px solid var(--border);
  background:var(--bg2);
  flex-shrink:0;
}
.tb-menu { width:40px; height:40px; display:flex; align-items:center; justify-content:center; flex-shrink:0; border-radius:var(--rs); border:1px solid var(--border); background:transparent; color:var(--text2); cursor:pointer; font-size:16px }
.tb-menu:active { background:var(--bg3) }
.tb-name { font-size:13px; color:var(--text); font-weight:600; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0 }
.tb-node { font-size:11px; color:var(--text2); padding:3px 9px; background:var(--bg3); border-radius:var(--rs); border:1px solid var(--border); white-space:nowrap; flex-shrink:0 }

/* ── Views ── */
#view-intent { display:flex; flex-direction:column; flex:1; overflow:hidden }
#view-work   { display:none; flex-direction:column; flex:1; overflow:hidden }

/* ── Intent view ── */
.intent-scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch }
.intent-inner { display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:28px 20px 20px; gap:16px; min-height:100% }
.intent-eyebrow { font-size:10px; font-weight:700; letter-spacing:.15em; text-transform:uppercase; color:var(--text3) }
.intent-h { font-size:20px; font-weight:700; color:var(--text); text-align:center; line-height:1.3 }
.intent-sub { font-size:13px; color:var(--text2); text-align:center; line-height:1.65; max-width:340px }
.intent-form { width:100%; max-width:500px; display:flex; flex-direction:column; gap:10px }
.node-pills { display:flex; gap:5px; flex-wrap:wrap; justify-content:center }
.intent-ta {
  width:100%; padding:13px 14px;
  font-family:inherit; font-size:15px;
  border:1px solid var(--border2); border-radius:var(--r);
  background:var(--bg3); color:var(--text);
  resize:none; line-height:1.6; min-height:110px;
}
.intent-ta:focus { outline:none; border-color:var(--accent) }
.intent-ta::placeholder { color:var(--text3) }
.intent-row { display:flex; gap:8px; justify-content:flex-end }

/* ── Work view ── */
.work-scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:12px 12px; display:flex; flex-direction:column; gap:10px; padding-bottom:4px }

/* Cards */
.card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); overflow:hidden }
.card-hd { display:flex; align-items:center; justify-content:space-between; padding:9px 13px; border-bottom:1px solid var(--border); background:var(--bg3); gap:8px }
.card-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--text3); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
.card-bd { padding:12px 13px }

/* State tabs */
.stabs { display:flex; border-bottom:1px solid var(--border); overflow-x:auto; -webkit-overflow-scrolling:touch }
.stabs::-webkit-scrollbar { display:none }
.stab {
  flex:1; min-width:64px;
  padding:9px 4px;
  font-size:10px; font-weight:700;
  cursor:pointer; text-align:center;
  color:var(--text3); border:none;
  background:transparent; font-family:inherit;
  text-transform:uppercase; letter-spacing:.07em;
  transition:all .1s; border-bottom:2px solid transparent;
  white-space:nowrap;
}
.stab:active { color:var(--text2) }
.stab.active { color:var(--accent); border-bottom-color:var(--accent) }
.spane { display:none; padding:11px 13px; font-size:13px; line-height:1.7; min-height:90px; max-height:200px; overflow-y:auto }
.spane.active { display:block }
.spane.code { background:#161920; color:#abb2bf; white-space:pre-wrap; font-family:inherit; font-size:12px; line-height:1.6 }
.pk { color:#c678dd } .pf { color:#61afef } .ps { color:#98c379 } .pc { color:#3c4552; font-style:italic }

/* Diff */
.dl { font-size:12px; line-height:1.65; padding:2px 6px; border-radius:3px; font-family:inherit; white-space:pre-wrap; word-break:break-all }
.dl.add { background:rgba(63,185,80,.07); color:var(--green) }
.dl.del { background:rgba(248,81,73,.07); color:var(--red); text-decoration:line-through; opacity:.65 }
.dl.ctx { color:var(--text3) }

/* Attempts */
.att-list { display:flex; flex-direction:column; gap:6px }
.att { border:1px solid var(--border); border-radius:var(--rs); overflow:hidden }
.att-hd { display:flex; align-items:center; gap:7px; padding:10px 11px; cursor:pointer; background:var(--bg3); transition:background .1s; min-height:44px }
.att-hd:active { background:var(--bg4) }
.att-prompt { font-size:12px; color:var(--text); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0 }
.att-time { font-size:10px; color:var(--text3); white-space:nowrap; flex-shrink:0 }
.att-body { display:none; padding:11px 12px; border-top:1px solid var(--border); background:var(--bg2) }
.att-body.open { display:block }
.att-result { margin-top:6px; padding:8px 10px; background:var(--bg3); border-radius:var(--rs); font-size:12px; color:var(--text2); line-height:1.55; max-height:100px; overflow-y:auto }
.outcome-row { display:flex; gap:7px; margin-top:9px; align-items:center; flex-wrap:wrap }
.oc-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.06em }

/* Pills */
.pill-row { display:flex; flex-wrap:wrap; gap:6px }
.pill { font-family:inherit; font-size:12px; padding:6px 12px; border:1px solid var(--border2); border-radius:20px; background:var(--bg3); color:var(--text2); cursor:pointer; transition:all .12s; white-space:nowrap; max-width:230px; overflow:hidden; text-overflow:ellipsis; min-height:34px; display:flex; align-items:center }
.pill:active { border-color:var(--accent); color:var(--accent); background:var(--accent-bg) }

/* ══ PROMPT BAR ══ */
.prompt-bar {
  flex-shrink:0;
  border-top:1px solid var(--border);
  background:var(--bg2);
  padding:10px 12px;
  padding-bottom:calc(10px + var(--safe-b));
  display:flex; flex-direction:column; gap:8px;
}
.pb-ctx { display:flex; gap:7px; align-items:center; flex-wrap:wrap }
.pb-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.06em }
.pb-row { display:flex; gap:7px; align-items:flex-end }
.pb-ta {
  flex:1; padding:10px 12px;
  font-family:inherit; font-size:14px;
  border:1px solid var(--border2); border-radius:var(--rs);
  background:var(--bg3); color:var(--text);
  resize:none; min-height:44px; max-height:130px;
  line-height:1.5; -webkit-appearance:none;
}
.pb-ta:focus { outline:none; border-color:var(--accent) }
.pb-ta::placeholder { color:var(--text3) }
.nd-sel {
  font-family:inherit; font-size:12px;
  padding:6px 8px; min-height:34px;
  border:1px solid var(--border2); border-radius:var(--rs);
  background:var(--bg3); color:var(--text2); cursor:pointer;
  -webkit-appearance:none;
}
.nd-sel:focus { outline:none; border-color:var(--accent) }

/* ══ BUTTONS ══ */
.btn {
  font-family:inherit; font-size:13px;
  padding:8px 14px; min-height:40px;
  border:1px solid var(--border2); border-radius:var(--rs);
  background:transparent; color:var(--text);
  cursor:pointer; white-space:nowrap;
  transition:all .12s;
  display:inline-flex; align-items:center; gap:5px;
  -webkit-user-select:none;
}
.btn:active { background:var(--bg3); border-color:var(--accent); color:var(--accent) }
.btn.sm  { padding:6px 11px; font-size:12px; min-height:34px }
.btn.xs  { padding:5px 9px;  font-size:11px; min-height:32px }
.btn.prim { border-color:var(--accent); color:var(--accent); background:var(--accent-bg) }
.btn.prim:active { opacity:.8 }
.btn.ok   { border-color:var(--green); color:var(--green); background:var(--green-bg) }
.btn.fail { border-color:var(--red);   color:var(--red);   background:var(--red-bg)   }

/* Badges */
.badge { font-size:10px; padding:3px 8px; border-radius:20px; font-weight:700; white-space:nowrap }
.badge.css  { background:var(--accent-bg); color:var(--accent) }
.badge.html { background:var(--amber-bg);  color:var(--amber)  }
.badge.js   { background:var(--green-bg);  color:var(--green)  }
.badge.ok      { background:var(--green-bg);  color:var(--green)  }
.badge.fail    { background:var(--red-bg);    color:var(--red)    }
.badge.pending { background:var(--amber-bg);  color:var(--amber)  }

.empty { color:var(--text3); font-size:12px; padding:8px 0; text-align:center }
.sec-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:4px }

@keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:1} }
.spin { display:inline-flex; gap:3px }
.spin span { width:5px; height:5px; border-radius:50%; background:var(--accent); animation:pulse 1.1s ease infinite }
.spin span:nth-child(2) { animation-delay:.18s }
.spin span:nth-child(3) { animation-delay:.36s }

/* ══ DESKTOP: restore sidebar layout at ≥680px ══ */
@media (min-width:680px) {
  #drawer { position:static; pointer-events:all; width:220px; min-width:220px; display:flex }
  #drawer-scrim { display:none }
  #drawer-panel { position:static; transform:none !important; transition:none; width:100%; border-right:1px solid var(--border) }
  .tb-menu { display:none }
  .spane { max-height:200px }
  .stab { padding:7px 4px }
  .work-scroll { padding:14px 16px }
  .prompt-bar { padding:10px 14px; padding-bottom:10px }
}
</style>
</head>
<body>
<div id="shell">

  <!-- ══ DRAWER ══ -->
  <div id="drawer">
    <div id="drawer-scrim" onclick="closeDrawer()"></div>
    <div id="drawer-panel">
      <div class="dr-head">
        <span class="dr-title">Sessions</span>
        <button class="btn xs" onclick="newSession()">+ new</button>
      </div>
      <div class="sess-list" id="sess-list"></div>
      <div class="dr-foot">
        <button class="btn sm" style="width:100%;justify-content:center" onclick="newSession()">+ new session</button>
      </div>
    </div>
  </div>

  <!-- ══ MAIN ══ -->
  <div id="main">

    <!-- Topbar -->
    <div id="topbar">
      <button class="tb-menu" onclick="openDrawer()" aria-label="Sessions">☰</button>
      <span class="tb-name" id="tb-name">—</span>
      <span id="tb-node" class="tb-node" style="display:none"></span>
      <button class="btn sm" id="btn-intent" style="display:none" onclick="goToIntent()">← intent</button>
    </div>

    <!-- ════ INTENT VIEW ════ -->
    <div id="view-intent">
      <div class="intent-scroll">
        <div class="intent-inner">
          <span class="intent-eyebrow">APUI · Node Editor</span>
          <div class="intent-h">What are you working on?</div>
          <div class="intent-sub">Describe your goal. The AI will keep this as context for every change across any node in this session.</div>
          <div class="intent-form">
            <div id="node-pills" class="node-pills"></div>
            <textarea id="intent-input" class="intent-ta" rows="4"
              placeholder="e.g. Make the nav sticky, fix the mobile hamburger toggle, and tighten card spacing on the home page…"></textarea>
            <div class="intent-row">
              <button class="btn sm" id="cancel-intent-btn" onclick="cancelIntent()" style="display:none">cancel</button>
              <button class="btn sm prim" onclick="startSession()">start session →</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ════ WORK VIEW ════ -->
    <div id="view-work">

      <div class="work-scroll" id="work-scroll">

        <!-- Intent -->
        <div class="card">
          <div class="card-hd">
            <span class="card-label">session intent</span>
            <button class="btn xs" onclick="goToIntent()">edit</button>
          </div>
          <div class="card-bd" id="intent-display" style="font-size:13px;color:var(--text);line-height:1.65"></div>
        </div>

        <!-- Current state -->
        <div class="card">
          <div class="card-hd">
            <span class="card-label" id="state-lbl">current state</span>
            <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
              <span id="state-badge" class="badge css">css</span>
              <button class="btn xs" onclick="renderWork()">↻</button>
            </div>
          </div>
          <div class="stabs" id="stabs-row">
            <button class="stab active" onclick="switchSTab('prose',this)">language</button>
            <button class="stab" onclick="switchSTab('pseudo',this)">pseudo</button>
            <button class="stab" onclick="switchSTab('code',this)">code</button>
            <button class="stab" onclick="switchSTab('diff',this)">diff</button>
          </div>
          <div id="sp-prose"  class="spane active" style="color:var(--text)"></div>
          <div id="sp-pseudo" class="spane code"></div>
          <div id="sp-code"   class="spane code"></div>
          <div id="sp-diff"   class="spane"></div>
        </div>

        <!-- Quick re-invoke -->
        <div class="card">
          <div class="card-hd"><span class="card-label">quick re-invoke</span></div>
          <div class="card-bd"><div id="quick-pills" class="pill-row"></div></div>
        </div>

        <!-- Attempts -->
        <div class="card" style="margin-bottom:6px">
          <div class="card-hd"><span class="card-label" id="att-lbl">attempts · node</span></div>
          <div class="card-bd" style="padding:8px 10px">
            <div id="att-list" class="att-list"></div>
          </div>
        </div>

      </div><!-- /work-scroll -->

      <!-- ── Prompt bar ── -->
      <div class="prompt-bar">
        <div class="pb-ctx">
          <span class="pb-label">node</span>
          <select id="nd-sel" class="nd-sel" onchange="onNodeChange()">
            <option value="nav-styles">nav-styles (css)</option>
            <option value="hero-section">hero-section (html)</option>
            <option value="main-script">main-script (js)</option>
            <option value="card-grid">card-grid (html)</option>
            <option value="theme-vars">theme-vars (css)</option>
            <option value="modal-logic">modal-logic (js)</option>
          </select>
          <span class="pb-label" style="margin-left:2px">session</span>
          <span id="pb-sess" style="font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px">—</span>
        </div>
        <div class="pb-row">
          <textarea id="pb-ta" class="pb-ta" rows="2"
            placeholder="Describe the change you want…"
            onkeydown="onPbKey(event)"></textarea>
          <button class="btn prim" onclick="submitPrompt()" style="padding:10px 16px;min-height:44px;align-self:flex-end;flex-shrink:0">run ↗</button>
        </div>
      </div>

    </div><!-- /view-work -->
  </div><!-- /main -->
</div><!-- /shell -->

<script>
/* ══════════════════════════════════════
   NODE DATA
══════════════════════════════════════ */

    pseudo:[['c','<!-- card-grid -->'],['k','ELEMENT','<section.card-grid>'],['f','  LOOP 3×','<article.card>'],['f','    CHILD','<div.card-img>'],['f','    CHILD','<h3>  title'],['f','    CHILD','<p>   body'],['f','    CHILD','<a.card-link>  read more']],

  'theme-vars': {
    type:'css',
    prose:'The <b>theme-vars</b> node defines all design tokens as CSS custom properties: colour palette, typography scale, spacing values, and border radii referenced throughout the project.',
    pseudo:[['c','/* theme-vars */'],['k','RULE',':root'],['f','  DEFINE','--color-bg: #282c34'],['f','  DEFINE','--color-text: #abb2bf'],['f','  DEFINE','--color-accent: #e06c75'],['f','  DEFINE','--font-size-base: 16px'],['f','  DEFINE','--spacing-md: 16px'],['f','  DEFINE','--radius-md: 8px']],
    code:`:root {\n  --color-bg: #282c34;\n  --color-surface: #1e2227;\n  --color-text: #abb2bf;\n  --color-accent: #e06c75;\n  --color-accent-2: #e5c07b;\n  --font-size-base: 16px;\n  --spacing-md: 16px;\n  --radius-md: 8px;\n}`
  },
  'modal-logic': {
    type:'javascript',
    prose:'The <b>modal-logic</b> node manages all modal dialogs: opens with display:flex and focus trapping, closes on Escape or backdrop click, tracks the active modal in a module variable.',
    pseudo:[['c','// modal-logic'],['k','VAR','activeModal = null'],['k','FN','openModal(el)'],['f','  SET','el.style.display = "flex"'],['f','  CALL','trapFocus(el)'],['k','FN','closeModal(el)'],['f','  SET','el.style.display = "none"'],['k','ON keydown','Escape → closeModal(activeModal)'],['k','ON click','backdrop → closeModal(activeModal)']],
    code:`let activeModal = null;\nfunction openModal(el) {\n  el.style.display = 'flex';\n  activeModal = el;\n  trapFocus(el);\n}\nfunction closeModal(el) {\n  el.style.display = 'none';\n  activeModal = null;\n}\ndocument.addEventListener('keydown', e => {\n  if (e.key === 'Escape' && activeModal)\n    closeModal(activeModal);\n});`
  }
};

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let sessions = [], currentId = null, openAtts = {}, stateTabName = 'prose';
const sess    = () => sessions.find(s => s.id === currentId) || null;
const nodeHist= (nid) => { const s = sess(); return s ? (s.history[nid] || []) : []; };

/* ══ BOOT ══ */
window.addEventListener('load', () => {
  const s1 = mkSess('Make the navbar sticky and fix hamburger',
    'I want to make the navigation sticky on scroll, fix the mobile hamburger toggle animation, and add an active-link underline indicator.');
  s1.history['nav-styles'] = [
    { id:'a1', node:'nav-styles', prompt:'Make nav links bold on hover', status:'ok', time:'1h ago',
      diff:['+  font-weight: 600;  /* .vibe-nav a:hover */'],
      result:'font-weight:600 added. Links now bold on hover. Verified in preview.' },
    { id:'a2', node:'nav-styles', prompt:'Add sticky position with z-index', status:'fail', time:'45m ago',
      diff:['+  position: sticky;','+  top: 0;','+  z-index: 100;'],
      result:'z-index conflict with modal overlay — nav disappears behind modals. Reverted.' },
    { id:'a3', node:'nav-styles', prompt:'Reduce padding on mobile viewports', status:'ok', time:'20m ago',
      diff:['+ @media (max-width:768px) {','+ .vibe-nav { padding: 8px 14px; }','+ }'],
      result:'Padding reduced inside media query. Less intrusive on mobile.' },
  ];
  s1.history['hero-section'] = [
    { id:'a4', node:'hero-section', prompt:'Add a second CTA "Learn More"', status:'ok', time:'30m ago',
      diff:['+ <a href="#docs" class="cta-btn secondary">Learn More</a>'],
      result:'Secondary button added after primary. Styled with outline variant in CSS.' },
  ];
  sessions.push(s1);

  const s2 = mkSess('Card grid hover effects and 4-col layout',
    'Tighten card spacing, add hover lift shadows, and make the grid 4 columns on wide screens.');
  s2.history['card-grid'] = [
    { id:'a5', node:'card-grid', prompt:'Add hover lift shadow to cards', status:'ok', time:'2h ago',
      diff:['+ .card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.3); }'],
      result:'Lift effect applied with smooth transition. Works well.' },
    { id:'a6', node:'card-grid', prompt:'4-column layout on desktop', status:'pending', time:'just now',
      diff:['+ @media (min-width:1200px) { .card-grid { grid-template-columns: repeat(4,1fr); } }'],
      result:'Running…' },
  ];
  sessions.push(s2);

  renderSidebar();
  showIntentView(false);
});

function mkSess(name, intent) {
  return { id:'s'+Date.now()+Math.random().toString(36).slice(2,5), name:name||'New session', intent:intent||'', createdAt:new Date(), history:{}, currentNode:'nav-styles' };
}

/* ══ DRAWER ══ */
function openDrawer()  { document.getElementById('drawer').classList.add('open') }
function closeDrawer() { document.getElementById('drawer').classList.remove('open') }

/* ══ SIDEBAR ══ */
function renderSidebar() {
  const el = document.getElementById('sess-list');
  if (!sessions.length) { el.innerHTML='<div style="padding:12px 8px;font-size:12px;color:var(--text3)">No sessions yet</div>'; return; }
  el.innerHTML = sessions.slice().reverse().map(s => {
    const act = s.id===currentId;
    const tot = Object.values(s.history).reduce((n,a)=>n+a.length,0);
    const nds = Object.keys(s.history).length;
    return `<div class="sess-item ${act?'active':''}" onclick="loadSess('${s.id}');closeDrawer()">
      <div class="sess-name">${esc(s.name)}</div>
      <div class="sess-meta"><span class="dot ${act?'dot-on':'dot-off'}"></span><span>${tot} attempt${tot!==1?'s':''} · ${nds} node${nds!==1?'s':''}</span></div>
    </div>`;
  }).join('');
}

function newSession() { closeDrawer(); showIntentView(false); }

function loadSess(id) {
  currentId = id; openAtts = {};
  const s = sess();
  renderSidebar();
  document.getElementById('tb-name').textContent = s.name;
  document.getElementById('pb-sess').textContent = s.name;
  document.getElementById('nd-sel').value = s.currentNode;
  document.getElementById('tb-node').textContent = s.currentNode;
  document.getElementById('tb-node').style.display = '';
  document.getElementById('btn-intent').style.display = '';
  showWorkView();
}

/* ══ INTENT VIEW ══ */
function showIntentView(editing) {
  document.getElementById('view-intent').style.display='flex';
  document.getElementById('view-work').style.display='none';
  document.getElementById('btn-intent').style.display='none';
  document.getElementById('node-pills').innerHTML = Object.keys(NODES).map(k=>{
    const t=NODES[k].type;
    return `<span class="badge ${t==='css'?'css':t==='javascript'?'js':'html'}">${k}</span>`;
  }).join('');
  const s=sess();
  document.getElementById('intent-input').value=(editing&&s)?s.intent:'';
  document.getElementById('tb-name').textContent=(editing&&s)?s.name:'New session';
  document.getElementById('cancel-intent-btn').style.display=(editing&&s)?'':'none';
}

function goToIntent()   { showIntentView(true) }
function cancelIntent() { if (currentId) showWorkView() }

function startSession() {
  const intent = document.getElementById('intent-input').value.trim();
  if (!intent) { document.getElementById('intent-input').focus(); return; }
  if (currentId && document.getElementById('cancel-intent-btn').style.display!=='none') {
    const s=sess(); s.intent=intent; s.name=deriveName(intent);
    renderSidebar(); loadSess(currentId); return;
  }
  const s=mkSess(deriveName(intent),intent);
  sessions.push(s); currentId=s.id; openAtts={};
  renderSidebar(); loadSess(s.id);
}

function deriveName(t) {
  const w=t.replace(/[^a-zA-Z0-9\s]/g,' ').trim().split(/\s+/);
  return w.slice(0,7).join(' ')+(w.length>7?'…':'');
}

/* ══ WORK VIEW ══ */
function showWorkView() {
  document.getElementById('view-intent').style.display='none';
  document.getElementById('view-work').style.display='flex';
  renderWork();
}

function renderWork() {
  const s=sess(); if(!s) return;
  const nid=s.currentNode, node=NODES[nid];
  document.getElementById('intent-display').textContent=s.intent;
  document.getElementById('state-lbl').textContent='current state · '+nid;
  document.getElementById('att-lbl').textContent='attempts · '+nid;
  const badge=document.getElementById('state-badge');
  badge.textContent=node.type;
  badge.className='badge '+(node.type==='css'?'css':node.type==='javascript'?'js':'html');
  document.getElementById('sp-prose').innerHTML=node.prose;
  document.getElementById('sp-pseudo').innerHTML=renderPseudo(node.pseudo);
  document.getElementById('sp-code').textContent=node.code;
  renderDiff(nid); renderPills(nid); renderAtts(nid);
  document.getElementById('tb-node').textContent=nid;
  document.getElementById('pb-sess').textContent=s.name;
  document.getElementById('nd-sel').value=nid;
}

function switchSTab(name,btn) {
  stateTabName=name;
  document.querySelectorAll('.spane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
  document.getElementById('sp-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
}

function renderPseudo(lines) {
  return lines.map(([t,a,b=''])=>{
    if(t==='c') return `<span class="pc">${esc(a)}</span>`;
    if(t==='k') return `<span class="pk">${esc(a)}</span> <span class="ps">${esc(b)}</span>`;
    if(t==='f') return `<span class="pf">${esc(a)}</span><span style="color:#c678dd"> ${esc(b)}</span>`;
    return esc(a)+' '+esc(b);
  }).join('\n');
}

function renderDiff(nid) {
  const diffs=nodeHist(nid).filter(a=>a.status==='ok').flatMap(a=>a.diff||[]);
  const el=document.getElementById('sp-diff');
  if(!diffs.length){el.innerHTML='<span style="color:var(--text3);font-size:12px">No applied changes yet for this node</span>';return;}
  el.innerHTML=diffs.map(l=>{
    const cls=l.startsWith('+')?'add':l.startsWith('-')?'del':'ctx';
    return `<div class="dl ${cls}">${esc(l)}</div>`;
  }).join('');
}

function renderPills(nid) {
  const el=document.getElementById('quick-pills');
  const ok=nodeHist(nid).filter(a=>a.status==='ok');
  if(!ok.length){el.innerHTML='<span class="empty">No successful prompts yet</span>';return;}
  el.innerHTML=ok.map(a=>`<button class="pill" title="${esc(a.prompt)}" onclick="reusePrompt('${a.id}')">${esc(trunc(a.prompt,28))}</button>`).join('');
}

function renderAtts(nid) {
  const el=document.getElementById('att-list');
  const atts=nodeHist(nid);
  if(!atts.length){el.innerHTML='<div class="empty">No attempts yet for this node in this session</div>';return;}
  el.innerHTML=atts.slice().reverse().map(a=>{
    const open=openAtts[a.id];
    const diffHtml=(a.diff||[]).map(l=>{
      const cls=l.startsWith('+')?'add':l.startsWith('-')?'del':'ctx';
      return `<div class="dl ${cls}">${esc(l)}</div>`;
    }).join('');
    const outcomeSection=(a.status!=='pending')?`
      <div class="outcome-row">
        <span class="oc-label">did it work?</span>
        <button class="btn xs ok"   onclick="markOutcome('${a.id}','ok',event)">✓ worked</button>
        <button class="btn xs fail" onclick="markOutcome('${a.id}','fail',event)">✗ didn't</button>
      </div>`:`<div style="margin-top:8px;display:flex;gap:5px;align-items:center"><span class="spin"><span></span><span></span><span></span></span><span style="font-size:11px;color:var(--text3)">running…</span></div>`;
    return `<div class="att">
      <div class="att-hd" onclick="toggleAtt('${a.id}')">
        <span class="badge ${a.status}">${a.status}</span>
        <span class="att-prompt">${esc(a.prompt)}</span>
        <span class="att-time">${a.time}</span>
        <span style="font-size:10px;color:var(--text3);flex-shrink:0">${open?'▲':'▼'}</span>
      </div>
      <div class="att-body ${open?'open':''}">
        ${diffHtml?`<div style="margin-bottom:8px"><div class="sec-lbl">diff</div>${diffHtml}</div>`:''}
        <div class="sec-lbl">result</div>
        <div class="att-result">${esc(a.result)}</div>
        ${outcomeSection}
        <button class="btn xs" style="margin-top:9px" onclick="reusePrompt('${a.id}')">↑ reuse prompt</button>
      </div>
    </div>`;
  }).join('');
}

function toggleAtt(id) { openAtts[id]=!openAtts[id]; const s=sess(); if(s) renderAtts(s.currentNode); }

function markOutcome(id,outcome,e) {
  e.stopPropagation();
  const s=sess(); if(!s) return;
  for(const arr of Object.values(s.history)){ const a=arr.find(x=>x.id===id); if(a){a.status=outcome;break;} }
  renderWork(); renderSidebar();
}

function reusePrompt(id) {
  const s=sess(); if(!s) return;
  let found=null;
  for(const arr of Object.values(s.history)){ found=arr.find(a=>a.id===id); if(found)break; }
  if(!found) return;
  const ta=document.getElementById('pb-ta');
  ta.value=found.prompt; ta.focus();
  // scroll prompt bar into view on mobile
  document.querySelector('.prompt-bar').scrollIntoView({behavior:'smooth',block:'end'});
}

function onNodeChange() {
  const s=sess(); if(!s) return;
  s.currentNode=document.getElementById('nd-sel').value;
  openAtts={}; stateTabName='prose';
  document.querySelectorAll('.spane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
  document.getElementById('sp-prose').classList.add('active');
  document.querySelector('.stab').classList.add('active');
  renderWork();
}

function onPbKey(e) { if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){e.preventDefault();submitPrompt();} }

function submitPrompt() {
  const s=sess(); if(!s) return;
  const text=document.getElementById('pb-ta').value.trim();
  if(!text){document.getElementById('pb-ta').focus();return;}
  const nid=s.currentNode;
  if(!s.history[nid]) s.history[nid]=[];
  const att={id:'a'+Date.now(),node:nid,prompt:text,status:'pending',time:'just now',diff:[],result:'Running…'};
  s.history[nid].unshift(att);
  document.getElementById('pb-ta').value='';
  openAtts[att.id]=true;
  renderWork(); renderSidebar();
  setTimeout(()=>{
    att.result=`Applied to ${nid}: "${trunc(text,60)}". Check preview and mark outcome below.`;
    att.diff=[`+  /* ${trunc(text,50)} */`];
    renderWork(); renderSidebar();
  },1400);
}

function esc(s)   { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function trunc(s,n){ return s.length>n?s.slice(0,n)+'…':s }
</script>
