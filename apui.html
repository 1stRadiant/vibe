<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APUI Node Editor Panel</title>
<style>
:root {
  --bg: #1e2227;
  --bg2: #282c34;
  --bg3: #2d333b;
  --border: #3a404a;
  --border2: #4b5263;
  --text: #abb2bf;
  --text2: #636c7a;
  --text3: #4b5263;
  --accent: #61afef;
  --accent-bg: rgba(97,175,239,.12);
  --green: #98c379;
  --green-bg: rgba(152,195,121,.12);
  --red: #e06c75;
  --red-bg: rgba(224,108,117,.12);
  --amber: #e5c07b;
  --amber-bg: rgba(229,192,123,.12);
  --purple: #c678dd;
  --radius: 8px;
  --radius-sm: 5px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Roboto Mono', 'SF Mono', monospace; font-size: 13px; color: var(--text); background: var(--bg2); }
.panel { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--bg); max-width: 520px; margin: 16px auto; }
.panel-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--bg2); }
.panel-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text2); }
.section { border-bottom: 1px solid var(--border); padding: 12px 14px; }
.section:last-child { border-bottom: none; }
.sec-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin-bottom: 8px; }
.node-selector { display: flex; gap: 6px; align-items: center; }
select { flex: 1; font-family: inherit; font-size: 12px; padding: 6px 8px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg3); color: var(--text); cursor: pointer; }
select:focus { outline: none; border-color: var(--accent); }
.btn { font-family: inherit; font-size: 12px; padding: 5px 10px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: transparent; color: var(--text); cursor: pointer; white-space: nowrap; transition: all .12s; }
.btn:hover { background: var(--bg3); border-color: var(--accent); color: var(--accent); }
.btn.sm { padding: 3px 8px; font-size: 11px; }
.btn.primary { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
.btn.primary:hover { opacity: .85; }
.badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 700; }
.badge.css { background: var(--accent-bg); color: var(--accent); }
.badge.html { background: var(--amber-bg); color: var(--amber); }
.badge.js { background: var(--green-bg); color: var(--green); }
.badge.ok { background: var(--green-bg); color: var(--green); }
.badge.fail { background: var(--red-bg); color: var(--red); }
.badge.pending { background: var(--amber-bg); color: var(--amber); }

/* State box */
.state-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.state-tabs { display: flex; border-bottom: 1px solid var(--border); }
.state-tab { flex: 1; padding: 6px 0; font-size: 11px; font-weight: 700; cursor: pointer; text-align: center; color: var(--text2); border: none; background: transparent; font-family: inherit; text-transform: uppercase; letter-spacing: .06em; transition: all .1s; }
.state-tab:hover { color: var(--text); }
.state-tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
.state-content { padding: 10px 12px; font-size: 12px; line-height: 1.65; color: var(--text); min-height: 90px; max-height: 170px; overflow-y: auto; display: none; }
.state-content.active { display: block; }
.state-content.code-view { color: #abb2bf; background: #1a1d21; font-family: inherit; white-space: pre-wrap; }
.pk { color: #c678dd; }   /* pseudo keyword */
.pf { color: #61afef; }   /* pseudo fn */
.ps { color: #98c379; }   /* pseudo string/value */
.pc { color: #4b5263; font-style: italic; }  /* pseudo comment */

/* Quick buttons */
.quick-btns { display: flex; flex-wrap: wrap; gap: 5px; }
.qbtn { font-family: inherit; font-size: 11px; padding: 4px 10px; border: 1px solid var(--border2); border-radius: 20px; background: var(--bg2); color: var(--text2); cursor: pointer; transition: all .12s; max-width: 210px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.qbtn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

/* History */
.history-list { display: flex; flex-direction: column; gap: 5px; max-height: 230px; overflow-y: auto; }
.history-item { border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.history-hdr { display: flex; align-items: center; gap: 7px; padding: 7px 10px; cursor: pointer; background: var(--bg2); transition: background .1s; }
.history-hdr:hover { background: var(--bg3); }
.history-prompt { font-size: 12px; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.history-time { font-size: 10px; color: var(--text3); white-space: nowrap; }
.history-body { padding: 9px 11px; border-top: 1px solid var(--border); background: var(--bg2); display: none; }
.history-body.open { display: block; }
.history-result { margin-top: 5px; padding: 7px 9px; background: var(--bg3); border-radius: var(--radius-sm); font-size: 11.5px; color: var(--text2); max-height: 80px; overflow-y: auto; line-height: 1.5; }
.reuse-btn { margin-top: 7px; }

/* Prompt */
.prompt-area { width: 100%; padding: 9px 11px; font-family: inherit; font-size: 12px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg2); color: var(--text); resize: vertical; min-height: 72px; line-height: 1.55; }
.prompt-area:focus { outline: none; border-color: var(--accent); }
.prompt-actions { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-top: 7px; }
.char-count { font-size: 10px; color: var(--text3); }
.empty-state { text-align: center; padding: 14px; color: var(--text3); font-size: 11.5px; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>
<body>

<div class="panel" id="app">

  <div class="panel-header">
    <span class="panel-title">APUI · Node Editor</span>
    <div style="display:flex;gap:6px;align-items:center">
      <span id="node-type-badge" class="badge css">css</span>
      <button class="btn sm" onclick="refreshCurrentState()">↻ refresh</button>
    </div>
  </div>

  <!-- Node selector -->
  <div class="section">
    <div class="sec-label">target node</div>
    <div class="node-selector">
      <select id="node-select" onchange="onNodeChange()">
        <option value="nav-styles">nav-styles (css)</option>
        <option value="hero-section">hero-section (html)</option>
        <option value="main-script">main-script (javascript)</option>
        <option value="card-grid">card-grid (html)</option>
        <option value="theme-vars">theme-vars (css)</option>
        <option value="modal-logic">modal-logic (javascript)</option>
      </select>
      <button class="btn sm" title="Ask AI to describe the full vibe tree" onclick="alert('In live app: opens full tree picker')">tree ↗</button>
    </div>
  </div>

  <!-- Current state -->
  <div class="section">
    <div class="sec-label">current state</div>
    <div class="state-box">
      <div class="state-tabs">
        <button class="state-tab active" data-tab="prose" onclick="switchTab('prose',this)">Natural language</button>
        <button class="state-tab" data-tab="pseudo" onclick="switchTab('pseudo',this)">Pseudo code</button>
        <button class="state-tab" data-tab="raw" onclick="switchTab('raw',this)">Raw snippet</button>
      </div>
      <div id="tab-prose" class="state-content active">
        <span id="prose-content"></span>
      </div>
      <div id="tab-pseudo" class="state-content code-view">
        <span id="pseudo-content"></span>
      </div>
      <div id="tab-raw" class="state-content code-view">
        <span id="raw-content"></span>
      </div>
    </div>
  </div>

  <!-- Quick re-invoke -->
  <div class="section">
    <div class="sec-label">quick re-invoke · last successful prompts</div>
    <div id="quick-btns" class="quick-btns">
      <div class="empty-state" style="padding:6px;font-size:11px">No successful attempts yet for this node</div>
    </div>
  </div>

  <!-- Attempt history -->
  <div class="section">
    <div class="sec-label">attempt history</div>
    <div id="history-list" class="history-list">
      <div class="empty-state">No history yet</div>
    </div>
  </div>

  <!-- New prompt -->
  <div class="section">
    <div class="sec-label">new prompt</div>
    <textarea id="prompt-input" class="prompt-area"
      placeholder="Describe the change you want to make to this node…"
      oninput="onPromptInput()"></textarea>
    <div class="prompt-actions">
      <span class="char-count" id="char-count">0 chars</span>
      <div style="display:flex;gap:6px">
        <button class="btn sm" onclick="clearPrompt()">clear</button>
        <button class="btn sm primary" onclick="executePrompt()">run ↗</button>
      </div>
    </div>
  </div>

</div>

<script>
const NODE_DATA = {
  'nav-styles': {
    type: 'css',
    prose: 'The <strong>nav-styles</strong> CSS node controls the top navigation bar. It sets a dark background, applies flex layout to distribute links horizontally, handles hover underline transitions, and collapses to a hamburger menu below 768px via a media query.',
    pseudo: [
      ['c','/* nav-styles — top navigation */'],
      ['k','RULE','.vibe-nav'],
      ['f','  SET background:','#1e2227'],
      ['f','  SET display:','flex, justify-content: space-between'],
      ['f','  SET padding:','12px 24px'],
      ['k','RULE','.vibe-nav a:hover'],
      ['f','  SET text-decoration:','underline'],
      ['f','  TRANSITION','opacity 0.2s ease'],
      ['k','MEDIA','max-width: 768px'],
      ['f','  HIDE','.nav-links'],
      ['f','  SHOW','.hamburger-btn'],
    ],
    raw: `.vibe-nav {
  background: #1e2227;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 24px;
}
.vibe-nav a { color: #abb2bf; text-decoration: none; }
.vibe-nav a:hover { text-decoration: underline; }
@media (max-width: 768px) {
  .nav-links { display: none; }
  .hamburger-btn { display: block; }
}`,
    history: [
      { id:'h1', prompt:'Make nav links bold on hover', status:'ok', time:'2m ago',
        result:'Added font-weight:600 to .vibe-nav a:hover. Verified in preview — links render bold on hover correctly.' },
      { id:'h2', prompt:'Add sticky positioning to nav', status:'fail', time:'18m ago',
        result:'Applied position:sticky;top:0 but z-index conflict with modal overlay caused nav to disappear behind modals. Reverted.' },
      { id:'h3', prompt:'Reduce nav padding on mobile', status:'ok', time:'1h ago',
        result:'Added padding:8px 14px inside the 768px media query. Nav less intrusive on small screens.' },
    ]
  },
  'hero-section': {
    type: 'html',
    prose: 'The <strong>hero-section</strong> HTML node renders a full-width landing banner. It contains an absolutely-positioned background image div, a headline, subtitle paragraph, and a CTA button. Layout is flex column centred.',
    pseudo: [
      ['c','<!-- hero-section — page banner -->'],
      ['k','ELEMENT','<section.hero>'],
      ['f','  CHILD <div.hero-bg>','← background image layer (abs pos)'],
      ['f','  CHILD <div.hero-content>',''],
      ['f','    CHILD <h1>','headline text'],
      ['f','    CHILD <p>','subtitle text'],
      ['f','    CHILD <a.cta-btn>','call to action link'],
    ],
    raw: `<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <h1>Build Anything</h1>
    <p>A visual vibe coding environment.</p>
    <a href="#start" class="cta-btn">Get Started</a>
  </div>
</section>`,
    history: [
      { id:'h4', prompt:'Add a second CTA button "Learn More"', status:'ok', time:'5m ago',
        result:'Added <a href="#docs" class="cta-btn secondary">Learn More</a> after the primary button. Styled with outline variant.' },
    ]
  },
  'main-script': {
    type: 'javascript',
    prose: 'The <strong>main-script</strong> JS node bootstraps the application. It loads the vibe tree from localStorage on DOMContentLoaded, calls refreshAllUI(), attaches tab-switching listeners, and wires the agent prompt button to runAgent().',
    pseudo: [
      ['c','// main-script — app bootstrap'],
      ['k','ON','DOMContentLoaded'],
      ['f','  CALL','loadVibeTreeFromStorage()'],
      ['f','  CALL','refreshAllUI()'],
      ['f','  ATTACH','.tab-button elements → switchTab()'],
      ['f','  ATTACH','#run-agent-btn → runAgent()'],
      ['k','FN','runAgent(prompt)'],
      ['f','  CALL','callAI(systemPrompt, prompt)'],
      ['f','  CALL','executeAgentPlan(result)'],
      ['f','  CALL','refreshAllUI()'],
    ],
    raw: `document.addEventListener('DOMContentLoaded', () => {
  loadVibeTreeFromStorage();
  refreshAllUI();
  document.querySelectorAll('.tab-button')
    .forEach(b => b.addEventListener('click', switchTab));
  document.getElementById('run-agent-btn')
    .addEventListener('click',
      () => runAgent(agentPromptInput.value));
});`,
    history: []
  },
  'card-grid': {
    type: 'html',
    prose: 'The <strong>card-grid</strong> HTML node renders a responsive 3-column grid of content cards. Each card contains an image placeholder div, an h3 title, a description paragraph, and a read-more anchor.',
    pseudo: [
      ['c','<!-- card-grid — feature cards -->'],
      ['k','ELEMENT','<section.card-grid>'],
      ['f','  LOOP 3×','<article.card>'],
      ['f','    CHILD <div.card-img>','image placeholder'],
      ['f','    CHILD <h3>','card title'],
      ['f','    CHILD <p>','card body text'],
      ['f','    CHILD <a.card-link>','read more'],
    ],
    raw: `<section class="card-grid">
  <article class="card">
    <div class="card-img"></div>
    <h3>Feature One</h3>
    <p>Description of this feature.</p>
    <a class="card-link" href="#">Learn more</a>
  </article>
  <!-- × 3 -->
</section>`,
    history: [
      { id:'h5', prompt:'Add hover lift shadow to cards', status:'ok', time:'30m ago',
        result:'Added transform:translateY(-2px) and box-shadow on .card:hover in the CSS node. Smooth transition applied.' },
      { id:'h6', prompt:'Make grid 4 columns on desktop', status:'pending', time:'just now',
        result:'In progress — changed grid-template-columns to repeat(4,1fr) but cards look cramped at 1280px. Still testing.' },
    ]
  },
  'theme-vars': {
    type: 'css',
    prose: 'The <strong>theme-vars</strong> CSS node defines all custom properties (design tokens) for the project: colour palette, typography scale, spacing values, and border radii. Everything else in the project references these variables.',
    pseudo: [
      ['c','/* theme-vars — design tokens */'],
      ['k','RULE',':root'],
      ['f','  DEFINE --color-bg:','#282c34'],
      ['f','  DEFINE --color-text:','#abb2bf'],
      ['f','  DEFINE --color-accent:','#e06c75'],
      ['f','  DEFINE --font-size-base:','16px'],
      ['f','  DEFINE --spacing-md:','16px'],
      ['f','  DEFINE --radius-md:','8px'],
    ],
    raw: `:root {
  --color-bg: #282c34;
  --color-surface: #1e2227;
  --color-text: #abb2bf;
  --color-accent: #e06c75;
  --color-accent-2: #e5c07b;
  --font-size-base: 16px;
  --spacing-md: 16px;
  --radius-md: 8px;
}`,
    history: []
  },
  'modal-logic': {
    type: 'javascript',
    prose: 'The <strong>modal-logic</strong> JS node manages all modal dialogs. It opens a modal by setting display to flex and trapping keyboard focus, closes on Escape key or backdrop click, and tracks the currently active modal in a module-level variable.',
    pseudo: [
      ['c','// modal-logic — dialog manager'],
      ['k','VAR','activeModal = null'],
      ['k','FN','openModal(el)'],
      ['f','  SET el.style.display','= "flex"'],
      ['f','  SET activeModal','= el'],
      ['f','  CALL','trapFocus(el)'],
      ['k','FN','closeModal(el)'],
      ['f','  SET el.style.display','= "none"'],
      ['f','  SET activeModal','= null'],
      ['k','ON keydown','Escape → closeModal(activeModal)'],
      ['k','ON click','backdrop → closeModal(activeModal)'],
    ],
    raw: `let activeModal = null;
function openModal(el) {
  el.style.display = 'flex';
  activeModal = el;
  trapFocus(el);
}
function closeModal(el) {
  el.style.display = 'none';
  activeModal = null;
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && activeModal)
    closeModal(activeModal);
});`,
    history: [
      { id:'h7', prompt:'Animate modal open with fade in', status:'ok', time:'3h ago',
        result:'Added CSS @keyframes fadeIn and applied animation:fadeIn .2s ease to .modal-content. Works on open, no animation needed on close.' },
    ]
  }
};

let currentNode = 'nav-styles';
let activeTab = 'prose';
let expandedHistory = {};

function renderPseudo(lines) {
  return lines.map(([type, a, b]) => {
    b = b || '';
    if (type === 'c') return `<span class="pc">${a}</span>`;
    if (type === 'k') return `<span class="pk">${a}</span> <span class="ps">${b}</span>`;
    if (type === 'f') return `<span class="pf">${a}</span><span style="color:#c678dd"> ${b}</span>`;
    return a + ' ' + b;
  }).join('\n');
}

function onNodeChange() {
  currentNode = document.getElementById('node-select').value;
  expandedHistory = {};
  renderAll();
}

function refreshCurrentState() {
  const d = NODE_DATA[currentNode];
  const badge = document.getElementById('node-type-badge');
  badge.textContent = d.type;
  badge.className = 'badge ' + (d.type === 'css' ? 'css' : d.type === 'javascript' ? 'js' : 'html');
  document.getElementById('prose-content').innerHTML = d.prose;
  document.getElementById('pseudo-content').innerHTML = renderPseudo(d.pseudo);
  document.getElementById('raw-content').textContent = d.raw;
}

function renderQuickBtns() {
  const d = NODE_DATA[currentNode];
  const el = document.getElementById('quick-btns');
  const successes = d.history.filter(h => h.status === 'ok');
  if (!successes.length) {
    el.innerHTML = '<div class="empty-state" style="padding:6px;font-size:11px">No successful attempts yet for this node</div>';
    return;
  }
  el.innerHTML = successes.map(h =>
    `<button class="qbtn" title="${escHtml(h.prompt)}" onclick="reusePrompt('${h.id}')">${escHtml(h.prompt)}</button>`
  ).join('');
}

function renderHistory() {
  const d = NODE_DATA[currentNode];
  const el = document.getElementById('history-list');
  if (!d.history.length) {
    el.innerHTML = '<div class="empty-state">No history yet for this node</div>';
    return;
  }
  el.innerHTML = d.history.map(h => {
    const open = expandedHistory[h.id];
    return `<div class="history-item">
      <div class="history-hdr" onclick="toggleHistory('${h.id}')">
        <span class="badge ${h.status}">${h.status}</span>
        <span class="history-prompt">${escHtml(h.prompt)}</span>
        <span class="history-time">${h.time}</span>
        <span style="font-size:10px;color:var(--text3)">${open ? '▲' : '▼'}</span>
      </div>
      <div class="history-body ${open ? 'open' : ''}">
        <div style="font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em">Recorded result</div>
        <div class="history-result">${escHtml(h.result)}</div>
        <button class="btn sm reuse-btn" onclick="reusePrompt('${h.id}')">↑ reuse this prompt</button>
      </div>
    </div>`;
  }).join('');
}

function renderAll() {
  refreshCurrentState();
  renderQuickBtns();
  renderHistory();
}

function switchTab(name, btn) {
  activeTab = name;
  document.querySelectorAll('.state-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.state-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
}

function toggleHistory(id) {
  expandedHistory[id] = !expandedHistory[id];
  renderHistory();
}

function reusePrompt(id) {
  const d = NODE_DATA[currentNode];
  const item = d.history.find(h => h.id === id);
  if (!item) return;
  const ta = document.getElementById('prompt-input');
  ta.value = item.prompt;
  onPromptInput();
  ta.focus();
  ta.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function onPromptInput() {
  const v = document.getElementById('prompt-input').value;
  document.getElementById('char-count').textContent = v.length + ' chars';
}

function clearPrompt() {
  document.getElementById('prompt-input').value = '';
  document.getElementById('char-count').textContent = '0 chars';
}

function executePrompt() {
  const prompt = document.getElementById('prompt-input').value.trim();
  if (!prompt) { alert('Enter a prompt first.'); return; }
  const d = NODE_DATA[currentNode];
  // In the live app this fires into the APUI bridge / agent system.
  // Here we log and record a pending entry.
  const newEntry = {
    id: 'h' + Date.now(),
    prompt,
    status: 'pending',
    time: 'just now',
    result: 'Running…'
  };
  d.history.unshift(newEntry);
  clearPrompt();
  renderAll();
  // Simulate result after 1.5s
  setTimeout(() => {
    newEntry.status = 'ok';
    newEntry.result = 'AI applied the change. Refresh preview to verify.';
    renderAll();
  }, 1500);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

renderAll();
</script>
</body>
</html>
