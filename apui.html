<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>APUI // Vibe Tree Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&family=Fira+Code&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>

<style>
    :root {
        --primary: #4169e1;
        --secondary: #87CEEB;
        --bg-dark: #0a0e18;
        --bg-panel: rgba(16, 24, 48, 0.97);
        --text: #e6e6ff;
        --ai-glow: #ff00ff;
        --ai-edit: #00ffcc;
        /* vibe type colours */
        --c-html:        #81c784;
        --c-css:         #ce93d8;
        --c-js:          #ffb74d;
        --c-head:        #4dd0e1;
        --c-container:   #4fc3f7;
        --c-declaration: #ffd54f;
        --c-jsfn:        #ff8a65;
        --c-error:       #ef5350;
    }

    * { box-sizing: border-box; }

    body {
        font-family: 'Rajdhani', sans-serif;
        margin: 0; padding: 0;
        background: var(--bg-dark);
        height: 100vh; width: 100vw;
        overflow: hidden;
        color: var(--text);
        touch-action: none;
        overscroll-behavior: none;
    }

    #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }

    /* ─── Navbar ─────────────────────────────────────────────── */
    .navbar {
        position: fixed; top: 0; left: 0; right: 0; height: 52px;
        background: rgba(10, 14, 28, 0.92); backdrop-filter: blur(12px);
        display: flex; align-items: center; padding: 0 12px; gap: 8px;
        z-index: 10000; border-bottom: 1px solid rgba(65,105,225,0.4);
        box-shadow: 0 0 24px rgba(65,105,225,0.12);
    }
    .btn-icon { background: transparent; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; padding: 0 6px; transition: 0.2s; display: flex; align-items: center; }
    .btn-icon:hover { color: var(--secondary); }
    .navbar-brand { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: var(--secondary); font-weight: bold; letter-spacing: 1px; text-shadow: 0 0 10px var(--primary); white-space: nowrap; }
    .navbar-brand small { display: block; font-size: 0.5rem; color: var(--ai-edit); letter-spacing: 3px; margin-top: -3px; }
    .navbar-input-area { flex: 1; display: flex; gap: 6px; max-width: 560px; }
    #user-input {
        flex: 1; background: rgba(0,0,0,0.45); border: 1px solid #2a3a5a;
        color: var(--secondary); padding: 7px 12px; border-radius: 5px;
        font-family: 'Fira Code', monospace; font-size: 13px;
    }
    #user-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 8px rgba(65,105,225,0.3); }
    .btn-main {
        background: var(--primary); border: none; color: white;
        padding: 0 14px; border-radius: 5px; cursor: pointer;
        font-family: 'Rajdhani', sans-serif; font-weight: 700;
        text-transform: uppercase; height: 34px; white-space: nowrap; font-size: 0.8rem;
        transition: 0.2s; letter-spacing: 0.5px;
    }
    .btn-main:hover { background: #2a50d8; box-shadow: 0 0 12px rgba(65,105,225,0.5); }
    .btn-main.success { background: #2e7d32; }
    .btn-main.success:hover { background: #388e3c; }

    .nav-sync-badge {
        display: flex; align-items: center; gap: 5px;
        font-family: 'Fira Code', monospace; font-size: 0.65rem;
        color: var(--ai-edit); opacity: 0.7; white-space: nowrap;
    }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ai-edit); animation: pulse-sync 2s infinite; flex-shrink: 0; }
    @keyframes pulse-sync { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.7); } }
    .sync-dot.dirty { background: #ffb74d; animation: none; }

    /* ─── Sidebar ─────────────────────────────────────────────── */
    #sidebar {
        position: fixed; top: 52px; left: 0; bottom: 0; width: 240px;
        background: rgba(8, 12, 24, 0.98); border-right: 1px solid rgba(65,105,225,0.25);
        z-index: 9000; transform: translateX(-100%); transition: transform 0.3s ease;
        display: flex; flex-direction: column;
    }
    #sidebar.open { transform: translateX(0); }
    .sidebar-header { padding: 12px 14px; border-bottom: 1px solid rgba(65,105,225,0.2); font-weight: 700; color: var(--secondary); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1.5px; }
    .sidebar-list { flex: 1; overflow-y: auto; padding: 6px; }
    .sidebar-item {
        padding: 9px 10px; background: rgba(0,0,0,0.25); margin-bottom: 4px;
        border-radius: 4px; cursor: pointer; border: 1px solid transparent;
        transition: 0.15s; font-size: 0.82rem; display: flex; align-items: center; gap: 8px;
    }
    .sidebar-item:hover { border-color: var(--primary); background: rgba(65,105,225,0.1); }
    .sidebar-item .type-pip { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .sidebar-item .node-id { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sidebar-item .node-type { font-size: 0.65rem; color: #666; flex-shrink: 0; }
    .sidebar-item.has-error { border-color: rgba(239,83,80,0.5) !important; }
    .sidebar-depth-1 { padding-left: 22px !important; }
    .sidebar-depth-2 { padding-left: 34px !important; }
    .sidebar-depth-3 { padding-left: 46px !important; }

    .sidebar-section { padding: 8px 14px 4px; font-size: 0.65rem; color: #444; text-transform: uppercase; letter-spacing: 1px; }
    .sidebar-actions { padding: 8px 8px; border-top: 1px solid rgba(65,105,225,0.15); display: flex; flex-direction: column; gap: 4px; }
    .sidebar-action-btn { width: 100%; padding: 7px; background: rgba(65,105,225,0.1); border: 1px solid rgba(65,105,225,0.25); border-radius: 4px; color: var(--secondary); cursor: pointer; font-family: 'Rajdhani', sans-serif; font-size: 0.8rem; font-weight: 600; text-align: left; transition: 0.15s; }
    .sidebar-action-btn:hover { background: rgba(65,105,225,0.22); }

    /* ─── Viewport & World ────────────────────────────────────── */
    #viewport { position: fixed; top: 52px; left: 0; width: 100vw; height: calc(100vh - 52px); overflow: hidden; cursor: grab; touch-action: none; }
    #world { position: absolute; top: 0; left: 0; width: 0; height: 0; transform-origin: 0 0; will-change: transform; }
    #connector-svg { position: absolute; overflow: visible; pointer-events: none; z-index: 0; }

    .ai-laser { stroke: var(--ai-glow) !important; stroke-width: 3 !important; opacity: 0.9 !important; filter: drop-shadow(0 0 5px var(--ai-glow)); transition: all 0.3s ease; }

    /* ─── Nodes ───────────────────────────────────────────────── */
    .node {
        position: absolute; width: min(380px, 90vw); height: 310px;
        background: var(--bg-panel); border: 1px solid var(--primary);
        border-radius: 7px; box-shadow: 0 12px 36px rgba(0,0,0,0.6);
        display: flex; flex-direction: column; z-index: 10;
        backdrop-filter: blur(8px); resize: both; overflow: hidden;
        transition: box-shadow 0.2s, border-color 0.2s;
    }
    .node:hover { border-color: var(--secondary); box-shadow: 0 0 28px rgba(65,105,225,0.35); }
    .node.ai-scanning { border-color: var(--ai-glow) !important; box-shadow: 0 0 40px rgba(255,0,255,0.6), inset 0 0 20px rgba(255,0,255,0.2) !important; }
    .node.ai-updating { border-color: var(--ai-edit) !important; box-shadow: 0 0 40px rgba(0,255,204,0.55), inset 0 0 20px rgba(0,255,204,0.15) !important; }
    .node.has-error { border-color: var(--c-error) !important; box-shadow: 0 0 30px rgba(239,83,80,0.45) !important; }
    .node.hidden { display: none !important; }
    .node.out-of-view { display: none !important; }
    .node.minimized { height: 44px !important; width: 210px !important; resize: none; }
    .node.minimized .node-content, .node.minimized .node-footer, .node.minimized .node-error-bar { display: none; }
    .node.fullscreen-mode { resize: none !important; z-index: 9999 !important; }
    .node.animating-bounds { transition: width 0.4s cubic-bezier(0.2,0.8,0.2,1), height 0.4s cubic-bezier(0.2,0.8,0.2,1) !important; }

    /* Type accent border */
    .node[data-vtype="html"]        { border-top: 2px solid var(--c-html); }
    .node[data-vtype="css"]         { border-top: 2px solid var(--c-css); }
    .node[data-vtype="javascript"]  { border-top: 2px solid var(--c-js); }
    .node[data-vtype="js-function"] { border-top: 2px solid var(--c-jsfn); }
    .node[data-vtype="declaration"] { border-top: 2px solid var(--c-declaration); }
    .node[data-vtype="head"]        { border-top: 2px solid var(--c-head); }
    .node[data-vtype="container"]   { border-top: 2px solid var(--c-container); }

    .node-header {
        height: 44px; min-height: 44px; padding: 0 12px;
        background: rgba(65,105,225,0.12); border-bottom: 1px solid rgba(65,105,225,0.22);
        display: flex; justify-content: space-between; align-items: center; gap: 8px;
        cursor: pointer; user-select: none; touch-action: none;
    }
    .node-title-row { display: flex; align-items: center; gap: 7px; min-width: 0; overflow: hidden; pointer-events: none; }
    .type-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .node-title { font-weight: 700; color: var(--secondary); text-transform: uppercase; font-size: 0.83rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .node-id-label { font-family: 'Fira Code', monospace; font-size: 0.6rem; color: rgba(255,255,255,0.3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .node-type-badge { font-size: 0.62rem; padding: 1px 6px; border-radius: 3px; background: rgba(0,0,0,0.5); color: #888; flex-shrink: 0; }
    .node-controls { display: flex; gap: 7px; flex-shrink: 0; }
    .win-btn { width: 13px; height: 13px; border-radius: 50%; border: none; cursor: pointer; }
    .btn-min { background: #ffbd2e; } .btn-close { background: #ff4444; }

    /* Error banner inside node */
    .node-error-bar {
        background: rgba(239,83,80,0.12); border-bottom: 1px solid rgba(239,83,80,0.35);
        padding: 4px 12px; font-family: 'Fira Code', monospace; font-size: 0.62rem;
        color: #ef9a9a; display: none; cursor: pointer; align-items: center; gap: 6px;
        line-height: 1.3;
    }
    .node-error-bar.visible { display: flex; }
    .node-error-bar:hover { background: rgba(239,83,80,0.2); }

    .node-content { flex: 1; position: relative; background: #0a0f1a; overflow: hidden; }

    /* Code editor with highlight overlay */
    .editor-container { position: relative; width: 100%; height: 100%; background: #0a0f1a; }
    .code-editor, .code-highlight {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        font-family: 'Fira Code', monospace; font-size: 13px; line-height: 1.55;
        padding: 10px; margin: 0; border: none; white-space: pre;
        overflow-wrap: normal; overflow-x: auto; overflow-y: auto; tab-size: 2;
    }
    .code-editor { color: transparent; background: transparent; caret-color: #87CEEB; z-index: 2; resize: none; outline: none; touch-action: pan-x pan-y; }
    .code-highlight { z-index: 1; pointer-events: none; color: #ccc; }

    /* Unsaved indicator dot */
    .dirty-indicator {
        position: absolute; top: 7px; right: 7px; width: 7px; height: 7px;
        border-radius: 50%; background: var(--ai-edit); z-index: 5;
        box-shadow: 0 0 6px var(--ai-edit); display: none;
    }
    .dirty-indicator.visible { display: block; }

    /* Non-code node content panels */
    .chat-output { height: 100%; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .chat-msg { padding: 9px 13px; border-radius: 7px; font-size: 13px; max-width: 90%; word-wrap: break-word; animation: popIn 0.25s ease-out; }
    .msg-user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
    .msg-ai { align-self: flex-start; background: rgba(0,255,204,0.1); border: 1px solid var(--ai-edit); color: var(--text); border-bottom-left-radius: 2px; }
    .msg-system { align-self: center; font-size: 11px; color: #666; background: transparent; padding: 3px 8px; }
    @keyframes popIn { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }

    .preview-iframe { width: 100%; height: 100%; border: none; background: white; }
    .console-output { height: 100%; padding: 10px; overflow-y: auto; font-family: 'Fira Code', monospace; font-size: 11.5px; touch-action: pan-y; }
    .log-entry { margin-bottom: 4px; border-bottom: 1px solid #1a1a2a; padding-bottom: 4px; word-break: break-all; }
    .log-error { color: #ff6b6b; } .log-success { color: #66bb6a; } .log-ai { color: var(--ai-glow); }

    .settings-panel { padding: 14px; height: 100%; overflow-y: auto; touch-action: pan-y; }
    .settings-panel label { display: block; margin-top: 10px; color: var(--secondary); font-size: 0.85rem; }
    .settings-panel input { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 7px; margin-top: 4px; border-radius: 4px; font-family: 'Fira Code', monospace; font-size: 0.8rem; }
    .settings-panel input:focus { outline: none; border-color: var(--primary); }

    .node-footer {
        padding: 7px 8px; background: rgba(0,0,0,0.4); border-top: 1px solid rgba(255,255,255,0.06);
        display: flex; justify-content: flex-end; gap: 5px; flex-wrap: wrap; flex-shrink: 0;
    }
    .action-btn {
        background: transparent; border: 1px solid var(--primary); color: var(--secondary);
        padding: 4px 9px; border-radius: 3px; cursor: pointer; font-size: 0.72rem;
        font-family: 'Rajdhani', sans-serif; font-weight: 600; transition: 0.15s;
    }
    .action-btn:hover { background: var(--primary); color: white; }
    .action-btn.save-btn { border-color: var(--ai-edit); color: var(--ai-edit); }
    .action-btn.save-btn:hover { background: var(--ai-edit); color: #000; }
    .action-btn.save-btn.saved { background: rgba(0,255,204,0.15); }
    .action-btn.danger { border-color: #ff4444; color: #ff8888; }
    .action-btn.danger:hover { background: #c62828; color: white; border-color: #c62828; }

    /* ─── OS Menu ────────────────────────────────────────────── */
    #os-menu-container {
        position: fixed; bottom: 2rem; left: 2rem; z-index: 20000;
        width: 78px; height: 78px; cursor: grab; touch-action: none;
    }
    #os-menu-container.dragging { cursor: grabbing; }
    .os-logo-container {
        width: 100%; height: 100%; position: relative; cursor: pointer; z-index: 2;
        background: rgba(10, 15, 30, 0.85); border-radius: 50%;
        box-shadow: 0 0 18px rgba(65,105,225,0.55), inset 0 0 12px rgba(135,206,235,0.25);
        transition: all 0.3s ease;
    }
    .os-logo-container:hover { box-shadow: 0 0 30px rgba(65,105,225,0.9), inset 0 0 16px rgba(135,206,235,0.5); }
    .os-logo-container .center-image { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 72%; height: 72%; object-fit: contain; z-index: 1; pointer-events: none; filter: drop-shadow(0 0 8px rgba(135,206,235,0.8)); }
    .os-logo-container .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
    .circle-segment { stroke-dasharray: 30; animation: os-rotate 4s linear infinite; opacity: 0.8; }
    @keyframes os-rotate { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 60; } }
    .outer-circle { animation: os-pulse 2s ease-in-out infinite; }
    @keyframes os-pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.8; } }

    .os-menu-btn {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%,-50%) scale(0.5);
        opacity: 0; pointer-events: none;
        transition: all 0.38s cubic-bezier(0.175,0.885,0.32,1.275);
        background: rgba(16,24,48,0.97); color: var(--secondary);
        border: 1px solid var(--primary); border-radius: 8px;
        padding: 8px 14px; display: flex; align-items: center; gap: 6px;
        font-family: 'Rajdhani', sans-serif; font-weight: 700; text-transform: uppercase;
        box-shadow: 0 0 12px rgba(65,105,225,0.4); white-space: nowrap; cursor: pointer;
        backdrop-filter: blur(6px); font-size: 0.78rem; z-index: 1;
    }
    .os-menu-btn:hover { background: var(--primary); color: white; box-shadow: 0 0 20px var(--secondary); }
    #os-menu-container.open .os-menu-btn { opacity: 1; pointer-events: auto; }
    #os-menu-container.open .btn-1 { transform: translate(65px, -10px) scale(1); }
    #os-menu-container.open .btn-2 { transform: translate(55px, -60px) scale(1); }
    #os-menu-container.open .btn-3 { transform: translate(15px, -90px) scale(1); }
    #os-menu-container.open .btn-4 { transform: translate(-35px, -100px) scale(1); }
    #os-menu-container.open .btn-5 { transform: translate(-80px, -80px) scale(1); }
    @media (max-width: 768px) {
        #os-menu-container.open .btn-1 { transform: translate(50px, -10px) scale(0.9); }
        #os-menu-container.open .btn-2 { transform: translate(45px, -50px) scale(0.9); }
        #os-menu-container.open .btn-3 { transform: translate(10px, -75px) scale(0.9); }
        #os-menu-container.open .btn-4 { transform: translate(-30px, -80px) scale(0.9); }
        #os-menu-container.open .btn-5 { transform: translate(-70px, -60px) scale(0.9); }
    }

    /* ─── Add Node Palette ──────────────────────────────────── */
    #add-node-menu {
        position: fixed; z-index: 30000;
        background: rgba(10,15,30,0.98); border: 1px solid rgba(65,105,225,0.4);
        border-radius: 8px; padding: 6px; min-width: 170px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.7); display: none;
    }
    #add-node-menu.open { display: block; }
    .add-node-opt {
        padding: 8px 12px; border-radius: 4px; cursor: pointer;
        display: flex; align-items: center; gap: 8px;
        font-size: 0.82rem; font-family: 'Rajdhani', sans-serif; font-weight: 600;
        transition: 0.12s; color: var(--text);
    }
    .add-node-opt:hover { background: rgba(65,105,225,0.2); }
    .add-node-opt .pip { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ─── Toast ─────────────────────────────────────────────── */
    #toast {
        position: fixed; bottom: 20px; right: 20px; z-index: 99999;
        background: rgba(0,255,204,0.1); border: 1px solid var(--ai-edit);
        border-radius: 6px; padding: 9px 16px;
        font-family: 'Fira Code', monospace; font-size: 0.7rem;
        color: var(--ai-edit); pointer-events: none;
        opacity: 0; transition: opacity 0.3s; max-width: 320px;
    }
    #toast.show { opacity: 1; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- Navbar -->
<div class="navbar">
    <button class="btn-icon" title="Toggle Sidebar" onclick="toggleSidebar()">☰</button>
    <div class="navbar-brand">APUI<small>Vibe Tree Editor</small></div>
    <div class="navbar-input-area">
        <input type="text" id="user-input" placeholder="AI command — describe an edit… (attach 📷 for visual context)">
        <button class="btn-main" onclick="handleCommand()">RUN</button>
    </div>
    <!-- Vision controls -->
    <input type="file" id="apui-image-input" accept="image/*" multiple style="display:none" onchange="apuiHandleImageFiles(this.files);this.value=''">
    <button id="apui-screenshot-btn" class="btn-main" title="Screenshot the live preview and attach as visual context for the next AI command" onclick="apuiScreenshot()" style="background:rgba(0,255,204,0.12);border:1px solid var(--ai-edit);color:var(--ai-edit);padding:0 10px;font-size:0.72rem;">📷</button>
    <button class="btn-main" title="Attach an image as visual context" onclick="document.getElementById('apui-image-input').click()" style="background:rgba(65,105,225,0.15);border:1px solid var(--primary);color:var(--secondary);padding:0 10px;font-size:0.72rem;">🖼</button>
    <div style="flex:1"></div>
    <div class="nav-sync-badge">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-label">Synced</span>
    </div>
    <button class="btn-main" style="background: var(--ai-edit); color:#000; margin-left:8px;" onclick="pushAllToVibeTree()" title="Push all edits to Vibe System">⬆ PUSH</button>
    <button class="btn-main success" style="margin-left:6px;" onclick="downloadProject()">⬇ EXPORT</button>
</div>

<!-- Vision image preview strip (shows under navbar when images are attached) -->
<div id="apui-image-strip" style="display:none;position:fixed;top:52px;left:0;right:0;z-index:9999;background:rgba(10,14,28,0.96);border-bottom:1px solid rgba(65,105,225,0.3);padding:6px 12px;display:none;align-items:center;gap:8px;flex-wrap:wrap;min-height:0;">
    <span style="font-family:'Fira Code',monospace;font-size:0.65rem;color:rgba(0,255,204,0.7);flex-shrink:0;">📷 visual context:</span>
    <div id="apui-image-thumbs" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;"></div>
    <button onclick="apuiClearImages()" style="margin-left:auto;background:transparent;border:1px solid rgba(239,83,80,0.4);color:#ef9a9a;border-radius:4px;padding:2px 8px;font-size:0.65rem;cursor:pointer;font-family:'Fira Code',monospace;">✕ clear all</button>
</div>

<!-- Sidebar: Vibe Tree Explorer -->
<div id="sidebar">
    <div class="sidebar-header">Vibe Tree</div>
    <div class="sidebar-list" id="vt-sidebar-list"></div>
    <div class="sidebar-actions">
        <div class="sidebar-section">Add Node</div>
        <button class="sidebar-action-btn" onclick="showAddNodeMenu(event, null)">＋ New Node…</button>

<!-- Draggable OS Menu -->
<div id="os-menu-container">
    <div class="os-logo-container">
        <img src="/1737295468100.png" alt="APUI" class="center-image" onerror="this.style.display='none'; this.parentNode.querySelector('.logo-text').style.display='block'">
        <span class="logo-text" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-family:'Orbitron',sans-serif; font-size:0.9rem; color:var(--secondary); font-weight:700;">AP</span>
        <svg class="overlay" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="85" class="circle-segment" stroke="var(--secondary)" stroke-width="3.5" fill="none"></circle>

                <path d="M100,15 L100,29"></path><path d="M100,171 L100,185"></path>
                <path d="M15,100 L29,100"></path><path d="M171,100 L185,100"></path>
            </g>
        </svg>

    <button class="os-menu-btn btn-1" onclick="handleCommand('chat')">💬 Chat</button>
    <button class="os-menu-btn btn-2" onclick="handleCommand('preview')">👁 Preview</button>
    <button class="os-menu-btn btn-3" onclick="handleCommand('settings')">⚙ Settings</button>

    <button class="os-menu-btn btn-5" onclick="handleCommand('clean')">🧹 Clean</button>
</div>

<div id="toast"></div>

<script>
'use strict';

/* ════════════════════════════════════════════════════════════════
   VIBE TREE — canonical data store (mirrors app3.js vibeTree)
   ════════════════════════════════════════════════════════════════ */

// The local copy of the parent's vibeTree. All edits happen here then
// get pushed back via postMessage.
let vibeTree = {
    id: 'whole-page', type: 'container', description: 'Root',
    children: []
};

// nodeId → error message (from parent or iframe)
const nodeErrors = {};
// Set of nodeIds that have been edited but not yet pushed to parent
const dirtyNodes = new Set();

// ── postMessage bridge to the parent Vibe System ────────────────
function postToParent(type, payload) {
    try { window.parent.postMessage({ source: 'apui-vibe', type, ...payload }, '*'); }
    catch (_) { /* standalone mode */ }
}

// Listen for messages arriving from the parent app3.js host
window.addEventListener('message', e => {
    const d = e.data;
    if (!d || typeof d !== 'object') return;

    // Parent sends full vibeTree whenever APUI tab is activated
    if (d.type === 'apui-init' && d.vibeTree) {
        receiveVibeTree(d.vibeTree);
        return;
    }
    // Parent pushed an external update to a single node (e.g. agent ran)
    if (d.type === 'apui-node-updated' && d.nodeId != null) {
        applyExternalNodeUpdate(d.nodeId, d.newCode);
        return;
    }
    // Parent reports a runtime error attributed to a node
    if (d.type === 'apui-node-error' && d.nodeId != null) {
        setNodeError(d.nodeId, d.message || 'Unknown error');
        return;
    }
    // iframe console relay
    if (d.type === 'console') {
        logToConsole(d.msg, d.level || 'info');
        if (d.level === 'error') attributeRuntimeError(d.msg);
        return;
    }
});

function requestTree() {
    postToParent('apui-request-tree', {});
    setSyncLabel('Requesting tree…');
    // Fallback: if no response in 500ms, show demo tree
    setTimeout(() => {
        if (vibeTree.children.length === 0) loadDemoTree();
    }, 600);
}

function receiveVibeTree(incoming) {
    vibeTree = JSON.parse(JSON.stringify(incoming));
    dirtyNodes.clear();
    rebuildFromTree();
    renderSidebar();
    setSyncLabel('Synced');
    setSyncDirty(false);
    toast('Vibe Tree loaded ✓');
    updatePreview();
}

function applyExternalNodeUpdate(nodeId, newCode) {
    const node = findNodeInTree(nodeId);
    if (node) node.code = newCode;
    const editor = document.getElementById(`ed-${nodeId}`);
    if (editor) { editor.value = newCode; syncHighlight(nodeId); }
    dirtyNodes.delete(nodeId);
    updateDirtyDot(nodeId);
    toast(`[${nodeId}] updated by Vibe System`);
    updatePreview();
}

/* ════════════════════════════════════════════════════════════════
   TREE HELPERS
   ════════════════════════════════════════════════════════════════ */
function findNodeInTree(id, node = vibeTree) {
    if (!node) return null;
    if (node.id === id) return node;
    for (const c of (node.children || [])) {
        const f = findNodeInTree(id, c);
        if (f) return f;
    }
    return null;
}

function flattenTree(node = vibeTree, depth = 0, results = []) {
    if (!node) return results;
    results.push({ node, depth });
    for (const c of (node.children || [])) flattenTree(c, depth + 1, results);
    return results;
}

function addChildToTree(parentId, newNode) {
    const parent = findNodeInTree(parentId);
    if (!parent) return false;
    if (!parent.children) parent.children = [];
    parent.children.push(newNode);
    return true;
}

function removeFromTree(id, node = vibeTree) {
    if (!node.children) return;
    node.children = node.children.filter(c => c.id !== id);
    node.children.forEach(c => removeFromTree(id, c));
}

function findParentOf(id, node = vibeTree, parent = null) {
    if (node.id === id) return parent;
    for (const c of (node.children || [])) {
        const p = findParentOf(id, c, node);
        if (p) return p;
    }
    return null;
}

/* ════════════════════════════════════════════════════════════════
   APP STATE (UI / canvas layer)
   ════════════════════════════════════════════════════════════════ */
const AppState = {
    nodes: new Map(),          // nodeId → DOM element
    connections: [],           // { from, to }
    mru: [],
    pan: { x: 0, y: 0 }, scale: 1,
    isPanning: false, draggingNode: null, fullscreenNode: null,
    activePointers: new Map(),
    initialPinchDist: null, initialScale: 1,
    initialPan: { x: 0, y: 0 }, pinchCenter: { x: 0, y: 0 },
    pointerStart: { x: 0, y: 0 }, panStart: { x: 0, y: 0 }, nodeStart: { x: 0, y: 0 },
    zIndexCounter: 100,
    resizeObserver: null,
    settings: {
        apiKey: localStorage.getItem('apui_gemini_key') || '',
        model:  localStorage.getItem('apui_model')  || 'gemini-2.0-flash-exp'
    }
};

const delay = ms => new Promise(res => setTimeout(res, ms));
const viewport  = document.getElementById('viewport');
const world     = document.getElementById('world');
const svgLayer  = document.getElementById('connector-svg');
const userInput = document.getElementById('user-input');
const sidebar   = document.getElementById('sidebar');

/* ════════════════════════════════════════════════════════════════
   SIDEBAR — Vibe Tree Explorer
   ════════════════════════════════════════════════════════════════ */
function renderSidebar() {
    const list = document.getElementById('vt-sidebar-list');
    if (!list) return;
    list.innerHTML = '';
    flattenTree().forEach(({ node, depth }) => {
        const item = document.createElement('div');
        const isOpen = AppState.nodes.has(node.id);
        const hasError = !!nodeErrors[node.id];
        item.className = `sidebar-item sidebar-depth-${Math.min(depth,3)}${isOpen ? ' active' : ''}${hasError ? ' has-error' : ''}`;
        item.style.borderColor = isOpen ? 'rgba(65,105,225,0.5)' : '';
        item.innerHTML = `
            <span class="type-pip" style="background:${typeColor(node.type)}"></span>
            <span class="node-id">${node.id}</span>
            <span class="node-type">${node.type}</span>
        `;
        item.title = hasError ? `⚠ ${nodeErrors[node.id]}` : node.description || node.id;
        item.onclick = () => {
            if (isOpen) { centerOnNode(node.id); }
            else { spawnNodeFromTree(node.id); }
            if (window.innerWidth < 768) toggleSidebar();
        };
        list.appendChild(item);
    });
}

/* ════════════════════════════════════════════════════════════════
   BUILD / SPAWN CANVAS FROM TREE
   ════════════════════════════════════════════════════════════════ */
function rebuildFromTree() {
    // Remove old vibe nodes (keep system nodes: preview, chat, console, settings)
    const systemIds = new Set(['preview','chat','console','settings']);
    const toRemove = [];
    AppState.nodes.forEach((_, id) => { if (!systemIds.has(id)) toRemove.push(id); });
    toRemove.forEach(id => removeNodeDOM(id, false));
    AppState.connections = AppState.connections.filter(c => systemIds.has(c.from) || systemIds.has(c.to));

    // Spawn all real nodes from tree
    const vw = window.innerWidth;
    let x = 320, y = 80;
    flattenTree().forEach(({ node }) => {
        if (systemIds.has(node.id) || node.type === 'raw-html-container') return;
        if (!AppState.nodes.has(node.id)) {
            createVibeNode(node, x, y);
            x += 410;
            if (x > vw - 180) { x = 320; y += 340; }
        }
    });

    buildConnections();
    drawConnections();
}

function spawnNodeFromTree(id) {
    const node = findNodeInTree(id);
    if (!node) return;
    if (AppState.nodes.has(id)) { centerOnNode(id); return; }
    const cx = (-AppState.pan.x + window.innerWidth / 2) / AppState.scale - 180;
    const cy = (-AppState.pan.y + (window.innerHeight - 52) / 2) / AppState.scale - 130;
    createVibeNode(node, cx, cy);
    buildConnections();
    drawConnections();
    centerOnNode(id);
}

function buildConnections() {
    AppState.connections = AppState.connections.filter(c => c.isPermanent);
    AppState.nodes.forEach((_, id) => {
        const systemIds = new Set(['preview','chat','console','settings']);
        if (systemIds.has(id)) return;
        if (!AppState.connections.find(c => c.from === id && c.to === 'preview')) {
            AppState.connections.push({ from: id, to: 'preview' });
        }
        // Parent–child connections
        const parent = findParentOf(id);
        if (parent && !systemIds.has(parent.id) && AppState.nodes.has(parent.id)) {
            if (!AppState.connections.find(c => c.from === parent.id && c.to === id)) {
                AppState.connections.push({ from: parent.id, to: id, isParent: true });
            }
        }
    });
}

/* ════════════════════════════════════════════════════════════════
   NODE DOM CREATION
   ════════════════════════════════════════════════════════════════ */
function createVibeNode(treeNode, x, y) {
    const id   = treeNode.id;
    const type = treeNode.type;
    const code = treeNode.code || '';

    if (AppState.nodes.has(id)) { bringToFront(AppState.nodes.get(id)); return; }

    const isCode = ['html','css','javascript','js-function','declaration','head'].includes(type);
    const isSystem = ['preview','chat','console','settings'].includes(id);

    const el = document.createElement('div');
    el.className = 'node';
    el.id = `node-${id}`;
    el.dataset.id  = id;
    el.dataset.type = type;
    el.dataset.vtype = type;
    el.style.left = `${x}px`;
    el.style.top  = `${y}px`;

    const color = typeColor(type);
    const label = treeNode.description || id;
    const hasErr = !!nodeErrors[id];

    // Error bar
    const errHtml = `<div class="node-error-bar${hasErr ? ' visible' : ''}" id="errbar-${id}" onclick="openAIFix('${id}')">
        ⚠ <span id="errmsg-${id}">${escapeHTML(nodeErrors[id] || '')}</span> — click to AI-fix
    </div>`;

    // Content
    let contentHtml = '';
    if (isCode) {
        const lang = (type === 'css') ? 'css' : (type === 'html') ? 'markup' : 'javascript';
        contentHtml = `
            <div class="editor-container">
                <pre class="code-highlight" aria-hidden="true"><code class="language-${lang}" id="hl-${id}">${escapeHTML(code)}</code></pre>
                <textarea class="code-editor" id="ed-${id}" spellcheck="false"
                    oninput="onCodeInput('${id}')"
                    onscroll="syncScroll('${id}')">${escapeHTML(code)}</textarea>
                <div class="dirty-indicator" id="dirty-${id}"></div>
            </div>`;
    } else if (id === 'preview') {
        contentHtml = `<iframe class="preview-iframe" id="preview-frame"></iframe>`;
    } else if (id === 'chat') {
        contentHtml = `<div class="chat-output" id="ai-chat-box"></div>`;
    } else if (id === 'console') {
        contentHtml = `<div class="console-output" id="sys-console"></div>`;
    } else if (id === 'settings') {
        contentHtml = buildSettingsHTML();
    } else if (type === 'container') {
        const childCount = (treeNode.children || []).length;
        contentHtml = `<div style="padding:16px; color:rgba(255,255,255,0.4); font-size:0.85rem; line-height:1.6">
            Container · ${childCount} child node${childCount !== 1 ? 's' : ''}<br>
            <em style="font-size:0.75rem">${escapeHTML(treeNode.description || '')}</em><br><br>
            <button class="action-btn" onclick="spawnChildNodes('${id}')">Open Children</button>
        </div>`;
    }

    // Footer buttons
    let footerHtml = '';
    if (!isSystem) {
        footerHtml = `<div class="node-footer">`;
        footerHtml += `<button class="action-btn" onclick="askAI('${id}')">Ask AI</button>`;
        if (isCode) {
            footerHtml += `<button class="action-btn" onclick="aiEditAll('${id}')">AI Edit All</button>`;
            footerHtml += `<button class="action-btn save-btn" id="savebtn-${id}" onclick="saveNodeToTree('${id}')">⬆ Save</button>`;
        }
        footerHtml += `<button class="action-btn danger" onclick="deleteVibeNode('${id}')">Delete</button>`;
        footerHtml += `</div>`;
    }

    el.innerHTML = `
        <div class="node-header">
            <div class="node-title-row">
                <span class="type-dot" style="background:${color}"></span>
                <span class="node-title">${truncate(label, 22)}</span>
                <span class="node-id-label">${id}</span>
            </div>
            <span class="node-type-badge">${type}</span>
            <div class="node-controls">
                <button class="win-btn btn-min"   onclick="toggleMin('${id}')"          title="Minimise"></button>
                <button class="win-btn btn-close"  onclick="removeNodeDOM('${id}', true)" title="Close (keeps tree node)"></button>
            </div>
        </div>
        ${errHtml}
        <div class="node-content">${contentHtml}</div>
        ${footerHtml}
    `;

    world.appendChild(el);
    AppState.nodes.set(id, el);
    AppState.resizeObserver?.observe(el);
    bringToFront(el);
    enforceNodeLimit(id);

    if (isCode) {
        setTimeout(() => {
            const hl = document.getElementById(`hl-${id}`);
            if (hl) Prism.highlightElement(hl);
        }, 0);
    }

    renderSidebar();
    return el;
}

function createSystemNode(id, title, type, x, y) {
    const fakeNode = { id, type, description: title, code: '', children: [] };
    createVibeNode(fakeNode, x, y);
}

/* ════════════════════════════════════════════════════════════════
   CODE EDITING — two-way sync
   ════════════════════════════════════════════════════════════════ */
function onCodeInput(nodeId) {
    // Live highlight sync
    const editor = document.getElementById(`ed-${nodeId}`);
    const hl     = document.getElementById(`hl-${nodeId}`);
    if (editor && hl) { hl.innerHTML = escapeHTML(editor.value); Prism.highlightElement(hl); }

    // Mark dirty
    dirtyNodes.add(nodeId);
    updateDirtyDot(nodeId);
    setSyncDirty(true);

    // Write-through to tree with debounce for live preview
    if (window._previewTimer) clearTimeout(window._previewTimer);
    window._previewTimer = setTimeout(() => {
        commitToTree(nodeId);
        updatePreview();
    }, 800);
}

function commitToTree(nodeId) {
    const editor = document.getElementById(`ed-${nodeId}`);
    const node   = findNodeInTree(nodeId);
    if (editor && node) node.code = editor.value;
}

// Save one node and immediately push it to the parent system
function saveNodeToTree(nodeId) {
    commitToTree(nodeId);
    const node = findNodeInTree(nodeId);
    if (!node) return;

    dirtyNodes.delete(nodeId);
    updateDirtyDot(nodeId);
    if (dirtyNodes.size === 0) setSyncDirty(false);

    // Push to parent
    postToParent('apui-node-update', { nodeId, newCode: node.code });
    toast(`[${nodeId}] saved to Vibe Tree ✓`);

    // Animate button
    const btn = document.getElementById(`savebtn-${nodeId}`);
    if (btn) {
        btn.textContent = '✓ Saved';
        btn.classList.add('saved');
        setTimeout(() => { btn.textContent = '⬆ Save'; btn.classList.remove('saved'); }, 2000);
    }
}

// Push all dirty nodes at once to the parent
function pushAllToVibeTree() {
    AppState.nodes.forEach((_, id) => commitToTree(id));
    if (dirtyNodes.size === 0) { toast('All nodes already in sync ✓'); return; }

    const updates = [];
    dirtyNodes.forEach(id => {
        const node = findNodeInTree(id);
        if (node) updates.push({ nodeId: id, newCode: node.code });
    });
    postToParent('apui-bulk-update', { updates });

    dirtyNodes.clear();
    AppState.nodes.forEach((_, id) => updateDirtyDot(id));
    setSyncDirty(false);
    toast(`Pushed ${updates.length} update(s) to Vibe System ✓`);
}

function syncHighlight(nodeId) {
    const editor = document.getElementById(`ed-${nodeId}`);
    const hl     = document.getElementById(`hl-${nodeId}`);
    if (editor && hl) { hl.innerHTML = escapeHTML(editor.value); Prism.highlightElement(hl); }
}

function syncScroll(id) {
    const ed = document.getElementById(`ed-${id}`);
    const hl = document.getElementById(`hl-${id}`);
    if (ed && hl) { hl.parentElement.scrollTop = ed.scrollTop; hl.parentElement.scrollLeft = ed.scrollLeft; }
}

function updateDirtyDot(nodeId) {
    const dot = document.getElementById(`dirty-${nodeId}`);
    if (dot) dot.classList.toggle('visible', dirtyNodes.has(nodeId));
}

/* ════════════════════════════════════════════════════════════════
   ERROR HANDLING
   ════════════════════════════════════════════════════════════════ */
function setNodeError(nodeId, message) {
    nodeErrors[nodeId] = message;
    const bar  = document.getElementById(`errbar-${nodeId}`);
    const msg  = document.getElementById(`errmsg-${nodeId}`);
    const domNode = AppState.nodes.get(nodeId);
    if (bar)  { bar.classList.add('visible'); }
    if (msg)  { msg.textContent = message; }
    if (domNode) domNode.classList.add('has-error');
    renderSidebar();
}

function clearNodeError(nodeId) {
    delete nodeErrors[nodeId];
    const bar     = document.getElementById(`errbar-${nodeId}`);
    const domNode = AppState.nodes.get(nodeId);
    if (bar) bar.classList.remove('visible');
    if (domNode) domNode.classList.remove('has-error');
    renderSidebar();
}

function attributeRuntimeError(message) {
    // Try to attribute to the most recently edited JS node
    const jsNode = flattenTree().find(({ node }) =>
        ['javascript','js-function','declaration'].includes(node.type)
    );
    if (jsNode) setNodeError(jsNode.node.id, message);
}

function openAIFix(nodeId) {
    const err = nodeErrors[nodeId] || '';
    const req = prompt(`AI Fix — [${nodeId}]\n\nError: ${err}\n\nDescribe fix (or leave empty for auto):`, 'Fix this error automatically');
    if (req === null) return;
    clearNodeError(nodeId);
    aiEditAll(nodeId, `Fix this error in node [${nodeId}]: ${err}. ${req}`);
}

/* ════════════════════════════════════════════════════════════════
   ADD / DELETE VIBE NODES
   ════════════════════════════════════════════════════════════════ */
let _addMenuParentId = null;

function showAddNodeMenu(e, parentId) {
    _addMenuParentId = parentId;
    const menu = document.getElementById('add-node-menu');
    menu.classList.add('open');
    const menuW = 170, menuH = 220;
    let lx = e.clientX, ly = e.clientY - menuH - 10;
    if (ly < 0) ly = e.clientY + 10;
    if (lx + menuW > window.innerWidth) lx = window.innerWidth - menuW - 8;
    menu.style.left = lx + 'px';
    menu.style.top  = ly + 'px';
    // Close on outside click
    setTimeout(() => document.addEventListener('click', () => menu.classList.remove('open'), { once: true }), 10);
}

function addVibeNodeOfType(type) {
    const id = `${type}-${Date.now().toString(36)}`;
    const newNode = {
        id, type,
        description: `New ${type} node`,
        code: defaultCode(type),
        children: []
    };
    const parentId = _addMenuParentId || vibeTree.id;
    addChildToTree(parentId, newNode);

    // Spawn it on canvas
    const cx = (-AppState.pan.x + window.innerWidth / 2) / AppState.scale - 180;
    const cy = (-AppState.pan.y + (window.innerHeight - 52) / 2) / AppState.scale - 130;
    createVibeNode(newNode, cx, cy);
    buildConnections();
    drawConnections();
    centerOnNode(id);

    dirtyNodes.add(id);
    setSyncDirty(true);
    renderSidebar();

    // Tell parent a node was created
    postToParent('apui-create-node', { parentId, newNode });
    toast(`Created ${type} node: ${id}`);
    document.getElementById('add-node-menu').classList.remove('open');
}

function spawnChildNodes(containerId) {
    const container = findNodeInTree(containerId);
    if (!container) return;
    const base = AppState.nodes.get(containerId);
    let x = base ? parseFloat(base.style.left) + 420 : 320;
    let y = base ? parseFloat(base.style.top)  : 80;
    for (const child of (container.children || [])) {
        if (!AppState.nodes.has(child.id)) {
            createVibeNode(child, x, y);
            x += 420;
        }
    }
    buildConnections();
    drawConnections();
}

function deleteVibeNode(nodeId) {
    if (!confirm(`Delete node "${nodeId}" from the Vibe Tree?\nThis will remove it from the project.`)) return;
    removeFromTree(nodeId);
    removeNodeDOM(nodeId, false);
    dirtyNodes.delete(nodeId);
    postToParent('apui-delete-node', { nodeId });
    renderSidebar();
    toast(`[${nodeId}] deleted`);
}

function removeNodeDOM(id, keepInTree = true) {
    const el = AppState.nodes.get(id);
    if (!el) return;
    if (AppState.fullscreenNode === el) AppState.fullscreenNode = null;
    AppState.resizeObserver?.unobserve(el);
    el.remove();
    AppState.nodes.delete(id);
    AppState.mru = AppState.mru.filter(n => n !== id);
    AppState.connections = AppState.connections.filter(c => c.from !== id && c.to !== id);
    enforceNodeLimit('preview');
    updatePreview();
    renderSidebar();
    drawConnections();
}

/* ════════════════════════════════════════════════════════════════
   PREVIEW — assembled directly from vibeTree
   ════════════════════════════════════════════════════════════════ */
function updatePreview() {
    const iframe = document.getElementById('preview-frame');
    if (!iframe) return;

    let css = '', js = '', html = '';
    flattenTree().forEach(({ node }) => {
        if (['preview','chat','console','settings'].includes(node.id)) return;
        const editor = document.getElementById(`ed-${node.id}`);
        const code   = editor ? editor.value : (node.code || '');
        if (node.type === 'css')  css  += code + '\n';
        else if (['javascript','js-function','declaration'].includes(node.type)) js += code + '\n';
        else if (['html','raw-html-container'].includes(node.type)) html += code + '\n';
    });

    const fullHtml = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>${css}</style>
<script>(function(){
    var oc = {
        log: console.log.bind(console),
        warn: console.warn.bind(console),
        error: console.error.bind(console),
        info: console.info.bind(console)
    };
    function s(l,m){ try{ window.parent.postMessage({type:'console',level:l,msg:String(m)},'*'); }catch(e){} }
    console.log   = function(){ oc.log.apply(console,arguments);   s('log',   Array.prototype.slice.call(arguments).join(' ')); };
    console.warn  = function(){ oc.warn.apply(console,arguments);  s('warn',  Array.prototype.slice.call(arguments).join(' ')); };
    console.error = function(){ oc.error.apply(console,arguments); s('error', Array.prototype.slice.call(arguments).join(' ')); };
    console.info  = function(){ oc.info.apply(console,arguments);  s('info',  Array.prototype.slice.call(arguments).join(' ')); };
    window.onerror = function(msg,src,line){
        s('error', msg + ' (line:' + line + ')');
        return false;
    };
    window.addEventListener('unhandledrejection', function(e){
        s('error', 'Unhandled promise: ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason)));
    });
})();<\/script>
</head>
<body>
${html}
<script>
${js}
<\/script>
</body>
</html>`;

    // Blob URL approach — most reliable for JS on mobile Chrome
    try {
        const blob = new Blob([fullHtml], { type: 'text/html' });
        const url  = URL.createObjectURL(blob);
        // Revoke previous blob URL to avoid memory leak
        if (iframe._blobUrl) URL.revokeObjectURL(iframe._blobUrl);
        iframe._blobUrl = url;
        iframe.src = url;
    } catch(e) {
        // Fallback: srcdoc
        iframe.srcdoc = fullHtml;
    }
}

/* ════════════════════════════════════════════════════════════════
   AI — vibe-tree-aware editing via Gemini
   ════════════════════════════════════════════════════════════════ */
async function callGemini(sysPrompt, userPrompt, forceJson = false, images = []) {
    if (!AppState.settings.apiKey) {
        logToConsole('Missing API Key — open Settings', 'error');
        throw new Error('Missing API Key');
    }
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${AppState.settings.model}:generateContent?key=${AppState.settings.apiKey}`;

    // Build parts — text first, then inline image data
    const parts = [{ text: `${sysPrompt}\n\n${userPrompt}` }];
    if (Array.isArray(images) && images.length > 0) {
        images.forEach(img => {
            if (typeof img === 'string' && img.startsWith('data:')) {
                const [header, data] = img.split(',');
                const mimeType = header.split(':')[1].split(';')[0];
                parts.push({ inlineData: { mimeType, data } });
            } else if (img && img.data) {
                parts.push({ inlineData: { mimeType: img.mimeType || 'image/png', data: img.data } });
            }
        });
    }

    const body = { contents: [{ role: 'user', parts }] };
    if (forceJson) body.generationConfig = { responseMimeType: 'application/json' };

    const res  = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    if (!data.candidates?.[0]?.content) throw new Error('AI returned empty response');
    return data.candidates[0].content.parts[0].text;
}

let _apuiPendingImages = []; // array of dataURL strings

/** Capture the live preview iframe as a PNG dataURL using html2canvas */
async function apuiCapturePreview() {
    const iframe = document.getElementById('preview-frame');
    if (!iframe) throw new Error('Preview node not open — open the Preview node first.');

    const iWin = iframe.contentWindow;
    const iDoc = iframe.contentDocument || iWin?.document;
    if (!iDoc || !iDoc.body) throw new Error('Preview not ready yet.');

    // Inject html2canvas on demand
    if (!iWin.html2canvas) {
        await new Promise((resolve, reject) => {
            const s = iDoc.createElement('script');
            s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
            s.onload = resolve;
            s.onerror = () => reject(new Error('html2canvas load failed'));
            iDoc.head.appendChild(s);
        });
    }

    const canvas = await iWin.html2canvas(iDoc.body, {
        useCORS: true, allowTaint: true, scale: 0.7, logging: false
    });
    return canvas.toDataURL('image/png');
}

/** Add a dataURL to the pending images queue */
function apuiAddImage(dataURL) {
    _apuiPendingImages.push(dataURL);
    _apuiRefreshStrip();
}

/** Drain the pending images and return them (clears queue) */
function apuiConsumeImages() {
    const imgs = _apuiPendingImages.slice();
    _apuiPendingImages = [];
    _apuiRefreshStrip();
    return imgs;
}

/** Peek without consuming */
function apuiPeekImages() { return _apuiPendingImages.slice(); }

function apuiClearImages() {
    _apuiPendingImages = [];
    _apuiRefreshStrip();
}

/** Re-render the thumbnail strip below the navbar */
function _apuiRefreshStrip() {
    const strip  = document.getElementById('apui-image-strip');
    const thumbs = document.getElementById('apui-image-thumbs');
    if (!strip || !thumbs) return;

    thumbs.innerHTML = '';
    _apuiPendingImages.forEach((dataURL, i) => {
        const wrap = document.createElement('div');
        wrap.style.cssText = 'position:relative;display:inline-block;';
        const img = document.createElement('img');
        img.src = dataURL;
        img.style.cssText = 'width:44px;height:44px;object-fit:cover;border-radius:4px;border:1px solid rgba(65,105,225,0.5);display:block;cursor:pointer;';
        img.title = 'Click to remove';
        img.onclick = () => { _apuiPendingImages.splice(i, 1); _apuiRefreshStrip(); };
        wrap.appendChild(img);
        // small index badge
        const badge = document.createElement('span');
        badge.textContent = i + 1;
        badge.style.cssText = 'position:absolute;top:-4px;left:-4px;background:var(--primary);color:#fff;font-size:9px;border-radius:50%;width:14px;height:14px;line-height:14px;text-align:center;pointer-events:none;';
        wrap.appendChild(badge);
        thumbs.appendChild(wrap);
    });

    const hasImages = _apuiPendingImages.length > 0;
    strip.style.display = hasImages ? 'flex' : 'none';

    // Shift viewport and sidebar down to accommodate the strip
    const extraTop = hasImages ? 42 : 0;
    const vp = document.getElementById('viewport');
    const sb = document.getElementById('sidebar');
    if (vp) vp.style.top = `${52 + extraTop}px`;
    if (sb) sb.style.top = `${52 + extraTop}px`;
}

/** Handle file input: read files as dataURLs */
function apuiHandleImageFiles(files) {
    Array.from(files).forEach(file => {
        if (!file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = e => apuiAddImage(e.target.result);

}

// Core multi-node AI edit — builds an agent plan and applies it directly to vibeTree,
// then pushes changes to the parent system.
async function aiEditAll(triggerId, explicitReq = null) {
    if (!AppState.settings.apiKey) { logToConsole('Missing API Key — open Settings', 'error'); centerOnNode('settings', 400); return; }
    const req = explicitReq || prompt('What should AI build or edit across the project?');
    if (!req) return;

    // Consume any pending visual context
    const images = apuiConsumeImages();

    ensureChat(); enforceNodeLimit('chat'); logToChat('user', req);
    if (images.length) logToChat('system', `📷 ${images.length} screenshot/image(s) attached — Jarvis will use visual context`);

    try {
        await simulateThinking(triggerId);
        const context = getVibeContext();

        const imageInstruction = images.length
            ? `\n\nVISUAL CONTEXT: The user has attached ${images.length} image(s) showing the current visual state of the project. Study them carefully — use what you see (layout, colours, broken elements, missing features) to inform your edits. Describe in your "plan" what visual issue or improvement you identified.`
            : '';

        // Build an agent plan compatible with app3.js's executeAgentPlan format
        const sys = `You are an expert web developer editing a modular vibe-tree project.
Return ONLY a valid JSON object — NO other text:
{
  "plan": "one-line summary of what you will do",
  "actions": [
    { "actionType": "update", "nodeId": "EXISTING_ID", "newCode": "complete updated code" },
    { "actionType": "create", "parentId": "PARENT_CONTAINER_ID", "newNode": { "id": "unique-id", "type": "html|css|javascript|js-function|declaration|head", "description": "short desc", "code": "complete code" } }
  ]
}

RULES:
1. For "update" provide FULL new code — never truncate.
2. Prefer updating existing nodes over creating.
3. HTML nodes: body-level markup only (no <html>/<head>/<body> tags).
4. CSS: standalone styles. JS: standalone logic.
5. "create" actions need a valid parentId that exists in the tree (use "${vibeTree.id}" for root).${imageInstruction}`;

        const user = `VIBE TREE CONTEXT:
${JSON.stringify(context, null, 2)}

TREE ROOT ID: ${vibeTree.id}
USER REQUEST: "${req}"
(Context node: ${triggerId})

Return the JSON object now.`;

        logToChat('system', 'Jarvis drafting changes…');
        const raw = await callGemini(sys, user, true, images);
        let plan;
        try { plan = JSON.parse(raw); } catch { throw new Error('AI returned invalid JSON'); }

        logToChat('ai', `Plan: ${plan.plan}`);
        logToChat('ai', `Applying ${plan.actions?.length || 0} action(s)…`);

        const pushUpdates = [];

        for (const action of (plan.actions || [])) {
            if (action.actionType === 'update') {
                const domNode = AppState.nodes.get(action.nodeId);
                const treeNode = findNodeInTree(action.nodeId);
                if (!treeNode) { logToChat('system', `⚠ Node [${action.nodeId}] not found`); continue; }

                centerOnNode(action.nodeId, 400);
                if (domNode) domNode.classList.add('ai-updating');
                await delay(500);

                treeNode.code = action.newCode;
                const editor = document.getElementById(`ed-${action.nodeId}`);
                if (editor) { editor.value = action.newCode; syncHighlight(action.nodeId); }

                dirtyNodes.delete(action.nodeId);
                updateDirtyDot(action.nodeId);
                pushUpdates.push({ nodeId: action.nodeId, newCode: action.newCode });

                logToChat('system', `Updated [${action.nodeId}]`);
                await delay(400);
                if (domNode) domNode.classList.remove('ai-updating');

            } else if (action.actionType === 'create') {
                const newNode = action.newNode;
                if (!newNode?.id || !newNode?.type) { logToChat('system', `⚠ Invalid create action skipped`); continue; }
                if (findNodeInTree(newNode.id)) newNode.id += '-' + Date.now().toString(36);

                addChildToTree(action.parentId || vibeTree.id, newNode);
                const base = AppState.nodes.get(triggerId);
                const nx = base ? parseFloat(base.style.left) + base.offsetWidth + 50 : 400;
                const ny = base ? parseFloat(base.style.top) : 100;
                const newEl = createVibeNode(newNode, nx, ny);
                buildConnections(); drawConnections();

                centerOnNode(newNode.id, 400);
                if (newEl) newEl.classList.add('ai-updating');
                logToChat('system', `Created [${newNode.id}]`);
                await delay(600);
                if (newEl) newEl.classList.remove('ai-updating');

                pushUpdates.push({ nodeId: newNode.id, newCode: newNode.code, isNew: true, newNode });
            }
        }

        // Push all changes to the parent Vibe System in one shot
        postToParent('apui-bulk-update', { updates: pushUpdates });

        renderSidebar();
        logToChat('ai', 'Done! Preview updated.');
        updatePreview();

        if (AppState.nodes.has('preview')) {
            await delay(300); centerOnNode('preview', 500);
            AppState.nodes.get('preview')?.classList.add('ai-updating');
            setTimeout(() => AppState.nodes.get('preview')?.classList.remove('ai-updating'), 1200);
        }
    } catch(e) { logToChat('system', '⚠ ' + e.message); console.error(e); }
}

/* ════════════════════════════════════════════════════════════════
   COMMAND HANDLER
   ════════════════════════════════════════════════════════════════ */
async function handleCommand(specificCmd = null) {
    const val = specificCmd || userInput.value.trim();
    if (!val) return;
    const cmd = val.toLowerCase();
    document.getElementById('os-menu-container').classList.remove('open');

    const cx = (-AppState.pan.x + window.innerWidth / 2) / AppState.scale - 180;
    const cy = (-AppState.pan.y + (window.innerHeight - 52) / 2) / AppState.scale - 130;

    if (cmd === 'preview')  { createSystemNode('preview','Live Preview','preview', cx, cy); enforceNodeLimit('preview'); centerOnNode('preview', 400); updatePreview(); }
    else if (cmd === 'chat')     { createSystemNode('chat','AI Activity','chat', cx, cy); enforceNodeLimit('chat'); centerOnNode('chat', 400); }
    else if (cmd === 'console')  { createSystemNode('console','Console','console', cx, cy); enforceNodeLimit('console'); centerOnNode('console', 400); }
    else if (cmd === 'settings') { createSystemNode('settings','Settings','settings', cx, cy); enforceNodeLimit('settings'); centerOnNode('settings', 400); }
    else if (cmd === 'clean') {
        const systemIds = new Set(['preview','chat','console','settings']);
        const toRemove = [];
        AppState.nodes.forEach((_, id) => { if (!systemIds.has(id)) toRemove.push(id); });
        toRemove.forEach(id => removeNodeDOM(id, true));
        drawConnections(); logToConsole('Canvas cleared.', 'success');
    } else if (cmd === 'push') {
        pushAllToVibeTree();
    } else if (cmd === '/snap' || cmd === 'screenshot') {
        // Shortcut: capture preview then prompt for what to fix
        await apuiScreenshot();
        const editReq = prompt('Screenshot captured! What should Jarvis fix or improve based on what you see?');
        if (editReq) {
            ensureChat(); enforceNodeLimit('chat'); centerOnNode('chat', 350);
            await aiEditAll('root', editReq);
        }
    } else {
        // Free-form AI command — images already in _apuiPendingImages will be consumed inside aiEditAll
        ensureChat(); enforceNodeLimit('chat'); centerOnNode('chat', 350);
        await aiEditAll('root', val);
    }
    if (!specificCmd) userInput.value = '';
}

/* ════════════════════════════════════════════════════════════════
   SVG CONNECTIONS
   ════════════════════════════════════════════════════════════════ */
function drawConnections() {
    svgLayer.innerHTML = '';
    AppState.connections.forEach(conn => {
        const n1 = AppState.nodes.get(conn.from);
        const n2 = AppState.nodes.get(conn.to);
        if (!n1 || !n2) return;
        if (n1.classList.contains('minimized') || n2.classList.contains('minimized')) return;

        const x1 = parseFloat(n1.style.left) + n1.offsetWidth  / 2;
        const y1 = parseFloat(n1.style.top)  + n1.offsetHeight / 2;
        const x2 = parseFloat(n2.style.left) + n2.offsetWidth  / 2;
        const y2 = parseFloat(n2.style.top)  + n2.offsetHeight / 2;

        const line = document.createElementNS('http://www.w3.org/2000/svg','line');
        line.setAttribute('x1', x1); line.setAttribute('y1', y1);
        line.setAttribute('x2', x2); line.setAttribute('y2', y2);
        line.setAttribute('stroke', conn.isParent ? '#4fc3f7' : '#4169e1');
        line.setAttribute('stroke-width', conn.isParent ? '2' : '1.5');
        line.setAttribute('opacity', conn.isParent ? '0.55' : '0.3');
        line.setAttribute('data-from', conn.from);
        line.setAttribute('data-to',   conn.to);
        svgLayer.appendChild(line);
    });
}

/* ════════════════════════════════════════════════════════════════
   PHYSICS — collision resolution
   ════════════════════════════════════════════════════════════════ */
function resolveCollisions() {
    const padding = 28;
    const active  = Array.from(AppState.nodes.values()).filter(n =>
        !n.classList.contains('hidden') && !n.classList.contains('out-of-view') &&
        !n.classList.contains('fullscreen-mode') && !n.classList.contains('animating-bounds'));

    let moved = false;
    for (let i = 0; i < active.length; i++) {
        for (let j = i + 1; j < active.length; j++) {
            const n1 = active[i], n2 = active[j];
            const r1 = { x: parseFloat(n1.style.left)||0, y: parseFloat(n1.style.top)||0, w: n1.offsetWidth, h: n1.offsetHeight };
            const r2 = { x: parseFloat(n2.style.left)||0, y: parseFloat(n2.style.top)||0, w: n2.offsetWidth, h: n2.offsetHeight };
            let cx1 = r1.x+r1.w/2, cy1 = r1.y+r1.h/2, cx2 = r2.x+r2.w/2, cy2 = r2.y+r2.h/2;
            if (Math.abs(cx1-cx2) < 1 && Math.abs(cy1-cy2) < 1) { cx1 += Math.random()*2-1; cy1 += Math.random()*2-1; }
            const ox = (r1.w+r2.w)/2 + padding - Math.abs(cx1-cx2);
            const oy = (r1.h+r2.h)/2 + padding - Math.abs(cy1-cy2);
            if (ox > 0 && oy > 0) {
                moved = true;
                const p1 = AppState.draggingNode === n1 ? 0 : 0.5;
                const p2 = AppState.draggingNode === n2 ? 0 : 0.5;
                const spd = 0.14;
                if (ox < oy) { const d = cx1<cx2?-1:1; if(p1>0)n1.style.left=`${r1.x+d*ox*p1*spd}px`; if(p2>0)n2.style.left=`${r2.x-d*ox*p2*spd}px`; }
                else         { const d = cy1<cy2?-1:1; if(p1>0)n1.style.top =`${r1.y+d*oy*p1*spd}px`; if(p2>0)n2.style.top =`${r2.y-d*oy*p2*spd}px`; }
            }
        }
    }
    if (moved) drawConnections();
}

function startPhysicsLoop() {
    function tick() { resolveCollisions(); requestAnimationFrame(tick); }
    requestAnimationFrame(tick);
}

/* ════════════════════════════════════════════════════════════════
   PAN / ZOOM / DRAG
   ════════════════════════════════════════════════════════════════ */
function initPointerSystem() {
    let downPos = { x: 0, y: 0 };

    viewport.addEventListener('pointerdown', e => {
        downPos = { x: e.clientX, y: e.clientY };
        AppState.activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

        if (AppState.activePointers.size === 2) {
            if (AppState.fullscreenNode) toggleNodeFullscreen(AppState.fullscreenNode);
            const pts = Array.from(AppState.activePointers.values());
            AppState.initialPinchDist = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
            AppState.initialScale = AppState.scale;
            AppState.initialPan  = { x: AppState.pan.x, y: AppState.pan.y };
            AppState.pinchCenter = { x: (pts[0].x+pts[1].x)/2, y: (pts[0].y+pts[1].y)/2 };
            return;
        }
        if (e.target.closest('input,textarea,button,select,.code-editor,.settings-panel,.console-output,.chat-output')) return;
        e.preventDefault();

        const header = e.target.closest('.node-header');
        const body   = e.target.closest('.node');
        if (header) { const id = header.closest('.node').dataset.id; enforceNodeLimit(id); startNodeDrag(e, AppState.nodes.get(id)); }
        else if (body) { enforceNodeLimit(body.dataset.id); bringToFront(body); }
        else startWorldPan(e);
    });

    window.addEventListener('pointermove', e => {
        if (AppState.activePointers.has(e.pointerId)) AppState.activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        if (AppState.activePointers.size === 2) {
            e.preventDefault();
            const pts = Array.from(AppState.activePointers.values());
            const d   = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
            const ns  = Math.max(0.1, Math.min(AppState.initialScale*(d/AppState.initialPinchDist), 3.0));
            AppState.scale = ns;
            AppState.pan.x = AppState.pinchCenter.x-(AppState.pinchCenter.x-AppState.initialPan.x)*(ns/AppState.initialScale);
            AppState.pan.y = AppState.pinchCenter.y-(AppState.pinchCenter.y-AppState.initialPan.y)*(ns/AppState.initialScale);
            updateWorldTransform(); return;
        }
        if (AppState.draggingNode) { e.preventDefault(); dragNode(e); }
        else if (AppState.isPanning) { e.preventDefault(); panWorld(e); }
    });

    const onUp = e => {
        if (AppState.draggingNode && AppState.activePointers.size <= 1) {
            if (Math.hypot(e.clientX-downPos.x, e.clientY-downPos.y) < 5) toggleNodeFullscreen(AppState.draggingNode);
        }
        AppState.activePointers.delete(e.pointerId);
        if (AppState.activePointers.size === 1) {
            const r = Array.from(AppState.activePointers.values())[0];
            AppState.pointerStart = { x: r.x, y: r.y };
            AppState.panStart     = { x: AppState.pan.x, y: AppState.pan.y };
        }
        if (AppState.activePointers.size < 2) AppState.initialPinchDist = null;
        stopInteraction();
    };
    window.addEventListener('pointerup',     onUp);
    window.addEventListener('pointercancel', onUp);
}

function initWheelZoom() {
    viewport.addEventListener('wheel', e => {
        if (e.target.closest('.node-content')) return;
        e.preventDefault();
        if (e.deltaY > 0 && AppState.fullscreenNode) { toggleNodeFullscreen(AppState.fullscreenNode); return; }
        const ns = Math.max(0.1, Math.min(AppState.scale*(1+(-e.deltaY*0.002)), 3.0));
        AppState.pan.x = e.clientX-(e.clientX-AppState.pan.x)*(ns/AppState.scale);
        AppState.pan.y = e.clientY-(e.clientY-AppState.pan.y)*(ns/AppState.scale);
        AppState.scale = ns;
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        updateWorldTransform();
    }, { passive: false });
}

let animationFrameId = null;
function animateTo(tx, ty, ts, dur = 400) {
    if (animationFrameId) cancelAnimationFrame(animationFrameId);
    const sx = AppState.pan.x, sy = AppState.pan.y, ss = AppState.scale, t0 = performance.now();
    function step(t) {
        const p = Math.min((t-t0)/dur, 1), e = 1-Math.pow(1-p, 3);
        AppState.pan.x = sx+(tx-sx)*e; AppState.pan.y = sy+(ty-sy)*e; AppState.scale = ss+(ts-ss)*e;
        updateWorldTransform();
        if (p < 1) animationFrameId = requestAnimationFrame(step); else animationFrameId = null;
    }
    requestAnimationFrame(step);
}
function updateWorldTransform() { world.style.transform = `translate(${AppState.pan.x}px,${AppState.pan.y}px) scale(${AppState.scale})`; drawConnections(); }
function startNodeDrag(e, nodeEl) { if (AppState.activePointers.size>1) return; AppState.draggingNode=nodeEl; bringToFront(nodeEl); AppState.pointerStart={x:e.clientX,y:e.clientY}; AppState.nodeStart={x:parseFloat(nodeEl.style.left)||0,y:parseFloat(nodeEl.style.top)||0}; nodeEl.classList.add('dragging'); }
function dragNode(e) { if(!AppState.draggingNode||AppState.activePointers.size>1) return; AppState.draggingNode.style.left=`${AppState.nodeStart.x+(e.clientX-AppState.pointerStart.x)/AppState.scale}px`; AppState.draggingNode.style.top=`${AppState.nodeStart.y+(e.clientY-AppState.pointerStart.y)/AppState.scale}px`; requestAnimationFrame(drawConnections); }
function startWorldPan(e) { AppState.isPanning=true; viewport.style.cursor='grabbing'; AppState.pointerStart={x:e.clientX,y:e.clientY}; AppState.panStart={x:AppState.pan.x,y:AppState.pan.y}; }
function panWorld(e) { if(!AppState.isPanning||AppState.activePointers.size>1) return; AppState.pan.x=AppState.panStart.x+(e.clientX-AppState.pointerStart.x); AppState.pan.y=AppState.panStart.y+(e.clientY-AppState.pointerStart.y); if(animationFrameId)cancelAnimationFrame(animationFrameId); updateWorldTransform(); }
function stopInteraction() { if(AppState.draggingNode){AppState.draggingNode.classList.remove('dragging');AppState.draggingNode=null;} if(AppState.isPanning){AppState.isPanning=false;viewport.style.cursor='grab';} }
function bringToFront(node) { AppState.zIndexCounter++; node.style.zIndex=AppState.zIndexCounter; }

function centerOnNode(id, dur = 450) {
    enforceNodeLimit(id);
    const node = AppState.nodes.get(id);
    if (!node) return;
    bringToFront(node);
    node.classList.remove('hidden');
    const nx=parseFloat(node.style.left)||0, ny=parseFloat(node.style.top)||0;
    animateTo(window.innerWidth/2-(nx+node.offsetWidth/2)*AppState.scale, (window.innerHeight-52)/2-(ny+node.offsetHeight/2)*AppState.scale, AppState.scale, dur);
}

function enforceNodeLimit(targetId) {
    if (!targetId) return;
    AppState.mru = AppState.mru.filter(n => n !== targetId);
    AppState.mru.unshift(targetId);
    const visible = new Set([targetId]);
    if (AppState.nodes.has('preview')) visible.add('preview');
    if (AppState.nodes.has('chat'))    visible.add('chat');
    AppState.connections.forEach(c => {
        if (c.from===targetId&&AppState.nodes.has(c.to))   visible.add(c.to);
        if (c.to===targetId&&AppState.nodes.has(c.from))   visible.add(c.from);
    });
    for (const id of AppState.mru) {
        if (visible.size >= 7) break;
        if (AppState.nodes.has(id)) visible.add(id);
    }
    AppState.nodes.forEach((node, id) => node.classList.toggle('out-of-view', !visible.has(id)));
    drawConnections();
}

function toggleNodeFullscreen(node) {
    bringToFront(node);
    node.classList.add('animating-bounds');
    const t0 = performance.now();
    (function al(t) { drawConnections(); if(t-t0<400) requestAnimationFrame(al); })(t0);
    setTimeout(() => node.classList.remove('animating-bounds'), 400);
    if (node.classList.contains('fullscreen-mode')) {
        node.style.width = node.dataset.origW; node.style.height = node.dataset.origH;
        animateTo(parseFloat(node.dataset.origPanX), parseFloat(node.dataset.origPanY), parseFloat(node.dataset.origScale), 400);
        node.classList.remove('fullscreen-mode');
        if (AppState.fullscreenNode === node) AppState.fullscreenNode = null;
    } else {
        if (AppState.fullscreenNode && AppState.fullscreenNode !== node) {
            AppState.fullscreenNode.style.width = AppState.fullscreenNode.dataset.origW;
            AppState.fullscreenNode.style.height = AppState.fullscreenNode.dataset.origH;
            AppState.fullscreenNode.classList.remove('fullscreen-mode');
        }
        node.dataset.origW = node.style.width || node.offsetWidth+'px';
        node.dataset.origH = node.style.height || node.offsetHeight+'px';
        node.dataset.origPanX = AppState.pan.x; node.dataset.origPanY = AppState.pan.y; node.dataset.origScale = AppState.scale;
        node.style.width = window.innerWidth+'px'; node.style.height = (window.innerHeight-52)+'px';
        animateTo(-parseFloat(node.style.left||0), -parseFloat(node.style.top||0), 1, 400);
        node.classList.add('fullscreen-mode'); AppState.fullscreenNode = node;
    }
}
window.addEventListener('resize', () => {
    if (AppState.fullscreenNode) {
        AppState.fullscreenNode.style.width  = window.innerWidth+'px';
        AppState.fullscreenNode.style.height = (window.innerHeight-52)+'px';
    }
});

/* ════════════════════════════════════════════════════════════════
   OS MENU DRAG
   ════════════════════════════════════════════════════════════════ */
let osMenuMoved = false;
function initOsMenuDrag() {
    const osMenu = document.getElementById('os-menu-container');
    if (!osMenu) return;
    let dragging = false, sx, sy, il, it;
    const coords = e => e.touches?.[0] ? { x:e.touches[0].clientX, y:e.touches[0].clientY } : { x:e.clientX, y:e.clientY };
    const onStart = e => {
        if (e.target.closest('.os-menu-btn')) return;
        dragging = true; osMenuMoved = false;
        const c = coords(e); sx=c.x; sy=c.y;
        const r = osMenu.getBoundingClientRect(); il=r.left; it=r.top;
        osMenu.classList.add('dragging');
        document.addEventListener('pointermove', onMove, { passive:false });
        document.addEventListener('pointerup', onEnd);
    };
    const onMove = e => {
        if (!dragging) return; e.preventDefault();
        const c=coords(e), dx=c.x-sx, dy=c.y-sy;
        if (!osMenuMoved && (Math.abs(dx)>5||Math.abs(dy)>5)) { osMenuMoved=true; osMenu.classList.remove('open'); }
        if (osMenuMoved) {
            osMenu.style.left   = `${Math.max(0,Math.min(il+dx,window.innerWidth-osMenu.offsetWidth))}px`;
            osMenu.style.top    = `${Math.max(0,Math.min(it+dy,window.innerHeight-osMenu.offsetHeight))}px`;
            osMenu.style.bottom = 'auto'; osMenu.style.right = 'auto';
        }
    };
    const onEnd = () => {
        dragging = false; osMenu.classList.remove('dragging');
        document.removeEventListener('pointermove', onMove);
        document.removeEventListener('pointerup', onEnd);
        setTimeout(() => { if (!dragging) osMenuMoved = false; }, 50);
    };
    osMenu.addEventListener('pointerdown', onStart);
    osMenu.addEventListener('touchstart', onStart, { passive:true });
    osMenu.querySelector('.os-logo-container').onclick = e => { e.stopPropagation(); if (!osMenuMoved) osMenu.classList.toggle('open'); };
    document.addEventListener('click', e => { if (!osMenu.contains(e.target)) osMenu.classList.remove('open'); });
}

/* ════════════════════════════════════════════════════════════════
   PARTICLE BACKGROUND
   ════════════════════════════════════════════════════════════════ */
function initParticles() {
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let w, h, pts;
    function resize() {
        w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
        const c = Math.floor(w*h/13000);
        pts = Array.from({length:c}, () => ({ x:Math.random()*w, y:Math.random()*h, vx:(Math.random()-0.5)*0.45, vy:(Math.random()-0.5)*0.45, r:Math.random()*1.4+0.4 }));
    }
    window.addEventListener('resize', resize); resize();
    function frame() {
        ctx.clearRect(0,0,w,h);
        for (let i=0;i<pts.length;i++) {
            const p=pts[i]; p.x+=p.vx; p.y+=p.vy;
            if(p.x<0||p.x>w)p.vx*=-1; if(p.y<0||p.y>h)p.vy*=-1;
            ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
            ctx.fillStyle='rgba(135,206,235,0.75)'; ctx.fill();
            for(let j=i+1;j<pts.length;j++) {
                const q=pts[j], dx=p.x-q.x, dy=p.y-q.y, d=Math.sqrt(dx*dx+dy*dy);
                if(d<115) { ctx.beginPath(); ctx.strokeStyle=`rgba(65,105,225,${0.38*(1-d/115)})`; ctx.lineWidth=1; ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y); ctx.stroke(); }
            }
        }
        requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
}

function toggleSidebar() { sidebar.classList.toggle('open'); }

function escapeHTML(s) { if(!s)return''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function truncate(s, n) { return s.length>n ? s.slice(0,n-1)+'…' : s; }

function typeColor(type) {
    const m = { html:'#81c784', css:'#ce93d8', javascript:'#ffb74d', 'js-function':'#ff8a65', declaration:'#ffd54f', head:'#4dd0e1', container:'#4fc3f7', 'raw-html-container':'#78909c' };
    return m[type] || '#78909c';
}

function defaultCode(type) {
    return {
        html:        `<div class="section">\n  <!-- content -->\n</div>`,
        css:         `.section {\n  padding: 20px;\n}`,
        javascript:  `document.addEventListener('DOMContentLoaded', () => {\n  \n});`,
        'js-function': `function myFunction() {\n  \n}`,
