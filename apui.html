}

function setSyncLabel(msg) { const el=document.getElementById('sync-label'); if(el) el.textContent=msg; }
function setSyncDirty(d)   { const dot=document.getElementById('sync-dot'); if(dot) dot.classList.toggle('dirty',d); setSyncLabel(d?`${dirtyNodes.size} unsaved`:'Synced'); }

let _toastTimer = null;
function toast(msg, dur=2600) {
    const el = document.getElementById('toast');
    if (!el) return;
    el.textContent = msg; el.classList.add('show');
    if (_toastTimer) clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), dur);
}

function ensureChat() {
    if (!AppState.nodes.has('chat')) {
        const cx=(-AppState.pan.x+100)/AppState.scale, cy=(-AppState.pan.y+80)/AppState.scale;
        createSystemNode('chat','AI Activity','chat', cx, cy);
    }
}
function logToChat(role, msg) {
    const box = document.getElementById('ai-chat-box');
    if (!box) return;
    const d = document.createElement('div');
    d.className=`chat-msg msg-${role}`; d.textContent=msg;
    box.appendChild(d); box.scrollTop=box.scrollHeight;
}
function logToConsole(msg, type='info') {
    const el = document.getElementById('sys-console');
    if (!el) return;
    const d = document.createElement('div');
    d.className=`log-entry log-${type}`; d.textContent=`> ${msg}`;
    el.appendChild(d); el.scrollTop=el.scrollHeight;
}

function buildSettingsHTML() {
    return `<div class="settings-panel">
        <label>Gemini API Key</label>
        <input type="password" id="set-key" value="${AppState.settings.apiKey}" onchange="saveSettings()">
        <label>Model</label>
        <input type="text" id="set-model" value="${AppState.settings.model}" onchange="saveSettings()">
        <div style="margin-top:16px; border-top:1px solid #222; padding-top:12px;">
            <button class="btn-main" style="width:100%; height:32px; font-size:0.75rem; margin-bottom:6px;" onclick="pushAllToVibeTree()">⬆ Push All to Vibe System</button>
            <button class="btn-main" style="width:100%; height:32px; font-size:0.75rem; background:#1a3a1a;" onclick="requestTree()">↺ Refresh Tree from Parent</button>
        </div>
        <br><button class="btn-main" onclick="saveSettings()">Save</button>
    </div>`;
}

function saveSettings() {
    AppState.settings.apiKey = document.getElementById('set-key')?.value || '';
    AppState.settings.model  = document.getElementById('set-model')?.value || 'gemini-2.0-flash-exp';
    localStorage.setItem('apui_gemini_key', AppState.settings.apiKey);
    localStorage.setItem('apui_model',      AppState.settings.model);
    logToConsole('Settings saved.', 'success');
}

function downloadProject() {
    let css='', js='', html='';
    flattenTree().forEach(({ node }) => {
        const editor = document.getElementById(`ed-${node.id}`);
        const code   = editor ? editor.value : (node.code || '');
        if (node.type==='css') css+=code+'\n';
        else if (['javascript','js-function','declaration'].includes(node.type)) js+=code+'\n';
        else if (node.type==='html') html+=code+'\n';
    });
    const full=`<!DOCTYPE html><html><head><style>${css}</style></head><body>${html}<script>${js}\x3c/script></body></html>`;
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([full],{type:'text/html'}));
    a.download='vibe-export.html'; a.click();
    logToChat('system','Project exported from Vibe Tree.');
}

   ════════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
    initParticles();
    initPointerSystem();
    initWheelZoom();
    initOsMenuDrag();
    startPhysicsLoop();

    AppState.resizeObserver = new ResizeObserver(() => requestAnimationFrame(drawConnections));
    userInput.addEventListener('keypress', e => { if (e.key==='Enter') handleCommand(); });

    // Spawn persistent system nodes
    createSystemNode('preview', 'Live Preview', 'preview', 1300, 80);
    createSystemNode('chat',    'AI Activity',  'chat',    80, 80);
    createSystemNode('console', 'Console',      'console', 80, 440);
    createSystemNode('settings','Settings',     'settings',80, 800);

    AppState.connections.push({ from:'chat', to:'preview', isPermanent:true });

    enforceNodeLimit('preview');
    logToConsole('APUI Vibe Tree Editor ready.', 'success');

    // Request tree from parent; fall back to demo after short timeout
    requestTree();

    logToChat('system', 'APUI connected. Waiting for Vibe Tree from parent system…');
    logToChat('system', 'Tip: Edit any node and hit ⬆ PUSH to sync changes back.');
});
