<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Piper TTS Engine</title>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            max-width: 600px; 
            margin: 3rem auto; 
            padding: 1rem; 
            background: #121212;
            color: #ffffff;
        }
        .card {
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .control-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: bold; margin-bottom: 0.5rem; color: #aaa; }
        input[type="file"], textarea { 
            width: 100%; 
            padding: 0.75rem; 
            background: #2a2a2a;
            color: white;
            border: 1px solid #444;
            border-radius: 6px;
            box-sizing: border-box;
        }
        textarea { height: 120px; resize: vertical; }
        button { 
            width: 100%;
            padding: 1rem; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer; 
            transition: background 0.2s;
        }
        button:hover { background: #0056b3; }
        button:disabled { background: #555; cursor: not-allowed; }
        #status { margin-top: 1rem; text-align: center; font-style: italic; color: #888; }
    </style>
</head>
<body>
    <div class="card">
        <h2>System Voice Override</h2>
        
        <div class="control-group">
            <label for="onnxFile">1. Upload Model (jarvis.onnx):</label>
            <input type="file" id="onnxFile" accept=".onnx">
        </div>

        <div class="control-group">
            <label for="jsonFile">2. Upload Config (jarvis.onnx.json):</label>
            <input type="file" id="jsonFile" accept=".json">
        </div>

        <div class="control-group">
            <label for="textInput">3. Enter Custom Text:</label>
            <textarea id="textInput">Welcome back, sir. Systems are fully operational and running entirely in your browser.</textarea>
        </div>

        <button id="playBtn" onclick="generateAndPlay()">Initialize Audio</button>
        <div id="status">Awaiting input...</div>
    </div>

    <script type="module">
        import { piperGenerate } from 'https://cdn.jsdelivr.net/npm/piper-wasm@latest/+esm';

        // Base URL for the WASM engine files required by Piper
        const CDN = "https://cdn.jsdelivr.net/npm/piper-wasm@latest/dist/";

        window.generateAndPlay = async () => {
            const onnxFile = document.getElementById('onnxFile').files[0];
            const jsonFile = document.getElementById('jsonFile').files[0];
            const text = document.getElementById('textInput').value;
            const status = document.getElementById('status');
            const playBtn = document.getElementById('playBtn');

            if (!onnxFile || !jsonFile || !text) {
                status.innerText = "Error: Missing files or text.";
                status.style.color = "#ff4444";
                return;
            }

            try {
                playBtn.disabled = true;
                status.style.color = "#888";
                status.innerText = "Loading neural network into memory... (This may take a moment)";

                // Convert uploaded files into temporary browser URLs
                const onnxUrl = URL.createObjectURL(onnxFile);
                const jsonUrl = URL.createObjectURL(jsonFile);

                // Run the Piper WASM engine
                const audioData = await piperGenerate(
                    `${CDN}piper_phonemize.js`,
                    `${CDN}piper_phonemize.wasm`,
                    `${CDN}piper_phonemize.data`,
                    `${CDN}piper_worker.js`,
                    onnxUrl,
                    jsonUrl,
                    0, // Default speaker ID for single-speaker models
                    text,
                    (progress) => { console.log("Processing...", progress); },
                    null,
                    false
                );

                status.innerText = "Rendering complete. Playing audio...";

                // The output is a raw Blob URL of the generated .wav file
                const audio = new Audio(audioData.file);
                audio.play();

                audio.onended = () => {
                    status.innerText = "Awaiting input...";
                    // Clean up browser memory to prevent leaks
                    URL.revokeObjectURL(onnxUrl);
                    URL.revokeObjectURL(jsonUrl);
                };

            } catch (error) {
                console.error(error);
                status.innerText = "Engine Failure: Check console for details. Make sure you are running via a local server.";
                status.style.color = "#ff4444";
            } finally {
                playBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
