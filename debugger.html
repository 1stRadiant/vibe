<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Iframe Debugger</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', monospace; overflow: hidden; display: flex; flex-direction: column; background-color: #121212; color: #e0e0e0; }

        /* --- Header --- */
        .controls {
            display: flex;
            gap: 10px;
            padding: 10px;
            background-color: #1f1f1f;
            border-bottom: 1px solid #333;
            height: 60px;
            box-sizing: border-box;
        }

        #urlInput {
            flex-grow: 1;
            padding: 0 12px;
            background: #2b2b2b;
            border: 1px solid #444;
            color: #4db8ff;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
        }

        button {
            padding: 0 20px;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background-color: #0052a3; }
        button#clearLog { background-color: #333; }
        button#clearLog:hover { background-color: #444; }

        /* --- Split Layout --- */
        .workspace {
            display: flex;
            flex-direction: column;
            height: calc(100% - 60px);
        }

        /* Iframe */
        .iframe-wrapper {
            flex: 2; /* Takes up 2/3 of space */
            border-bottom: 2px solid #333;
            background: white; /* Iframes usually need white bg */
            position: relative;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* Console */
        .console-wrapper {
            flex: 1; /* Takes up 1/3 of space */
            background-color: #0f0f0f;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .console-header {
            padding: 5px 10px;
            background: #252526;
            font-size: 12px;
            color: #888;
            border-bottom: 1px solid #333;
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-between;
        }

        #logs {
            flex-grow: 1;
            padding: 5px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
        }

        /* Log Styling */
        .log-row { 
            padding: 4px 8px; 
            border-bottom: 1px solid #1a1a1a; 
            display: flex; 
            gap: 10px;
        }
        .log-row:hover { background-color: #1a1a1a; }
        
        .log-time { color: #666; min-width: 70px; }
        .log-msg { white-space: pre-wrap; word-break: break-all; }
        
        .type-error { color: #ff6b6b; background: rgba(255, 0, 0, 0.05); }
        .type-warn { color: #ffcc00; }
        .type-info { color: #a6d4fa; }
        .type-log { color: #cccccc; }
        .type-system { color: #00ff88; font-style: italic; }

        .loading-overlay {
            position: absolute; top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.7);
            color: white; display: flex; align-items: center; justify-content: center;
            font-size: 20px; display: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="controls">
        <input type="text" id="urlInput" placeholder="Enter URL (e.g. https://example.com)">
        <button id="loadBtn">Inject & Debug</button>
        <button id="clearLog">Clear Log</button>
    </div>

    <div class="workspace">
        <div class="iframe-wrapper">
            <iframe id="debugFrame"></iframe>
            <div id="loader" class="loading-overlay">Fetching & Injecting Debugger...</div>
        </div>
        
        <div class="console-wrapper">
            <div class="console-header">
                <span>CONSOLE OUTPUT</span>
                <span id="status">Idle</span>
            </div>
            <div id="logs"></div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const loadBtn = document.getElementById('loadBtn');
        const clearBtn = document.getElementById('clearLog');
        const iframe = document.getElementById('debugFrame');
        const logsDiv = document.getElementById('logs');
        const loader = document.getElementById('loader');
        const statusSpan = document.getElementById('status');
        
        const STORAGE_KEY = 'debugger_pro_last_url';
        
        // This is a public proxy to bypass CORS so we can inject scripts.
        // If this proxy is down, you might need to use a different one (e.g. corsproxy.io)
        const PROXY_URL = 'https://api.allorigins.win/raw?url=';

        // --- Logger ---
        function addLog(msg, type = 'log') {
            const row = document.createElement('div');
            row.className = `log-row type-${type}`;
            
            const timeSpan = document.createElement('span');
            timeSpan.className = 'log-time';
            timeSpan.innerText = new Date().toLocaleTimeString().split(' ')[0];

            const msgSpan = document.createElement('span');
            msgSpan.className = 'log-msg';
            msgSpan.innerText = typeof msg === 'object' ? JSON.stringify(msg) : msg;

            row.appendChild(timeSpan);
            row.appendChild(msgSpan);
            logsDiv.prepend(row); // Newest on top
        }

        // --- The Magic Spy Script ---
        // This code gets injected INSIDE the iframe to catch errors and send them out.
        const SPY_SCRIPT = `
            <script>
                (function() {
                    function send(type, args) {
                        try {
                            const msg = Array.from(args).map(a => {
                                if(a instanceof Error) return a.toString();
                                try { return JSON.stringify(a) } catch(e) { return String(a) }
                            }).join(' ');
                            window.parent.postMessage({ type: type, message: msg }, '*');
                        } catch(e) {}
                    }

                    // 1. Capture Console Methods
                    const _log = console.log;
                    const _warn = console.warn;
                    const _error = console.error;

                    console.log = function(...args) { send('log', args); _log.apply(console, args); };
                    console.warn = function(...args) { send('warn', args); _warn.apply(console, args); };
                    console.error = function(...args) { send('error', args); _error.apply(console, args); };

                    // 2. Capture Uncaught Exceptions
                    window.onerror = function(msg, url, line, col, error) {
                        const txt = "Uncaught Error: " + msg + " (" + (url||'unknown') + ":" + line + ")";
                        send('error', [txt]);
                        return false; 
                    };

                    // 3. Capture Unhandled Promises
                    window.addEventListener('unhandledrejection', function(event) {
                        send('error', ["Unhandled Promise Rejection: " + event.reason]);
                    });
                })();
            <\/script>
        `;

        async function injectAndLoad() {
            let targetUrl = urlInput.value.trim();
            if (!targetUrl) return;

            if (!targetUrl.startsWith('http')) targetUrl = 'https://' + targetUrl;

            // Save to storage
            localStorage.setItem(STORAGE_KEY, targetUrl);

            loader.style.display = 'flex';
            addLog(`Fetching content via Proxy: ${targetUrl}`, 'system');

            try {
                // 1. Fetch HTML via Proxy to avoid CORS blocking
                const response = await fetch(PROXY_URL + encodeURIComponent(targetUrl));
                if (!response.ok) throw new Error("Proxy failed to fetch website.");
                
                let html = await response.text();

                // 2. Inject <base> tag so images/css work with relative paths
                const baseTag = `<base href="${targetUrl}">`;
                
                // 3. Inject our SPY script immediately after <head> or <body>
                if (html.includes('<head>')) {
                    html = html.replace('<head>', '<head>' + baseTag + SPY_SCRIPT);
                } else {
                    html = baseTag + SPY_SCRIPT + html;
                }

                // 4. Render into Iframe using srcdoc (treating it as local content)
                iframe.srcdoc = html;
                
                addLog("Injection successful. Website rendering...", 'system');

            } catch (err) {
                addLog(`CRITICAL ERROR: ${err.message}`, 'error');
                addLog("Note: Some websites (like Google) block proxies entirely.", 'system');
            } finally {
                loader.style.display = 'none';
            }
        }

        // --- Event Listeners ---
        
        // Listen for messages FROM the iframe
        window.addEventListener('message', (event) => {
            const data = event.data;
            if (data && (data.type === 'log' || data.type === 'error' || data.type === 'warn')) {
                addLog(data.message, data.type);
            }
        });

        loadBtn.addEventListener('click', injectAndLoad);
        
        clearBtn.addEventListener('click', () => logsDiv.innerHTML = '');

        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') injectAndLoad();
        });

        // Initialize from LocalStorage
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                urlInput.value = saved;
                injectAndLoad();
            }
        });

    </script>
</body>
</html>
