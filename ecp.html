<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free UK Address Lookup Test</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        .config-box { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        input { padding: 10px; width: 70%; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        #results { margin-top: 20px; }
        .address-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .uprn { font-family: monospace; font-size: 0.8em; color: #666; background: #eee; padding: 2px 5px; border-radius: 3px; }
        .error { color: red; font-weight: bold; }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>

    <h2>EPC Address Lookup Test</h2>
    
    <!-- Configuration Section -->
    <div class="config-box">
        <h4>1. API Credentials</h4>
        <input type="text" id="email" placeholder="Registered Email">
        <input type="text" id="apiKey" placeholder="EPC API Key" style="margin-top:10px;">
        <p style="font-size: 0.8em; color: #666;">Your credentials stay in this browser tab only.</p>
    </div>

    <!-- Search Section -->
    <div class="search-box">
        <h4>2. Search by Postcode</h4>
        <input type="text" id="postcode" placeholder="e.g. SW1A 2AA">
        <button onclick="searchAddresses()">Search</button>
    </div>

    <div id="results"></div>

    <script>
        async function searchAddresses() {
            const email = document.getElementById('email').value;
            const apiKey = document.getElementById('apiKey').value;
            const postcode = document.getElementById('postcode').value.trim();
            const resultsDiv = document.getElementById('results');

            if (!email || !apiKey || !postcode) {
                alert("Please fill in all fields");
                return;
            }

            resultsDiv.innerHTML = '<p class="loading">Fetching addresses from DLUHC...</p>';

            // The API uses Basic Auth: base64(email:key)
            const authString = btoa(`${email}:${apiKey}`);

            try {
                const response = await fetch(`https://epc.opendatacommunities.org/api/v1/domestic/search?postcode=${postcode}`, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Authorization': `Basic ${authString}`
                    }
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status} - ${response.statusText}`);
                }

                const data = await response.json();
                displayResults(data.rows);

            } catch (error) {
                resultsDiv.innerHTML = `<p class="error">Error: ${error.message}<br><small>Check console for CORS or Auth issues.</small></p>`;
                console.error(error);
            }
        }

        function displayResults(rows) {
            const resultsDiv = document.getElementById('results');
            
            if (!rows || rows.length === 0) {
                resultsDiv.innerHTML = '<p>No addresses found for this postcode.</p>';
                return;
            }

            let html = `<h3>Found ${rows.length} Addresses:</h3>`;
            rows.forEach(row => {
                // EPC API returns 'address' and 'uprn' columns
                html += `
                    <div class="address-item">
                        <span>${row.address}</span>
                        <span class="uprn">UPRN: ${row.uprn}</span>
                    </div>
                `;
            });
            
            resultsDiv.innerHTML = html;
        }
    </script>
</body>
</html>
